<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>テキーラ道場 — 開店・閉店</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain:        "tequiladojo.firebaseapp.com",
  projectId:         "tequiladojo",
  storageBucket:     "tequiladojo.firebasestorage.app",
  messagingSenderId: "56663296233",
  appId:             "1:56663296233:web:c8cac2fcbeb4faa09e0878",
  measurementId:     "G-KMS18946JQ"
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:6px;--rl:12px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:44px 36px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:44px;margin-bottom:6px}
.lbrand{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:22px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500}
.lbtn:hover{background:var(--gold)}
.topbar{background:var(--ink);padding:12px 24px;display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;border:none;white-space:nowrap}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}.bd:hover{background:#f5d4ce}
.sm{padding:5px 10px;font-size:11px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.fi,.fs{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--cream);width:100%}
.fi:focus,.fs:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,30,.1)}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 15px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;min-width:200px}
.tok{background:var(--teal);color:#fff}.terr{background:var(--red);color:#fff}.tinf{background:var(--gold-d);color:var(--cream)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 12px;text-align:left;font-size:11px;font-weight:500;color:var(--ink3)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.mono{font-family:var(--mono);font-size:11px}
.dim{color:var(--ink3)}
.ec{text-align:center;color:var(--ink3);padding:20px!important}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🥃</div>
    <div class="lbrand">テキーラ道場</div>
    <div class="lsub">Open / Close Console</div>
    <label>メールアドレス</label>
    <input type="email" id="lemail" placeholder="owner@example.com">
    <label>パスワード</label>
    <input type="password" id="lpass" placeholder="••••••••">
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">ログイン</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <a href="home.html" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:6px;font-size:11px;text-decoration:none">← ホーム</a>
    <span style="font-family:var(--serif);font-size:16px;color:var(--gold-l)">🏮 開店・閉店</span>
    <span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,.3);font-family:var(--mono)" id="temail"></span>
    <button id="btn-logout" style="padding:5px 12px;border:1px solid rgba(255,255,255,.14);border-radius:6px;background:none;color:rgba(255,255,255,.38);font-size:11px">ログアウト</button>
  </div>

  <div style="max-width:760px;margin:24px auto;padding:0 20px">

    <!-- 上段：レイアウト選択 + 現在の状態 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;align-items:flex-start">
      <div class="card" style="flex:1;padding:14px 16px">
        <div style="font-size:11px;font-weight:500;color:var(--ink3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">座席レイアウト</div>
        <select id="oc-layout-sel" class="fs" style="width:100%">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="card" style="flex:1;padding:14px 16px">
        <div style="font-size:11px;font-weight:500;color:var(--ink3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">現在の状態</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="store-status-badge" style="font-size:20px;font-weight:500">閉店中</span>
        </div>
        <div id="oc-session-detail" style="font-size:11px;color:var(--ink3);margin-top:6px"></div>
      </div>
    </div>

    <!-- 操作ボタン -->
    <div style="display:flex;gap:20px;justify-content:center;margin-bottom:24px">
      <button id="btn-open-store" class="btn bp" style="padding:18px 40px;font-size:16px;min-width:130px">🏮 開店</button>
      <button id="btn-break-store" class="btn bs" style="padding:18px 40px;font-size:16px;min-width:130px">☕ 休憩</button>
      <button id="btn-close-store" class="btn bd" style="padding:18px 40px;font-size:16px;min-width:130px">🌙 閉店</button>
    </div>

    <!-- レイアウトプレビュー -->
    <div id="oc-layout-display" style="display:none;text-align:center;padding:28px;background:var(--cream2);border-radius:var(--r);margin-bottom:16px">
      <div id="oc-layout-img-wrap"></div>
      <div id="oc-layout-name" style="font-size:32px;font-weight:500;color:var(--ink2);margin-bottom:8px"></div>
      <div id="oc-layout-seats" style="font-size:13px;color:var(--ink3)"></div>
    </div>

    <!-- 備考 -->
    <div class="card" style="padding:14px 16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:500;color:var(--ink3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">備考</div>
      <textarea id="oc-memo" class="fi" rows="3" style="resize:vertical;font-size:13px;width:100%;box-sizing:border-box" placeholder="本日の特記事項など..."></textarea>
      <button id="btn-oc-save-memo" class="btn bs" style="margin-top:8px;font-size:12px">💾 備考を保存</button>
    </div>

    <!-- 本日の来店者一覧 -->
    <div class="card" style="padding:0">
      <div style="font-size:11px;font-weight:500;color:var(--ink3);padding:10px 16px 6px;text-transform:uppercase;letter-spacing:.06em">本日の来店者</div>
      <table>
        <colgroup><col style="width:70px"><col style="width:90px"><col><col style="width:80px"></colgroup>
        <thead><tr style="background:var(--cream2)">
          <th>来店</th><th>会員ID</th><th>名前</th><th style="text-align:center">グループ</th>
        </tr></thead>
        <tbody id="tb-oc-checkin"><tr><td colspan="4" class="ec">読み込み中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth=firebase.auth(), db=firebase.firestore();

function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value.trim():"";}
function sv(id,val){var el=g(id);if(el)el.value=(val==null?"":val);}
function pad(n){return String(n).padStart(2,"0");}
function toast(msg,type){
  var el=document.createElement("div");
  el.className="toast t"+(type||"ok");
  el.textContent=(type==="err"?"✕ ":type==="inf"?"ℹ ":"✓ ")+msg;
  g("toasts").appendChild(el);
  setTimeout(function(){el.remove();},3000);
}
function nowStr(){var d=new Date();return pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());}
function todayStr6(){var d=new Date();return String(d.getFullYear()).slice(2)+pad(d.getMonth()+1)+pad(d.getDate());}
function fmtHHMM(t){if(!t||t.length<4)return t||"—";return t.slice(0,2)+":"+t.slice(2,4);}

var storeStatus="closed";
var currentSessionId=null;
var breakIndex=0;
var layouts=[];
var members=[];

var STATUS_LABEL={closed:"閉店中",open:"開店中",break:"休憩中"};
var STATUS_COLOR={closed:"color:#e44",open:"color:#2a9",break:"color:#c80"};

auth.onAuthStateChanged(function(user){
  if(user){
    g("login-screen").style.display="none";
    g("app").style.display="block";
    g("temail").textContent=user.email;
    loadLayouts();
    loadMembers();
    restoreStoreState();
    loadTodayVisits();
  } else {
    g("login-screen").style.display="flex";
    g("app").style.display="none";
  }
});
g("lbtn").addEventListener("click",function(){
  var email=gv("lemail"),pass=g("lpass").value;
  g("lerr").textContent="";
  if(!email||!pass){g("lerr").textContent="入力してください";return;}
  g("lbtn").textContent="ログイン中...";
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(){g("lbtn").textContent="ログイン";})
    .catch(function(e){g("lerr").textContent="ログイン失敗: "+e.message;g("lbtn").textContent="ログイン";});
});
g("lpass").addEventListener("keydown",function(e){if(e.key==="Enter")g("lbtn").click();});
g("btn-logout").addEventListener("click",function(){auth.signOut();});

function loadLayouts(){
  db.collection("layouts").get().then(function(snap){
    layouts=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var sel=g("oc-layout-sel");
    var cur=sel.value;
    sel.innerHTML='<option value="">選択してください</option>'+
      layouts.map(function(l){return '<option value="'+l.id+'">'+l.name+' (MAX'+l.seats+'席)</option>';}).join("");
    if(cur) sel.value=cur;
  }).catch(function(e){toast("レイアウト読込失敗: "+e.message,"err");});
}

function loadMembers(){
  db.collection("members").get().then(function(snap){
    members=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  });
}

g("oc-layout-sel").addEventListener("change",function(){
  var id=this.value;
  var disp=g("oc-layout-display");
  if(!id){disp.style.display="none";return;}
  var lay=layouts.find(function(l){return l.id===id;});
  if(!lay||!disp)return;
  disp.style.display="block";
  g("oc-layout-name").textContent=lay.name;
  g("oc-layout-seats").textContent="MAX "+lay.seats+"席";
  var wrap=g("oc-layout-img-wrap");
  wrap.innerHTML=lay.imageData?'<img src="'+lay.imageData+'" style="max-width:100%;max-height:200px;border-radius:6px;margin-bottom:12px">':'';
});

function applyStoreStatus(status){
  storeStatus=status;
  var badge=g("store-status-badge");
  if(badge){
    badge.textContent=STATUS_LABEL[status]||status;
    badge.style.cssText="font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,.06);"+STATUS_COLOR[status];
  }
  var btnOpen=g("btn-open-store"),btnBreak=g("btn-break-store"),btnClose=g("btn-close-store");
  if(!btnOpen)return;
  if(status==="open"){
    btnOpen.disabled=true;btnOpen.style.opacity="0.4";
    btnBreak.disabled=false;btnBreak.style.opacity="1";btnBreak.textContent="☕ 休憩";
    btnClose.disabled=false;btnClose.style.opacity="1";
  } else if(status==="break"){
    btnOpen.disabled=true;btnOpen.style.opacity="0.4";
    btnBreak.disabled=false;btnBreak.style.opacity="1";btnBreak.textContent="☕ 休憩終了";
    btnClose.disabled=true;btnClose.style.opacity="0.4";
  } else {
    btnOpen.disabled=false;btnOpen.style.opacity="1";
    btnBreak.disabled=true;btnBreak.style.opacity="0.4";btnBreak.textContent="☕ 休憩";
    btnClose.disabled=true;btnClose.style.opacity="0.4";
  }
  var det=g("oc-session-detail");
  if(det) det.textContent=currentSessionId?"セッションID: "+currentSessionId+" / "+(STATUS_LABEL[status]||status):"営業セッションなし";
  var laySelEl=g("oc-layout-sel");
  if(laySelEl){
    var isClosed=(status==="closed");
    laySelEl.disabled=!isClosed;
    laySelEl.style.opacity=isClosed?"1":"0.5";
  }
}

g("btn-open-store").addEventListener("click",function(){
  var layoutId=gv("oc-layout-sel");
  if(!layoutId){toast("座席レイアウトを選択してください","err");return;}
  var today=todayStr6();
  db.collection("sessions").where("date","==",today).get()
    .then(function(snap){
      var existCount=snap.docs.length;
      if(existCount>0&&!confirm("本日すでに"+existCount+"件の営業データがあります。追加営業として登録しますか？"))return;
      var seq=existCount;
      var sessionId=today+String(seq);
      var openTime=nowStr();
      return db.collection("sessions").doc(sessionId).set({
        sessionId:sessionId,date:today,seq:seq,
        openTime:openTime,closeTime:null,
        layoutId:layoutId,
        breakStart1:null,breakEnd1:null,
        breakStart2:null,breakEnd2:null,
        breakStart3:null,breakEnd3:null,
        guestCount:null,sales:null,memo:null
      }).then(function(){
        currentSessionId=sessionId;
        breakIndex=0;
        applyStoreStatus("open");
        toast("開店しました（"+openTime+"）");
        sv("oc-memo","");
      });
    }).catch(function(e){toast("開店処理失敗: "+e.message,"err");});
});

g("btn-break-store").addEventListener("click",function(){
  var t=nowStr();
  if(storeStatus==="open"){
    db.collection("sessions").doc(currentSessionId).get()
      .then(function(doc){
        var d=doc.data();
        var idx=0;
        if(!d.breakStart1)idx=1;
        else if(!d.breakStart2)idx=2;
        else if(!d.breakStart3)idx=3;
        else{toast("休憩回数の上限（3回）に達しています","err");return;}
        breakIndex=idx;
        var upd={};upd["breakStart"+idx]=t;
        return db.collection("sessions").doc(currentSessionId).update(upd)
          .then(function(){applyStoreStatus("break");toast("休憩開始（"+t+"）");});
      }).catch(function(e){toast("休憩処理失敗: "+e.message,"err");});
  } else if(storeStatus==="break"){
    var upd={};upd["breakEnd"+breakIndex]=t;
    db.collection("sessions").doc(currentSessionId).update(upd)
      .then(function(){applyStoreStatus("open");toast("休憩終了（"+t+"）");})
      .catch(function(e){toast("休憩終了処理失敗: "+e.message,"err");});
  }
});

g("btn-close-store").addEventListener("click",function(){
  if(!currentSessionId){toast("営業セッションがありません","err");return;}
  if(!confirm("閉店処理を実行しますか？"))return;
  var closeTime=nowStr();
  db.collection("sessions").doc(currentSessionId).update({closeTime:closeTime})
    .then(function(){
      toast("閉店しました（"+closeTime+"）");
      currentSessionId=null;
      applyStoreStatus("closed");
    }).catch(function(e){toast("閉店処理失敗: "+e.message,"err");});
});

g("btn-oc-save-memo").addEventListener("click",function(){
  if(!currentSessionId){toast("営業セッションがありません","err");return;}
  db.collection("sessions").doc(currentSessionId).update({memo:gv("oc-memo")||null})
    .then(function(){toast("備考を保存しました");})
    .catch(function(e){toast("保存失敗: "+e.message,"err");});
});

function restoreStoreState(){
  db.collection("sessions").get()
    .then(function(snap){
      if(snap.empty){applyStoreStatus("closed");return;}
      var docs=snap.docs.map(function(d){return d.data();});
      docs.sort(function(a,b){
        var ka=(a.date||"")+(a.openTime||"");
        var kb=(b.date||"")+(b.openTime||"");
        return kb.localeCompare(ka);
      });
      var d=docs[0];
      if(d.closeTime){currentSessionId=null;applyStoreStatus("closed");return;}
      currentSessionId=d.sessionId||d.date+(d.seq!==undefined?String(d.seq):"0");
      var memoEl=g("oc-memo");if(memoEl)memoEl.value=d.memo||"";
      var fields=[d.breakStart1,d.breakEnd1,d.breakStart2,d.breakEnd2,d.breakStart3,d.breakEnd3];
      var filled=fields.filter(function(f){return f;}).length;
      if(filled===1||filled===3||filled===5){
        if(filled>=4)breakIndex=3;
        else if(filled>=2)breakIndex=2;
        else breakIndex=1;
        applyStoreStatus("break");
      } else {
        applyStoreStatus("open");
      }
    }).catch(function(e){console.error("restoreStoreState error:",e);});
}

function loadTodayVisits(){
  var today=todayStr6();
  db.collection("visits").where("visitDate","==",today).get()
    .then(function(snap){
      var list=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      list.sort(function(a,b){return (a.visitTime||"").localeCompare(b.visitTime||"");});
      renderOcList(list);
    }).catch(function(e){toast("来店データ読込失敗: "+e.message,"err");});
}

function getMemberName(memberId){
  if(!memberId)return "（非会員）";
  var m=members.find(function(x){return x.id===memberId||x.memberId===memberId;});
  return m?m.name||memberId:"ID:"+memberId;
}

function renderOcList(list){
  var tb=g("tb-oc-checkin");if(!tb)return;
  if(!list||!list.length){tb.innerHTML='<tr><td colspan="4" class="ec">本日の来店者はいません</td></tr>';return;}
  var active=list.filter(function(r){return !r.checkoutTime;});
  var done=list.filter(function(r){return !!r.checkoutTime;});
  var sorted=active.concat(done);
  tb.innerHTML=sorted.map(function(r){
    var style=r.checkoutTime?"opacity:.4":"";
    return '<tr style="'+style+'">'
      +'<td class="mono dim">'+fmtHHMM(r.visitTime)+(r.checkoutTime?'→'+fmtHHMM(r.checkoutTime):"")+'</td>'
      +'<td class="mono dim">'+(r.memberId||"—")+'</td>'
      +'<td>'+getMemberName(r.memberId)+'</td>'
      +'<td style="text-align:center;font-family:var(--mono);font-size:11px">'+r.groupId+'-'+r.seqNo+'</td>'
    +'</tr>';
  }).join("");
}
</script>
</body>
</html>
