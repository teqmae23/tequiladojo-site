<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文管理 | テキーラ道場</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1916;
  --surface2: #222119;
  --border: #2e2c27;
  --accent: #c9a84c;
  --accent2: #e8c96a;
  --text: #f0ece0;
  --text2: #a09880;
  --text3: #6a6455;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2980b9;
  --blind: #8e44ad;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── トップバー ── */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 48px;
  position: sticky;
  top: 0;
  z-index: 100;
}
#topbar .brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  margin-right: auto;
}
#topbar a {
  color: var(--text2);
  text-decoration: none;
  font-size: 13px;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background .15s;
}
#topbar a:hover { background: var(--border); }

/* ── メインコンテンツ ── */
#main {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px;
}

/* ── 新規注文ボタン ── */
#btn-new-order {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #0f0e0c;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 20px;
  letter-spacing: 1px;
  transition: background .2s, transform .1s;
}
#btn-new-order:hover { background: var(--accent2); }
#btn-new-order:active { transform: scale(.98); }

/* ── セクション ── */
.section { margin-bottom: 24px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.section-count {
  background: var(--border);
  color: var(--text2);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.section-action {
  margin-left: auto;
}

/* ── グループカード ── */
.group-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s;
}
.group-card.done {
  opacity: .45;
}
.group-card:hover { border-color: #3e3c37; }

.group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
}
.group-checkbox {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.group-info { flex: 1; min-width: 0; }
.group-row1 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.group-id {
  font-size: 11px;
  color: var(--text3);
  font-family: monospace;
}
.group-customer {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.blind-badge {
  background: var(--blind);
  color: #fff;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
}
.group-row2 {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.group-time {
  font-size: 11px;
  color: var(--text3);
}
.group-total {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-left: auto;
}

/* ── 商品リスト ── */
.toggle-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: all .15s;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

.item-list {
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.item-row {
  display: flex;
  align-items: center;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.item-row:last-child { border-bottom: none; }
.item-mark {
  font-size: 11px;
  background: var(--blind);
  color: #fff;
  padding: 1px 5px;
  border-radius: 3px;
  min-width: 28px;
  text-align: center;
}
.item-name {
  flex: 1;
  font-size: 13px;
  color: var(--text);
}
.item-qty {
  font-size: 12px;
  color: var(--text2);
  min-width: 50px;
  text-align: right;
}
.item-price {
  font-size: 12px;
  color: var(--accent);
  min-width: 60px;
  text-align: right;
  font-weight: 600;
}

/* カード右端アクションボタン */
.card-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.btn-result {
  background: var(--blind);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-result:hover { opacity: .8; }

/* ── 一括提供ボタン ── */
#btn-serve-all {
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  transition: opacity .2s;
}
#btn-serve-all:hover { opacity: .8; }
#btn-serve-all.visible { display: inline-block; }

/* ── ローディング ── */
#loading {
  text-align: center;
  padding: 48px;
  color: var(--text3);
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 空状態 ── */
.empty {
  color: var(--text3);
  font-size: 13px;
  padding: 12px 0;
  text-align: center;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   注文作成フロー（モーダル）
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#order-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  overflow-y: auto;
}
#order-modal.open { display: block; }
#order-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 600px;
  margin: 24px auto;
  min-height: 400px;
}
.modal-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.modal-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  flex: 1;
}
.btn-close-modal {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
}
.modal-body { padding: 16px; }

/* ── ステップインジケーター ── */
#step-indicator {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.step-tab {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  font-size: 11px;
  color: var(--text3);
  background: var(--surface2);
  border-right: 1px solid var(--border);
  transition: all .2s;
}
.step-tab:last-child { border-right: none; }
.step-tab.active {
  background: var(--accent);
  color: #0f0e0c;
  font-weight: 700;
}
.step-tab.done {
  background: var(--surface);
  color: var(--text2);
}

/* ━━━ STEP0: 来場者選択 ━━━ */
#step0 .visitor-list { display: flex; flex-direction: column; gap: 6px; }
.visitor-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.visitor-card:hover { border-color: var(--accent); }
.visitor-card.selected {
  border-color: var(--accent);
  background: #1e1c14;
}
.visitor-name { font-size: 14px; font-weight: 600; }
.visitor-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ━━━ STEP1: 商品選択 ━━━ */
.product-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 12px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.ptab {
  flex: 1;
  text-align: center;
  padding: 7px;
  font-size: 12px;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: all .15s;
  color: var(--text2);
}
.ptab:last-child { border-right: none; }
.ptab.active { background: var(--accent); color: #0f0e0c; font-weight: 700; }

/* NOMショートカット */
.nom-shortcuts {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.nom-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.nom-btn:hover { border-color: var(--accent); color: var(--accent); }
.nom-btn.active { background: var(--accent); color: #0f0e0c; border-color: var(--accent); }

/* 商品検索・リスト */
#product-search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 8px;
  outline: none;
}
#product-search:focus { border-color: var(--accent); }
#product-list-container {
  max-height: 220px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.product-item {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.product-item:last-child { border-bottom: none; }
.product-item:hover { background: var(--surface2); }
.product-item-name { font-size: 13px; }
.product-item-price { font-size: 11px; color: var(--accent); }

/* 数量入力モーダル */
#qty-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
#qty-modal.open { display: flex; }
#qty-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  min-width: 280px;
}
#qty-panel h3 { font-size: 14px; color: var(--accent); margin-bottom: 12px; }
#qty-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 4px;
  font-size: 18px;
  text-align: center;
  outline: none;
  margin-bottom: 12px;
}
#qty-input:focus { border-color: var(--accent); }
.qty-unit { font-size: 11px; color: var(--text3); text-align: center; margin-bottom: 10px; }
.qty-presets { display: flex; gap: 6px; margin-bottom: 12px; }
.qty-preset {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px;
  border-radius: 4px;
  cursor: pointer;
  text-align: center;
  font-size: 12px;
  transition: all .15s;
}
.qty-preset:hover { border-color: var(--accent); color: var(--accent); }
.qty-buttons { display: flex; gap: 8px; }
.qty-buttons button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
#qty-ok { background: var(--accent); color: #0f0e0c; font-weight: 700; }
#qty-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border) !important; }

/* カート */
#cart-section { margin-top: 12px; }
.cart-header { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.cart-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item:last-child { border-bottom: none; }
.cart-mark-sel {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 3px;
  cursor: pointer;
}
.cart-item-name { flex: 1; font-size: 12px; }
.cart-item-qty { font-size: 11px; color: var(--text2); }
.cart-item-price { font-size: 12px; color: var(--accent); min-width: 55px; text-align: right; }
.cart-item-del {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
}

/* ブラインドチェックボックス */
.blind-check-area {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  margin-bottom: 8px;
  border-top: 1px solid var(--border);
}
.blind-check-area label {
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
}

/* セット商品リスト */
.set-item {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.set-item:hover { background: var(--surface2); }
.set-item:last-child { border-bottom: none; }
.set-name { font-size: 13px; }
.set-type-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 6px;
}
.set-type-0 { background: var(--surface2); color: var(--text3); }
.set-type-1 { background: var(--accent); color: #0f0e0c; }
.set-type-2 { background: var(--blind); color: #fff; }

/* ━━━ STEP2: 確認 ━━━ */
#step2 .confirm-group { margin-bottom: 12px; }
.confirm-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.confirm-value { font-size: 14px; color: var(--text); }
.confirm-items { margin-top: 10px; }
.confirm-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.confirm-item:last-child { border-bottom: none; }
.confirm-total {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.confirm-total-label { font-size: 13px; color: var(--text2); }
.confirm-total-val { font-size: 18px; font-weight: 700; color: var(--accent); }

/* ━━━ STEP3: 完了 ━━━ */
#step3 { text-align: center; padding: 32px 0; }
.complete-icon { font-size: 48px; margin-bottom: 12px; }
.complete-msg { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.complete-sub { font-size: 13px; color: var(--text2); }

/* ── ナビゲーションボタン ── */
.nav-buttons {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.btn-back {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
}
.btn-next {
  flex: 1;
  background: var(--accent);
  border: none;
  color: #0f0e0c;
  padding: 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: background .2s;
}
.btn-next:hover { background: var(--accent2); }
.btn-next:disabled { opacity: .4; cursor: not-allowed; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ブラインド結果入力モーダル
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#result-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  overflow-y: auto;
}
#result-modal.open { display: block; }
#result-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 520px;
  margin: 24px auto;
}
.result-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.result-mark-label {
  font-size: 14px;
  font-weight: 700;
  background: var(--blind);
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  min-width: 44px;
  text-align: center;
}
.result-arrow { color: var(--text3); font-size: 16px; }
.result-select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 4px;
  font-size: 13px;
  outline: none;
}
.result-select:focus { border-color: var(--accent); }
.winner-row {
  padding: 12px 16px;
  background: var(--surface2);
}
.winner-row label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
.winner-options { display: flex; flex-wrap: wrap; gap: 6px; }
.winner-opt {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.winner-opt.selected {
  background: var(--accent);
  color: #0f0e0c;
  border-color: var(--accent);
  font-weight: 700;
}

/* ── トースト ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  transition: transform .3s;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--green); }
#toast.error { background: var(--red); }
</style>
</head>
<body>

<!-- トップバー -->
<div id="topbar">
  <span class="brand">🥃 テキーラ道場</span>
  <a href="admin.html">⚙ 管理</a>
  <a href="home.html">🏠 ホーム</a>
  <a id="btn-logout" href="#">ログアウト</a>
</div>

<!-- メイン -->
<div id="main">
  <div id="loading">
    <div class="spinner"></div>
    <div>読み込み中...</div>
  </div>

  <div id="content" style="display:none">
    <!-- 新規注文ボタン -->
    <button id="btn-new-order" onclick="openOrderModal()">＋ 新規注文</button>

    <!-- セクション1: 未提供 -->
    <div class="section" id="section-pending">
      <div class="section-header">
        <span class="section-title" style="color:#e67e22">📋 未提供</span>
        <span class="section-count" id="count-pending">0</span>
        <div class="section-action">
          <button id="btn-serve-all" onclick="serveChecked()">✓ 提供済みにする</button>
        </div>
      </div>
      <div id="list-pending"><div class="empty">未提供の注文はありません</div></div>
    </div>

      <span class="modal-title">🎭 ブラインド結果入力</span>

      <button class="btn-next" onclick="saveResult()">結果を保存</button>
    </div>
  </div>

<!-- トースト -->
<div id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Firebase初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const firebaseConfig = {
  apiKey: "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain: "tequiladojo.firebaseapp.com",
  projectId: "tequiladojo",
  appId: "1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// グローバル状態
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let todayStr = ''; // YYMMDD
let allGroups = []; // 注文グループ一覧
let allVisits = []; // 来場者一覧（当日）
let allMembers = {};
let blindResultsSet = new Set(); // 結果入力済みorderGroupId
let masterData = { tequila: [], other: [], misc: [], set: [] };
let blindMarks = [];

// 注文作成フロー
let orderFlow = {
  step: 0,
  visit: null,
  cart: [],
  isBlind: false
};

// ブラインド結果入力
let resultTarget = null; // {group, orders}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 認証
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auth.onAuthStateChanged(user => {
  if (!user) { location.href = 'index.html'; return; }
  init();
});
document.getElementById('btn-logout').onclick = e => {
  e.preventDefault();
  auth.signOut();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function init() {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  todayStr = yy + mm + dd;

  await Promise.all([
    loadMasters(),
    loadTodayData()
  ]);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  renderOrderList();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// マスタ読み込み
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadMasters() {
  const [membSnap, blindSnap, bottleSnap, miscSnap, setSnap, otherSnap] = await Promise.all([
    db.collection('members').get(),
    db.collection('blindMarks').get(),
    db.collection('bottleData').get(),
    db.collection('miscProducts').get(),
    db.collection('setProducts').get(),
    db.collection('otherBottles').get()
  ]);

  // 会員
  membSnap.forEach(d => { allMembers[d.id] = d.data(); });

  // ブラインドマーク
  blindMarks = [];
  blindSnap.forEach(d => blindMarks.push({id: d.id, ...d.data()}));
  blindMarks.sort((a,b) => (a.sortOrder||0)-(b.sortOrder||0));

  // テキーラ
  masterData.tequila = [];
  bottleSnap.forEach(d => {
    const v = d.data();
    if (v.visibility !== false) masterData.tequila.push({id:d.id,...v, type:'tequila'});
  });

  // 他酒
  masterData.other = [];
  otherSnap.forEach(d => masterData.other.push({id:d.id,...d.data(), type:'other'}));

  // その他
  masterData.misc = [];
  miscSnap.forEach(d => masterData.misc.push({id:d.id,...d.data(), type:'misc'}));

  // セット
  masterData.set = [];
  setSnap.forEach(d => masterData.set.push({id:d.id,...d.data(), type:'set'}));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 当日データ読み込み
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadTodayData() {
  const [visitsSnap, ordersSnap, resultsSnap] = await Promise.all([
    db.collection('visits').get(),
    db.collection('orders').get(),
    db.collection('blindResults').get()
  ]);

  // 来場者（当日）
  allVisits = [];
  visitsSnap.forEach(d => {
    if (d.id.startsWith(todayStr)) allVisits.push({id:d.id,...d.data()});
  });
  allVisits.sort((a,b) => (a.seq||0)-(b.seq||0));

  // ブラインド結果入力済み
  blindResultsSet = new Set();
  resultsSnap.forEach(d => blindResultsSet.add(d.id));

  // 注文データ（当日）→ グループ化
  const groupMap = {};
  ordersSnap.forEach(d => {
    if (!d.id.startsWith(todayStr)) return;
    const o = {id:d.id,...d.data()};
    const gid = o.orderGroupId;
    if (!gid) return;
    if (!groupMap[gid]) groupMap[gid] = [];
    groupMap[gid].push(o);
  });

  // グループオブジェクト作成
  allGroups = Object.entries(groupMap).map(([gid, orders]) => {
    // served値はグループ内の最初の有効な値を使う（同一グループは同じservedのはず）
    const sample = orders.find(o => o.served !== undefined) || orders[0];
    const served = sample.served ?? 1;
    const isBlind = orders.some(o => o.blindId === 1);
    const hasResult = blindResultsSet.has(gid);
    const total = orders.reduce((s,o) => s + calcItemAmount(o), 0);
    return { gid, orders, served, isBlind, hasResult, total,
             visitKey: sample.visitKey, orderTime: sample.orderTime };
  });
  allGroups.sort((a,b) => a.gid.localeCompare(b.gid));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 金額計算
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcItemAmount(o) {
  if (o.productType === 'tequila' || o.productType === 'other') {
    return Math.round((o.unitPrice * o.qty) / 10);
  }
  return o.unitPrice * o.qty;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 注文一覧描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderOrderList() {
  const pending = allGroups.filter(g => g.served === 1); // 未提供
  const blindPending = allGroups.filter(g => g.served === 2 && g.isBlind && !g.hasResult); // 結果未入力
  const done = allGroups.filter(g =>
    g.served === 2 && (!g.isBlind || g.hasResult) ||
    g.served === 0
  ); // 完了

  document.getElementById('count-pending').textContent = pending.length;
  document.getElementById('count-blind-pending').textContent = blindPending.length;
  document.getElementById('count-done').textContent = done.length;

  renderSection('list-pending', pending, 'pending');
  renderSection('list-blind-pending', blindPending, 'blind-pending');
  renderSection('list-done', done, 'done');

  updateServeButton();
}

function renderSection(containerId, groups, mode) {
  const el = document.getElementById(containerId);
  if (!groups.length) {
    el.innerHTML = '<div class="empty">なし</div>';
    return;
  }
  el.innerHTML = groups.map(g => buildGroupCard(g, mode)).join('');
}

function buildGroupCard(g, mode) {
  const visit = allVisits.find(v => v.id === g.visitKey);
  const memberName = visit?.memberId && allMembers[visit.memberId]
    ? allMembers[visit.memberId].name
    : `ゲスト（来店ID: ${g.visitKey}）`;

  const isDone = mode === 'done';
  const showCheckbox = mode === 'pending';
  const showResultBtn = mode === 'blind-pending';

  // 商品リスト
  const validOrders = g.orders.filter(o => o.served !== 0);
  const isSingle = validOrders.length === 1;
  const listHtml = validOrders.map(o => {
    const amt = calcItemAmount(o);
    const markBadge = o.blindId === 1 && o.blindMarkId
      ? `<span class="item-mark">${o.blindMarkId}</span>` : '';
    return `<div class="item-row">
      ${markBadge}
      <span class="item-name">${escHtml(o.productName)}</span>
      <span class="item-qty">${o.qty}${o.unit}</span>
      <span class="item-price">¥${amt.toLocaleString()}</span>
    </div>`;
  }).join('');

  const timeStr = g.orderTime ? g.orderTime.slice(0,2)+':'+g.orderTime.slice(2,4) : '';
  const blindBadge = g.isBlind ? '<span class="blind-badge">🎭 BLIND</span>' : '';

  return `<div class="group-card ${isDone?'done':''}" id="card-${g.gid}">
    <div class="group-header" onclick="toggleItems('${g.gid}')">
      ${showCheckbox ? `<input type="checkbox" class="group-checkbox serve-cb" data-gid="${g.gid}" onclick="event.stopPropagation(); updateServeButton()">` : ''}
      <div class="group-info">
        <div class="group-row1">
          <span class="group-id">${g.gid}</span>
          <span class="group-customer">${escHtml(memberName)}</span>
          ${blindBadge}
        </div>
        <div class="group-row2">
          <span class="group-time">${timeStr}</span>
          ${isSingle ? `<span style="font-size:12px;color:var(--text2)">${escHtml(validOrders[0].productName)} ${validOrders[0].qty}${validOrders[0].unit}</span>` : `<button class="toggle-btn" onclick="event.stopPropagation(); toggleItems('${g.gid}')">▼ ${validOrders.length}品</button>`}
        </div>
      </div>
      <div class="card-actions">
        <span class="group-total">¥${g.total.toLocaleString()}</span>
        ${showResultBtn ? `<button class="btn-result" onclick="event.stopPropagation(); openResultModal('${g.gid}')">結果入力</button>` : ''}
      </div>
    </div>
    <div class="item-list" id="items-${g.gid}" style="${isSingle?'':'display:none'}">
      ${listHtml}
    </div>
  </div>`;
}

function toggleItems(gid) {
  const el = document.getElementById('items-'+gid);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  // ボタンのラベル更新
  const card = document.getElementById('card-'+gid);
  if (!card) return;
  const btn = card.querySelector('.toggle-btn');
  if (btn) btn.textContent = el.style.display === 'none'
    ? '▼ ' + btn.textContent.replace(/[▼▲]\s*/,'').replace(/品.*$/,'') + '品'
    : '▲ ' + btn.textContent.replace(/[▼▲]\s*/,'').replace(/品.*$/,'') + '品';
}

function updateServeButton() {
  const cbs = document.querySelectorAll('.serve-cb:checked');
  const btn = document.getElementById('btn-serve-all');
  if (cbs.length > 0) {
    btn.classList.add('visible');
    btn.textContent = `✓ ${cbs.length}グループを提供済みにする`;
  } else {
    btn.classList.remove('visible');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 一括提供処理
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function serveChecked() {
  const cbs = [...document.querySelectorAll('.serve-cb:checked')];
  if (!cbs.length) return;
  const gids = cbs.map(cb => cb.dataset.gid);

  try {
    const batch = db.batch();
    for (const gid of gids) {
      const group = allGroups.find(g => g.gid === gid);
      if (!group) continue;
      for (const o of group.orders) {
        if (o.served !== 0) { // キャンセル以外を提供済みへ
          batch.update(db.collection('orders').doc(o.id), { served: 2 });
        }
      }
      group.served = 2;
    }
    await batch.commit();
    showToast(`${gids.length}グループを提供済みにしました`, 'success');
    await loadTodayData();
    renderOrderList();
  } catch(e) {
    showToast('エラー: '+e.message, 'error');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ブラインド結果入力モーダル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openResultModal(gid) {
  const group = allGroups.find(g => g.gid === gid);
  if (!group) return;
  resultTarget = group;

  const blindOrders = group.orders.filter(o => o.blindId === 1 && o.served !== 0);
  const visit = allVisits.find(v => v.id === group.visitKey);
  const memberName = visit?.memberId && allMembers[visit.memberId]
    ? allMembers[visit.memberId].name
    : `ゲスト（${group.visitKey}）`;

  // 商品選択肢
  const productOptions = blindOrders.map(o =>
    `<option value="${o.id}">${escHtml(o.productName)}</option>`).join('');

  // マーク行
  const marks = [...new Set(blindOrders.map(o => o.blindMarkId))];
  const rows = marks.map(m => `
    <div class="result-row">
      <span class="result-mark-label">${escHtml(m)}</span>
      <span class="result-arrow">→</span>
      <select class="result-select" data-mark="${escHtml(m)}">
        <option value="">（実体を選択）</option>
        ${productOptions}
      </select>
    </div>`).join('');

  // 一番美味しかったマーク
  const winnerOpts = marks.map(m =>
    `<div class="winner-opt" data-mark="${escHtml(m)}" onclick="selectWinner(this)">${escHtml(m)}</div>`
  ).join('');

  document.getElementById('result-body').innerHTML = `
    <div style="padding:12px 16px;background:var(--surface2);font-size:13px;color:var(--text2)">
      来場者: <strong>${escHtml(memberName)}</strong>
    </div>
    ${rows}
    <div class="winner-row">
      <label>🏆 一番美味しかったのは？</label>
      <div class="winner-options">${winnerOpts}</div>
    </div>`;

  document.getElementById('result-modal').classList.add('open');
}

function selectWinner(el) {
  document.querySelectorAll('.winner-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function closeResultModal() {
  document.getElementById('result-modal').classList.remove('open');
  resultTarget = null;
}

async function saveResult() {
  if (!resultTarget) return;
  const group = resultTarget;
  const blindOrders = group.orders.filter(o => o.blindId === 1 && o.served !== 0);

  // マーク→実体の回答収集
  const selects = document.querySelectorAll('.result-select');
  const answers = [];
  for (const sel of selects) {
    const markId = sel.dataset.mark;
    const guessId = sel.value;
    if (!guessId) { showToast('すべてのマークに回答してください', 'error'); return; }
    const actualOrder = blindOrders.find(o => o.blindMarkId === markId);
    const guessOrder = blindOrders.find(o => o.id === guessId);
    answers.push({
      blindMarkId: markId,
      actualOrderId: actualOrder?.id || '',
      actualProduct: actualOrder?.productName || '',
      guessOrderId: guessId,
      guessProduct: guessOrder?.productName || '',
      isCorrect: actualOrder?.id === guessId
    });
  }

  const winner = document.querySelector('.winner-opt.selected');
  if (!winner) { showToast('一番美味しかったマークを選んでください', 'error'); return; }

  const correctCount = answers.filter(a => a.isCorrect).length;
  const visit = allVisits.find(v => v.id === group.visitKey);

  const resultDoc = {
    id: group.gid,
    groupId: group.gid,
    visitKey: group.visitKey,
    customerId: visit?.memberId || null,
    answeredAt: firebase.firestore.FieldValue.serverTimestamp(),
    answers,
    winner: winner.dataset.mark,
    correctCount,
    totalCount: answers.length
  };

  try {
    await db.collection('blindResults').doc(group.gid).set(resultDoc);
    showToast('結果を保存しました', 'success');
    closeResultModal();
    await loadTodayData();
    renderOrderList();
  } catch(e) {
    showToast('エラー: '+e.message, 'error');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 注文作成フロー
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openOrderModal() {
  orderFlow = { step: 0, visit: null, cart: [], isBlind: false };
  document.getElementById('order-modal').classList.add('open');
  showStep(0);
  renderVisitors();
}

function closeOrderModal() {
  document.getElementById('order-modal').classList.remove('open');
}

function showStep(n) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('step'+i).style.display = i===n ? 'block' : 'none';
    const tab = document.getElementById('stab'+i);
    tab.className = 'step-tab ' + (i < n ? 'done' : i === n ? 'active' : '');
  }
  orderFlow.step = n;
  const titles = ['来場者を選択','商品を選択','注文を確認','完了'];
  document.getElementById('modal-title').textContent = titles[n];
}

// ━━━ STEP0 ━━━
function renderVisitors() {
  const container = document.getElementById('visitor-list-container');
  const inVisits = allVisits.filter(v => !v.checkoutTime);
  if (!inVisits.length) {
    container.innerHTML = '<div class="empty">在店中の来場者がいません</div>';
    return;
  }
  container.innerHTML = inVisits.map(v => {
    const m = v.memberId && allMembers[v.memberId];
    const name = m ? m.name : `ゲスト（来店ID: ${v.id}）`;
    const sub = v.memberId ? `会員ID: ${v.memberId}` : v.id;
    return `<div class="visitor-card" id="vc-${v.id}" onclick="selectVisitor('${v.id}')">
      <div class="visitor-name">${escHtml(name)}</div>
      <div class="visitor-sub">${escHtml(sub)} | 来店: ${v.visitTime||''}</div>
    </div>`;
  }).join('');
}

function selectVisitor(vid) {
  document.querySelectorAll('.visitor-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('vc-'+vid);
  if (card) card.classList.add('selected');
  orderFlow.visit = allVisits.find(v => v.id === vid);
  document.getElementById('btn-to-step1').disabled = false;
}

function goStep0() { showStep(0); renderVisitors(); }

// ━━━ STEP1 ━━━
let currentPTab = 'tequila';
let currentNOM = '';
let pendingProduct = null;

function goStep1() {
  if (!orderFlow.visit) return;
  showStep(1);
  switchPTab('tequila', document.querySelector('.ptab.active') || document.querySelectorAll('.ptab')[0]);
  renderCart();
}

function switchPTab(type, el) {
  currentPTab = type;
  currentNOM = '';
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');

  const nomArea = document.getElementById('nom-shortcuts-area');
  const searchEl = document.getElementById('product-search');
  const searchBox = searchEl.parentElement;

  if (type === 'tequila') {
    nomArea.style.display = 'flex';
    searchEl.style.display = 'block';
    renderNOMShortcuts();
  } else if (type === 'set') {
    nomArea.style.display = 'none';
    searchEl.style.display = 'none';
  } else {
    nomArea.style.display = 'none';
    searchEl.style.display = 'block';
  }
  document.getElementById('product-search').value = '';
  filterProducts();
}

function renderNOMShortcuts() {
  const noms = ['1123','1579','1414','1545','1139','1474'];
  const el = document.getElementById('nom-shortcuts-area');
  el.innerHTML = noms.map(n =>
    `<button class="nom-btn ${currentNOM===n?'active':''}" onclick="setNOM('${n}',this)">NOM ${n}</button>`
  ).join('');
}

function setNOM(n, el) {
  currentNOM = currentNOM === n ? '' : n;
  renderNOMShortcuts();
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('product-search').value.toLowerCase();
  const container = document.getElementById('product-list-container');

  if (currentPTab === 'set') {
    const sets = masterData.set;
    if (!sets.length) { container.innerHTML = '<div class="empty">データなし</div>'; return; }
    container.innerHTML = sets.map(s => {
      const badge = `<span class="set-type-badge set-type-${s.setType||0}">${['通常','段位','イベント'][s.setType||0]}</span>`;
      return `<div class="set-item" onclick="addSetToCart('${s.id}')">
        <span class="set-name">${escHtml(s.setName||s.id)}${badge}</span>
      </div>`;
    }).join('');
    return;
  }

  let items = masterData[currentPTab] || [];
  if (currentNOM && currentPTab === 'tequila') {
    items = items.filter(i => (i.nom||i.brandId||'').startsWith(currentNOM));
  }
  if (q) {
    items = items.filter(i =>
      (i.bottleJa||i.bottleEs||i.name||'').toLowerCase().includes(q) ||
      (i.brandJa||i.brandEs||'').toLowerCase().includes(q) ||
      (i.nom||'').includes(q) ||
      (i.id||'').toLowerCase().includes(q)
    );
  }
  if (!items.length) { container.innerHTML = '<div class="empty">該当なし</div>'; return; }

  container.innerHTML = items.slice(0,50).map(i => {
    const name = i.bottleJa || i.bottleEs || i.name || i.id;
    const sub = i.nom ? `NOM ${i.nom} ` : '';
    const price = i.price ? `¥${i.price}/10ml` : i.unitPrice ? `¥${i.unitPrice}` : '';
    return `<div class="product-item" onclick="openQtyModal('${i.id}')">
      <div>
        <div class="product-item-name">${escHtml(name)}</div>
        <div style="font-size:11px;color:var(--text3)">${escHtml(sub)}</div>
      </div>
      <span class="product-item-price">${escHtml(price)}</span>
    </div>`;
  }).join('');
}

// 数量入力モーダル
function openQtyModal(productId) {
  const items = [...masterData.tequila, ...masterData.other, ...masterData.misc];
  const p = items.find(i => i.id === productId);
  if (!p) return;
  pendingProduct = p;

  const isMl = p.type === 'tequila' || p.type === 'other';
  document.getElementById('qty-product-name').textContent = p.bottleJa || p.bottleEs || p.name || p.id;
  document.getElementById('qty-unit-label').textContent = isMl ? 'ml' : '個';
  const input = document.getElementById('qty-input');
  input.value = isMl ? 30 : 1;
  input.min = 1;

  const presets = isMl
    ? ['10','20','30','45','60']
    : ['1','2','3'];
  document.getElementById('qty-presets').innerHTML = presets.map(v =>
    `<div class="qty-preset" onclick="document.getElementById('qty-input').value='${v}'">${v}</div>`
  ).join('');

  document.getElementById('qty-modal').classList.add('open');
}

function closeQtyModal() {
  document.getElementById('qty-modal').classList.remove('open');
  pendingProduct = null;
}

function confirmQty() {
  if (!pendingProduct) return;
  const qty = parseInt(document.getElementById('qty-input').value);
  if (!qty || qty <= 0) { showToast('数量を入力してください', 'error'); return; }

  const p = pendingProduct;
  const isMl = p.type === 'tequila' || p.type === 'other';
  const unitPrice = p.price || p.unitPrice || 0;

  orderFlow.cart.push({
    productId: p.id,
    productName: p.bottleJa || p.bottleEs || p.name || p.id,
    productType: p.type,
    qty,
    unit: isMl ? 'ml' : '個',
    unitPrice,
    blindMarkId: null
  });

  closeQtyModal();
  renderCart();
  updateStep1NextBtn();
}

function addSetToCart(setId) {
  const set = masterData.set.find(s => s.id === setId);
  if (!set) return;
  // セット内の各アイテムをカートに追加
  for (let i = 1; i <= 8; i++) {
    const itemId = set[`item0${i}`];
    if (!itemId) continue;
    const itemType = set[`itemType0${i}`] || 'misc';
    const itemName = set[`itemName0${i}`] || itemId;
    const itemPrice = set[`itemPrice0${i}`] || 0;
    const isMl = itemType === 'tequila' || itemType === 'other';
    orderFlow.cart.push({
      productId: itemId,
      productName: itemName,
      productType: itemType,
      qty: isMl ? 30 : 1,
      unit: isMl ? 'ml' : '個',
      unitPrice: itemPrice,
      blindMarkId: null
    });
  }
  renderCart();
  updateStep1NextBtn();
  showToast('セット商品を追加しました', 'success');
}

function removeCartItem(idx) {
  orderFlow.cart.splice(idx, 1);
  renderCart();
  updateStep1NextBtn();
}

function renderCart() {
  const items = orderFlow.cart;
  const countEl = document.getElementById('cart-count');
  const totalEl = document.getElementById('cart-total');
  countEl.textContent = items.length + '件';
  const total = items.reduce((s,o) => s + calcCartItemAmount(o), 0);
  totalEl.textContent = '¥' + total.toLocaleString();

  const el = document.getElementById('cart-items');
  if (!items.length) { el.innerHTML = ''; return; }

  const isBlind = document.getElementById('blind-check').checked;
  el.innerHTML = items.map((o,idx) => {
    const amt = calcCartItemAmount(o);
    let markSel = '';
    if (isBlind && (o.productType === 'tequila' || o.productType === 'other')) {
      const opts = blindMarks.map(m =>
        `<option value="${escHtml(m.id)}" ${o.blindMarkId===m.id?'selected':''}>${escHtml(m.label||m.id)}</option>`
      ).join('');
      markSel = `<select class="cart-mark-sel" onchange="setCartMark(${idx},this.value)"><option value="">マーク</option>${opts}</select>`;
    }
    return `<div class="cart-item">
      ${markSel}
      <span class="cart-item-name">${escHtml(o.productName)}</span>
      <span class="cart-item-qty">${o.qty}${o.unit}</span>
      <span class="cart-item-price">¥${amt.toLocaleString()}</span>
      <button class="cart-item-del" onclick="removeCartItem(${idx})">✕</button>
    </div>`;
  }).join('');
}

function setCartMark(idx, markId) {
  if (orderFlow.cart[idx]) orderFlow.cart[idx].blindMarkId = markId || null;
}

function calcCartItemAmount(o) {
  if (o.productType === 'tequila' || o.productType === 'other') {
    return Math.round((o.unitPrice * o.qty) / 10);
  }
  return o.unitPrice * o.qty;
}

function toggleBlindMode() {
  orderFlow.isBlind = document.getElementById('blind-check').checked;
  renderCart();
}

function updateStep1NextBtn() {
  document.getElementById('btn-to-step2').disabled = orderFlow.cart.length === 0;
}

// ━━━ STEP2 ━━━
function goStep2() {
  if (!orderFlow.cart.length) return;
  showStep(2);

  const visit = orderFlow.visit;
  const member = visit?.memberId && allMembers[visit.memberId];
  const name = member ? member.name : `ゲスト（来店ID: ${visit?.id}）`;
  document.getElementById('confirm-visitor').textContent = name;

  const isBlind = document.getElementById('blind-check').checked;
  const items = orderFlow.cart;
  const total = items.reduce((s,o) => s + calcCartItemAmount(o), 0);

  document.getElementById('confirm-items').innerHTML = items.map(o => {
    const amt = calcCartItemAmount(o);
    const mark = o.blindMarkId ? `<span class="item-mark">${escHtml(o.blindMarkId)}</span>` : '';
    return `<div class="confirm-item">
      ${mark}
      <span style="flex:1;font-size:13px">${escHtml(o.productName)}</span>
      <span style="font-size:12px;color:var(--text2)">${o.qty}${o.unit}</span>
      <span style="font-size:13px;color:var(--accent);min-width:55px;text-align:right">¥${amt.toLocaleString()}</span>
    </div>`;
  }).join('');

  document.getElementById('confirm-total').textContent = '¥' + total.toLocaleString();
}

// ━━━ 確定 ━━━
async function confirmOrder() {
  const visit = orderFlow.visit;
  if (!visit) return;

  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const orderTime = hh + min;
  const isBlind = document.getElementById('blind-check').checked;

  // orderGroupId採番
  const existingGroups = allGroups.filter(g => g.visitKey === visit.id);
  const maxSeq = existingGroups.reduce((m, g) => {
    const seq = parseInt(g.gid.slice(8)) || 0;
    return Math.max(m, seq);
  }, 0);
  const newSeq = String(maxSeq + 1).padStart(2, '0');
  const orderGroupId = visit.id + newSeq;

  // 注文ID採番（当日最大+1）
  const todayOrders = allGroups.flatMap(g => g.orders);
  const maxOrderSeq = todayOrders.reduce((m, o) => {
    const seq = parseInt(o.id.slice(6)) || 0;
    return Math.max(m, seq);
  }, 0);

  try {
    const batch = db.batch();
    let seq = maxOrderSeq + 1;

    orderFlow.cart.forEach((item, i) => {
      const orderId = todayStr + String(seq).padStart(3, '0');
      seq++;
      const doc = {
        orderTime,
        customerId: visit.memberId || null,
        visitKey: visit.id,
        orderGroupId,
        itemSeq: i + 1,
        productCode: item.productId,
        productName: item.productName,
        productType: item.productType,
        qty: item.qty,
        unit: item.unit,
        unitPrice: item.unitPrice,
        blindId: isBlind ? 1 : 0,
        blindMarkId: isBlind ? (item.blindMarkId || null) : null,
        served: 1  // 未提供
      };
      batch.set(db.collection('orders').doc(orderId), doc);
    });

    await batch.commit();
    showStep(3);
    document.getElementById('complete-sub').textContent =
      `注文グループID: ${orderGroupId} / ${orderFlow.cart.length}品`;

    await loadTodayData();
    renderOrderList();
  } catch(e) {
    showToast('エラー: '+e.message, 'error');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ユーティリティ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2500);
}
</script>
