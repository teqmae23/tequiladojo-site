<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文管理 | テキーラ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --purple:#6b3fa0;--purple-l:#f0e8fa;
  --orange:#b85c00;--orange-l:#fff0e0;
  --green:#1a6e3a;--green-l:#e0f0e8;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none}
input,select{font-family:var(--sans)}

/* ── ログイン ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:4px}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:24px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink);outline:none}
.lcard input:focus{border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border-radius:var(--r);font-size:14px;font-weight:500}

/* ── アプリ ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-brand{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.08em}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.top-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:var(--r);font-size:11px;text-decoration:none}
.top-logout{background:none;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);padding:5px 10px;border-radius:var(--r);font-size:11px}

/* ── コンテンツ ── */
.content{padding:16px;max-width:700px;margin:0 auto;width:100%;flex:1}
.page-title{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--gold-d);margin-bottom:16px}

/* ── ボタン ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;border:none;white-space:nowrap;cursor:pointer;transition:all .15s}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}.bp:active{transform:scale(.97)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}
.bt{background:var(--teal);color:#fff}.bt:hover{background:#1a8060}
.bpu{background:var(--purple-l);color:var(--purple);border:1px solid rgba(107,63,160,.2)}.bpu:hover{background:#e0d0f5}
.btn-full{width:100%}
.sm{padding:6px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── 新規注文 ── */
#btn-new-order{margin-bottom:20px;font-size:15px;font-weight:700;letter-spacing:.5px}

/* ── セクション ── */
.section{margin-bottom:24px}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--cream3)}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:600}
.sec-count{background:var(--cream2);color:var(--ink3);font-size:11px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
.sec-action{margin-left:auto}
#btn-serve-all{display:none}
#btn-serve-all.visible{display:inline-flex}

/* ── グループカード ── */
.group-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s}
.group-card:hover{box-shadow:var(--shadow)}
.group-card.done{opacity:.4}
.group-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.group-cb{width:17px;height:17px;accent-color:var(--gold-d);cursor:pointer;flex-shrink:0}
.group-info{flex:1;min-width:0}
.group-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.group-id{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.group-customer{font-size:14px;font-weight:700;color:var(--ink)}
.blind-badge{background:var(--purple);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.group-row2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.group-time{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.group-total{font-size:13px;font-weight:700;color:var(--gold-d);white-space:nowrap}
.toggle-btn{background:var(--cream2);border:1px solid var(--border2);color:var(--ink3);font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold-d)}
.card-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}

/* ── 商品リスト ── */
.item-list{border-top:1px solid var(--border);background:var(--cream)}
.item-row{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.item-row:last-child{border-bottom:none}
.item-mark{font-size:10px;background:var(--purple);color:#fff;padding:1px 5px;border-radius:3px;min-width:28px;text-align:center;font-family:var(--mono)}
.item-name{flex:1;color:var(--ink)}
.item-qty{color:var(--ink3);min-width:50px;text-align:right;font-size:12px}
.item-price{color:var(--gold-d);min-width:60px;text-align:right;font-weight:600;font-size:12px}

/* ── ローディング・空 ── */
#loading{text-align:center;padding:48px;color:var(--ink3)}
.spinner{width:32px;height:32px;border:3px solid var(--cream3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--ink3);font-size:13px;padding:12px 0;text-align:center}

/* ━━━ モーダル共通 ━━━ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(24,17,10,.55);z-index:200;overflow-y:auto;padding:20px 16px}
.modal-overlay.open{display:block}
.modal-panel{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);max-width:560px;margin:0 auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:10px}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--gold-d);flex:1}
.modal-body{padding:16px}

/* ── ステップ ── */
.step-indicator{display:flex;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2);margin-bottom:16px}
.step-tab{flex:1;text-align:center;padding:8px 4px;font-size:11px;color:var(--ink3);background:var(--cream2);border-right:1px solid var(--border2);transition:all .2s}
.step-tab:last-child{border-right:none}
.step-tab.active{background:var(--gold-d);color:var(--cream);font-weight:700}
.step-tab.done{background:var(--cream);color:var(--ink2)}

/* ── 来場者カード ── */
.visitor-card{background:var(--cream);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.visitor-card:hover{border-color:var(--gold)}
.visitor-card.selected{border-color:var(--gold-d);background:var(--orange-l)}
.visitor-cb{width:17px;height:17px;accent-color:var(--gold-d);cursor:pointer;flex-shrink:0}
.visitor-name{font-size:14px;font-weight:700;color:var(--ink)}
.visitor-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* ── 商品タブ ── */
.product-tabs{display:flex;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2);margin-bottom:10px}
.ptab{flex:1;text-align:center;padding:7px 4px;font-size:12px;background:var(--cream2);border-right:1px solid var(--border2);cursor:pointer;transition:all .15s;color:var(--ink3)}
.ptab:last-child{border-right:none}
.ptab.active{background:var(--gold-d);color:var(--cream);font-weight:700}

/* NOM */
.nom-shortcuts{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.nom-btn{background:var(--cream2);border:1px solid var(--border2);color:var(--ink3);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.nom-btn:hover{border-color:var(--gold);color:var(--gold-d)}
.nom-btn.active{background:var(--gold-d);color:var(--cream);border-color:var(--gold-d)}

/* 商品検索 */
.fi{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--cream);width:100%;margin-bottom:8px;outline:none}
.fi:focus{border-color:var(--gold)}
.product-list-wrap{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.product-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.product-item:last-child{border-bottom:none}
.product-item:hover{background:var(--cream)}
.product-item-name{font-size:13px;color:var(--ink)}
.product-item-sub{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.product-item-price{font-size:11px;color:var(--gold-d);font-weight:600}

/* ブラインドチェック */
.blind-check-area{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-bottom:8px}
.blind-check-area input[type=checkbox]{width:17px;height:17px;accent-color:var(--purple)}
.blind-check-area label{font-size:13px;color:var(--ink2);cursor:pointer;user-select:none}

/* カート */
.cart-header{font-size:12px;color:var(--ink3);margin:10px 0 6px;display:flex;gap:8px;align-items:center}
.cart-item{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.cart-item:last-child{border-bottom:none}
.cart-mark-sel{background:var(--cream);border:1px solid var(--border2);color:var(--ink);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer;outline:none;max-width:90px}
.cart-mark-sel:focus{border-color:var(--gold)}
.cart-item-name{flex:1;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-qty{font-size:11px;color:var(--ink3);white-space:nowrap}
.cart-item-price{font-size:12px;color:var(--gold-d);font-weight:600;min-width:55px;text-align:right;white-space:nowrap}
.cart-item-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:.6;flex-shrink:0}
.cart-item-del:hover{opacity:1}
.cart-qty-input{width:52px;padding:3px 6px;border:1px solid var(--border2);border-radius:4px;font-size:13px;font-family:var(--mono);text-align:center;background:var(--cream);color:var(--ink);outline:none}
.cart-qty-input:focus{border-color:var(--gold)}

/* セット */
.set-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.set-item:hover{background:var(--cream)}
.set-item:last-child{border-bottom:none}
.set-type-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px}
.set-type-0{background:var(--cream2);color:var(--ink3)}
.set-type-1{background:var(--gold-d);color:var(--cream)}
.set-type-2{background:var(--purple);color:#fff}

/* 確認 */
.confirm-label{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.confirm-value{font-size:14px;color:var(--ink);margin-bottom:12px}
.confirm-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.confirm-item:last-child{border-bottom:none}
.confirm-total{display:flex;justify-content:flex-end;align-items:baseline;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* 完了 */
.complete-wrap{text-align:center;padding:32px 0}
.complete-icon{font-size:48px;margin-bottom:12px}
.complete-msg{font-family:var(--serif);font-size:20px;color:var(--gold-d);margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--ink3)}

/* ナビ */
.nav-buttons{display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.nav-buttons .btn{flex:1}

/* 数量モーダル */
#qty-modal{display:none;position:fixed;inset:0;background:rgba(24,17,10,.6);z-index:300;align-items:center;justify-content:center;padding:20px}
#qty-modal.open{display:flex}
#qty-panel{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;min-width:280px;box-shadow:var(--shadow-lg)}
#qty-panel h3{font-family:var(--serif);font-size:16px;color:var(--gold-d);margin-bottom:12px}
#qty-input{width:100%;padding:10px;border:1px solid var(--border2);border-radius:var(--r);font-size:20px;text-align:center;outline:none;background:var(--cream);color:var(--ink);margin-bottom:4px}
#qty-input:focus{border-color:var(--gold)}
.qty-unit{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:10px}
.qty-presets{display:flex;gap:6px;margin-bottom:14px}
.qty-preset{flex:1;background:var(--cream2);border:1px solid var(--border2);color:var(--ink2);padding:7px;border-radius:var(--r);cursor:pointer;text-align:center;font-size:13px;font-family:var(--mono);transition:all .15s}
.qty-preset:hover{border-color:var(--gold);color:var(--gold-d)}
.qty-buttons{display:flex;gap:8px}
.qty-buttons .btn{flex:1}

/* 結果入力（表形式） */
.result-info{padding:10px 16px;background:var(--cream);font-size:13px;color:var(--ink2);border-bottom:1px solid var(--border)}
.blind-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.blind-table{border-collapse:collapse;width:100%;font-size:12px}
.blind-table th,.blind-table td{border:1px solid var(--border2);padding:3px 2px;text-align:center;white-space:nowrap}
.blind-table th{background:var(--cream2);font-size:10px;font-weight:600;color:var(--ink3)}
.blind-table th.mark-head{font-size:12px;padding:3px 2px;min-width:32px}
.blind-table td.name-cell{text-align:left;font-weight:600;font-size:12px;color:var(--ink);background:var(--cream);padding-left:8px;padding-right:6px;min-width:60px;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.blind-table td.mark-cell{padding:2px;min-width:32px;width:32px}
.blind-table td.winner-cell{padding:2px;min-width:32px;width:32px}
.blind-table td.score-cell{font-family:var(--mono);font-weight:700;color:var(--gold-d);min-width:36px;font-size:11px}
.blind-table td.correct{background:#d4edda}
.blind-table td.wrong{background:#f8d7da}
.mark-legend{padding:8px 16px;background:var(--cream);border-top:1px solid var(--border)}
.mark-legend-title{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.mark-legend-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px}
.mark-legend-dot{font-size:13px;min-width:22px;text-align:center}
.mark-legend-name{color:var(--ink2)}
.result-action-bar{padding:10px 16px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--cream2)}
.result-score-summary{padding:10px 16px;background:var(--teal-l);border-top:1px solid var(--border);font-size:13px;color:var(--ink2);display:none}

/* テーブル内マークピッカー専用（fixed表示） */
.tbl-mark-picker{position:relative;display:inline-block}
.tbl-mark-btn{display:inline-flex;align-items:center;gap:1px;padding:2px 3px;background:var(--cream);border:1px solid var(--border2);border-radius:4px;cursor:pointer;min-width:28px;width:28px;justify-content:center;user-select:none;transition:border-color .15s}
.tbl-mark-btn:hover{border-color:var(--gold)}
.tbl-mark-btn.selected{border-color:var(--gold-d);background:var(--cream2)}
.tbl-mark-caret{font-size:7px;color:var(--ink3);flex-shrink:0}
/* パネルはfixedでDOMルート直下に出す */
.tbl-mark-panel{display:none;position:fixed;background:var(--white);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:9999;padding:3px;min-width:36px}
.tbl-mark-panel.open{display:block}
.tbl-mark-opt{display:flex;align-items:center;justify-content:center;padding:3px 4px;border-radius:3px;cursor:pointer;font-size:13px;transition:background .1s}
.tbl-mark-opt:hover{background:var(--cream2)}
.tbl-mark-opt.active{background:var(--cream3)}
.tbl-mark-none{font-size:10px;color:var(--ink3);text-align:center;padding:4px 3px;cursor:pointer;border-radius:3px}
.tbl-mark-none:hover{background:var(--cream2)}

/* ── カスタムマークドロップダウン ── */
.mark-picker{position:relative;display:inline-block;flex-shrink:0}
.mark-picker-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--cream);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:16px;min-width:44px;justify-content:center;transition:border-color .15s;user-select:none}
.mark-picker-btn:hover{border-color:var(--gold)}
.mark-picker-btn.selected{border-color:var(--gold-d);background:var(--cream2)}
.mark-picker-caret{font-size:9px;color:var(--ink3)}
.mark-picker-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:400;min-width:56px;padding:4px}
.mark-picker-panel.open{display:block}
.mark-picker-opt{display:flex;align-items:center;justify-content:center;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:16px;transition:background .1s}
.mark-picker-opt:hover{background:var(--cream2)}
.mark-picker-opt.active{background:var(--cream3)}
.mark-picker-none{font-size:11px;color:var(--ink3);text-align:center;padding:5px 4px;cursor:pointer;border-radius:4px}
.mark-picker-none:hover{background:var(--cream2)}

/* ── batchカード（同時注文グループ） ── */
.batch-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.batch-card:hover{box-shadow:var(--shadow)}
.batch-card.done{opacity:.45}
.batch-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--cream2);border-bottom:1px solid var(--border);cursor:pointer}
.batch-id{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.batch-names{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.batch-time{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.batch-total{font-size:13px;font-weight:700;color:var(--gold-d);white-space:nowrap}
.batch-body{padding:0}
.batch-member{border-bottom:1px solid var(--border)}
.batch-member:last-child{border-bottom:none}
.batch-member-header{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer}
.batch-member-name{font-size:13px;color:var(--ink2);flex:1}
.batch-member-total{font-size:12px;color:var(--gold-d);font-weight:600}
.batch-member-items{background:var(--cream);padding:0 12px;display:none}
.batch-member-items.open{display:block}
.batch-actions{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--cream);border-top:1px solid var(--border);flex-wrap:wrap}

/* トースト */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--teal);color:#fff}
#toast.error{background:var(--red);color:#fff}
#toast.info{background:var(--ink);color:var(--cream)}
</style>
</head>
<body>

<!-- ログイン -->

  <div class="lcard">
    <div class="llogo">🥃</div>
    <div class="lbrand">テキーラ道場</div>
    <label>メールアドレス</label>
    <input type="email" id="login-email" placeholder="email@example.com">
    <label>パスワード</label>

    <div class="lerr" id="login-err"></div>
    <button class="lbtn" onclick="doLogin()">ログイン</button>

</div>

<!-- アプリ -->
<div id="app">
  <div class="topbar">
    <span class="top-brand">🥃 テキーラ道場</span>

      <a href="home.html" class="top-back">🏠 ホーム</a>
      <button class="top-logout" onclick="auth.signOut()">ログアウト</button>

  <div class="content">
    <div class="page-title">注文管理</div>

    <div id="content-area" style="display:none">

          <div class="sec-action" style="display:flex;gap:6px">
            <button class="btn bd sm" id="btn-cancel-pending" style="display:none" onclick="cancelChecked('pending')">✕ キャンセル</button>
            <button class="btn bt sm" id="btn-serve-all" onclick="serveChecked()">✓ 提供済みにする</button>
          </div>
        </div>
        <div id="list-pending"><div class="empty">なし</div></div>
      </div>

      <div class="section">
        <div class="sec-header">
          <span class="sec-title" style="color:var(--purple)">🎭 ブラインド結果未入力</span>
          <span class="sec-count" id="count-blind-pending">0</span>
          <div class="sec-action">
            <button class="btn bd sm" id="btn-cancel-blind" style="display:none" onclick="cancelChecked('blind')">✕ キャンセル</button>

      <!-- 完了 -->

          <span id="done-toggle-icon" style="margin-left:auto;color:var(--ink3);font-size:12px">▶ 表示</span>

          <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px">

          </div>

  </div>
</div>

<!-- 注文作成モーダル -->
<div class="modal-overlay" id="order-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">来場者を選択</span>
      <button class="btn bs sm" onclick="closeOrderModal()">✕ 閉じる</button>
    </div>
    <div class="step-indicator">

      <div class="step-tab" id="stab1">②商品選択</div>
      <div class="step-tab" id="stab2">③確認</div>
      <div class="step-tab" id="stab3">④完了</div>
    </div>
    <div class="modal-body">

      <!-- STEP0 -->
      <div id="step0">
        <div style="font-size:11px;color:var(--ink3);margin-bottom:10px">複数人選択可（同じ商品を提供する場合は同時選択してください）</div>
        <div id="visitor-list-container"><div class="empty">読み込み中...</div></div>

          <button class="btn bp" id="btn-to-step1" onclick="goStep1()" disabled>次へ →</button>

      <!-- STEP1 -->
      <div id="step1" style="display:none">
        <div class="blind-check-area">

            <span style="margin-left:auto">合計: <strong style="color:var(--gold-d)" id="cart-total">¥0</strong></span>

          <span style="font-size:13px;color:var(--ink3)">合計（1人分）</span>
          <span style="font-family:var(--serif);font-size:20px;font-weight:600;color:var(--gold-d)" id="confirm-total"></span>
        </div>
        <div class="nav-buttons">
          <button class="btn bs" onclick="goStep1()">← 戻る</button>
          <button class="btn bp" onclick="confirmOrder()">注文を確定する</button>
        </div>
      </div>

      <!-- STEP3 -->
      <div id="step3" style="display:none">

<script>
// ━━━ Firebase ━━━
const firebaseConfig = {
  apiKey: "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain: "tequiladojo.firebaseapp.com",
  projectId: "tequiladojo",
  appId: "1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ━━━ 状態 ━━━
let todayStr='', allGroups=[], allBatchGroups=[], allVisits=[], allMembers={};
let blindResultsSet=new Set();
let masterData={tequila:[],other:[],misc:[],set:[]};
let blindMarks=[];
let flow={visits:[],cart:[],isBlind:false};
let resultTarget=null;
let currentPTab='tequila', currentNOM='', pendingProduct=null;

// ━━━ 認証 ━━━
auth.onAuthStateChanged(user=>{
  const ls=document.getElementById('login-screen');
  const app=document.getElementById('app');
  if(!user){ls.style.display='flex';app.style.display='none';}
  else{ls.style.display='none';app.style.display='flex';init();}
});
async function doLogin(){
  try{ await auth.signInWithEmailAndPassword(
    document.getElementById('login-email').value,
    document.getElementById('login-pass').value
  );}catch(e){document.getElementById('login-err').textContent='ログインに失敗しました';}
}

// ━━━ 初期化 ━━━
async function init(){
  const now=new Date();
  todayStr=String(now.getFullYear()).slice(2).padStart(2,'0')
    +String(now.getMonth()+1).padStart(2,'0')
    +String(now.getDate()).padStart(2,'0');
  await Promise.all([loadMasters(),loadTodayData()]);
  document.getElementById('loading').style.display='none';
  document.getElementById('content-area').style.display='block';
  renderOrderList();
}

// ━━━ マスタ ━━━
async function loadMasters(){
  const [membSnap,blindSnap,bottleSnap,miscSnap,setSnap,otherSnap]=await Promise.all([
    db.collection('members').get(),
    db.collection('blindMarks').get(),
    db.collection('bottleData').get(),
    db.collection('miscProducts').get(),
    db.collection('setProducts').get(),
    db.collection('otherBottles').get()
  ]);
  allMembers={};
  membSnap.forEach(d=>{allMembers[d.id]=d.data();});
  blindMarks=[];
  blindSnap.forEach(d=>blindMarks.push({id:d.id,...d.data()}));
  blindMarks.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  masterData.tequila=[];
  bottleSnap.forEach(d=>{const v=d.data();if(v.visibility!==false)masterData.tequila.push({id:d.id,...v,type:'tequila'});});
  masterData.other=[];
  otherSnap.forEach(d=>masterData.other.push({id:d.id,...d.data(),type:'other'}));
  masterData.misc=[];
  miscSnap.forEach(d=>masterData.misc.push({id:d.id,...d.data(),type:'misc'}));
  masterData.set=[];
  setSnap.forEach(d=>masterData.set.push({id:d.id,...d.data(),type:'set'}));
}

// ━━━ 当日データ ━━━
async function loadTodayData(){
  const [visitsSnap,ordersSnap,resultsSnap]=await Promise.all([
    db.collection('visits').get(),
    db.collection('orders').get(),
    db.collection('blindResults').get()
  ]);
  allVisits=[];
  visitsSnap.forEach(d=>{if(d.id.startsWith(todayStr))allVisits.push({id:d.id,...d.data()});});
  allVisits.sort((a,b)=>(a.seq||0)-(b.seq||0));
  blindResultsSet=new Set();
  resultsSnap.forEach(d=>blindResultsSet.add(d.id));

  // orderGroupId単位でグループ化
  const gmap={};
  ordersSnap.forEach(d=>{
    if(!d.id.startsWith(todayStr))return;
    const o={id:d.id,...d.data()};
    if(!o.orderGroupId)return;
    if(!gmap[o.orderGroupId])gmap[o.orderGroupId]=[];
    gmap[o.orderGroupId].push(o);
  });
  allGroups=Object.entries(gmap).map(([gid,orders])=>{
    const sample=orders.find(o=>o.served!==undefined)||orders[0];
    const served=sample.served??1;
    const isBlind=orders.some(o=>o.blindId===1);
    const hasResult=blindResultsSet.has(gid);
    const total=orders.filter(o=>o.served!==0).reduce((s,o)=>s+calcAmt(o),0);
    const batchId=sample.batchId||null;
    return{gid,orders,served,isBlind,hasResult,total,
           visitKey:sample.visitKey,orderTime:sample.orderTime,batchId};
  });
  allGroups.sort((a,b)=>{
    const ta=a.orderTime||'9999',tb=b.orderTime||'9999';
    if(ta!==tb)return ta.localeCompare(tb);
    return(a.visitKey||'').localeCompare(b.visitKey||'');
  });

  // batchId単位でbatchGroupを構築
  // batchIdなしのグループは単独batchGroupとして扱う
  const bmap={};
  allGroups.forEach(g=>{
    const key=g.batchId||('solo_'+g.gid);
    if(!bmap[key])bmap[key]=[];
    bmap[key].push(g);
  });
  allBatchGroups=Object.entries(bmap).map(([bid,groups])=>{
    const served=groups[0].served; // 同一batchは同じserved
    const isBlind=groups.some(g=>g.isBlind);
    const hasResult=groups.every(g=>!g.isBlind||g.hasResult);
    const orderTime=groups[0].orderTime;
    const batchId=groups[0].batchId;
    const total=groups.reduce((s,g)=>s+g.total,0);
    return{bid,groups,served,isBlind,hasResult,orderTime,batchId,total};
  });
  allBatchGroups.sort((a,b)=>{
    const ta=a.orderTime||'9999',tb=b.orderTime||'9999';
    return ta.localeCompare(tb);
  });
}

function calcAmt(o){
  if(o.productType==='tequila'||o.productType==='other')return Math.round((o.unitPrice*o.qty)/10);
  return(o.unitPrice||0)*(o.qty||0);
}

// ━━━ 一覧描画 ━━━
function toggleDoneSection(){
  const body=document.getElementById('done-section-body');
  const icon=document.getElementById('done-toggle-icon');
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  icon.textContent=open?'▶ 表示':'▼ 閉じる';
}

function vLabel(visitKey){
  const v=allVisits.find(x=>x.id===visitKey);
  if(!v)return`来店ID: ${visitKey}`;
  if(v.memberId&&allMembers[v.memberId]){
    const m=allMembers[v.memberId];
    return m.nickname||m.name||v.memberId;
  }
  return`ゲスト（${v.id}）`;
}

function isCheckedOut(visitKey){
  const v=allVisits.find(x=>x.id===visitKey);
  return v?!!v.checkoutTime:false;
}

function renderOrderList(){
  const pending    =allBatchGroups.filter(b=>b.served===1);
  const blindPend  =allBatchGroups.filter(b=>b.served===2);
  const doneAll    =allBatchGroups.filter(b=>b.served===3||b.served===0);

  // 提供済み絞り込み
  const whoF  =(document.getElementById('f-done-who')||{}).value||'';
  const blindF=(document.getElementById('f-done-blind')||{}).value||'';
  const nameF =((document.getElementById('f-done-name')||{}).value||'').toLowerCase();
  const done=doneAll.filter(b=>{
    if(whoF==='in'  &&b.groups.every(g=>isCheckedOut(g.visitKey)))return false;
    if(whoF==='out' &&b.groups.some(g=>!isCheckedOut(g.visitKey)))return false;
    if(blindF==='1' &&!b.isBlind)return false;
    if(nameF){
      const names=b.groups.map(g=>vLabel(g.visitKey).toLowerCase());
      if(!names.some(n=>n.includes(nameF)))return false;
    }
    return true;
  });

  document.getElementById('count-pending').textContent=pending.length;
  document.getElementById('count-blind-pending').textContent=blindPend.length;
  document.getElementById('count-done').textContent=doneAll.length;

  renderBatchSec('list-pending',pending,'pending');
  renderBatchSec('list-blind-pending',blindPend,'blind-pending');
  renderBatchSec('list-done',done,'done');
  updateActionBtns();
}

function renderBatchSec(containerId,batches,mode){
  const el=document.getElementById(containerId);
  if(!el)return;
  if(!batches.length){el.innerHTML='<div class="empty">なし</div>';return;}
  el.innerHTML=batches.map(b=>buildBatchCard(b,mode)).join('');
}

function buildBatchCard(b,mode){
  const isDone=mode==='done';
  const showCb=mode==='pending'||mode==='blind-pending';
  const showResult=mode==='blind-pending';
  const isCancelled=b.served===0;
  const time=b.orderTime?b.orderTime.slice(0,2)+':'+b.orderTime.slice(2):'';
  const bb=b.isBlind?'<span class="blind-badge">🎭 BLIND</span>':'';
  const cancelBadge=isCancelled?'<span style="font-size:10px;background:var(--red-l);color:var(--red);padding:1px 6px;border-radius:3px;font-weight:700">キャンセル</span>':'';
  const names=b.groups.map(g=>esc(vLabel(g.visitKey))).join('・');
  const bidLabel=b.batchId?`<span class="batch-id">${b.batchId}</span>`:'';

  // メンバーごとの注文行
  const memberRows=b.groups.map((g,gi)=>{
    const name=vLabel(g.visitKey);
    const valid=g.orders.filter(o=>o.served!==0);
    const gTotal=g.total;
    const itemsHtml=valid.map(o=>{
      const mk=o.blindId===1&&o.blindMarkId?`<span style="font-size:14px;margin-right:4px">${markDisplay(o.blindMarkId)}</span>`:'';
      return`<div class="item-row">${mk}<span class="item-name">${esc(o.productName)}</span><span class="item-qty">${o.qty}${o.unit}</span><span class="item-price">¥${calcAmt(o).toLocaleString()}</span></div>`;
    }).join('');
    return`<div class="batch-member">
      <div class="batch-member-header" onclick="toggleMemberItems('bmi-${g.gid}')">
        <span class="batch-member-name">${esc(name)}</span>
        <span style="font-size:11px;color:var(--ink3)">${valid.length}品</span>
        <span class="batch-member-total">¥${gTotal.toLocaleString()}</span>
        <span style="font-size:11px;color:var(--ink3);margin-left:4px">▼</span>
      </div>
      <div class="batch-member-items" id="bmi-${g.gid}">${itemsHtml}</div>
    </div>`;
  }).join('');

  // チェックボックス（batch単位）
  const cbHtml=showCb
    ?`<input type="checkbox" class="group-cb action-cb" data-bid="${esc(b.bid)}" data-mode="${mode}" onclick="event.stopPropagation();updateActionBtns()">`
    :'';

  return`<div class="batch-card${isDone?' done':''}" id="bcard-${esc(b.bid)}">
    <div class="batch-header">
      ${cbHtml}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${bidLabel}
          <span class="batch-names">${names}</span>
          ${bb}${cancelBadge}
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
          <span class="batch-time">${time}</span>
          <span style="font-size:11px;color:var(--ink3)">${b.groups.reduce((s,g)=>s+g.orders.filter(o=>o.served!==0).length,0)}品合計</span>
        </div>
      </div>
      <span class="batch-total">¥${b.total.toLocaleString()}</span>
    </div>
    <div class="batch-body">${memberRows}</div>
    ${showResult||showCb?`<div class="batch-actions">
      ${showResult?`<button class="btn bpu sm" onclick="openResultModal('${esc(b.bid)}')">結果入力</button>`:''}
      <div style="flex:1"></div>
    </div>`:''}
  </div>`;

// ━━━ 一括提供 ━━━
async function serveChecked(){
  const bids=[...document.querySelectorAll('.action-cb[data-mode="pending"]:checked')].map(c=>c.dataset.bid);
  if(!bids.length)return;
  try{
    const batch=db.batch();
    for(const bid of bids){
      const b=allBatchGroups.find(x=>x.bid===bid);if(!b)continue;
      const newServed=b.isBlind?2:3;
      for(const g of b.groups)
        for(const o of g.orders)if(o.served!==0)batch.update(db.collection('orders').doc(o.id),{served:newServed});
      b.served=newServed;
    }
    await batch.commit();
    showToast(`${bids.length}グループを提供済みにしました`,'success');
    await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ キャンセル ━━━
async function cancelChecked(section){
  const sel=section==='pending'?'.action-cb[data-mode="pending"]:checked':'.action-cb[data-mode="blind-pending"]:checked';
  const bids=[...document.querySelectorAll(sel)].map(c=>c.dataset.bid);
  if(!bids.length)return;
  if(!confirm(`${bids.length}グループをキャンセルしますか？`))return;
  try{
    const batch=db.batch();
    for(const bid of bids){
      const b=allBatchGroups.find(x=>x.bid===bid);if(!b)continue;
      for(const g of b.groups)
        for(const o of g.orders)batch.update(db.collection('orders').doc(o.id),{served:0});
      b.served=0;
    }
    await batch.commit();
    showToast(`${bids.length}グループをキャンセルしました`,'info');
    await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ 結果入力（表形式） ━━━
// resultState: 入力中の状態管理
// resultState.answers[memberIdx][markIdx] = markId (guess)
// resultState.winners[memberIdx] = markId
let resultState = null;

function openResultModal(bid){
  const b=allBatchGroups.find(x=>x.bid===bid);if(!b)return;
  resultTarget=b;

  // ブラインドが含まれるメンバーのみ
  const members=b.groups.filter(g=>g.isBlind);
  if(!members.length){showToast('ブラインド注文がありません','error');return;}

  // 全blindOrders（マーク一覧の基準）
  const allBlindOrders=members.flatMap(g=>g.orders.filter(o=>o.blindId===1&&o.served!==0));
  const marks=[...new Set(allBlindOrders.map(o=>o.blindMarkId).filter(Boolean))];
  // マーク→実商品マッピング（どの来場者でも同じ商品のはず）
  const markToOrder={};
  marks.forEach(m=>{markToOrder[m]=allBlindOrders.find(o=>o.blindMarkId===m);});

  // 状態初期化
  resultState={
    b, members, marks, markToOrder,
    answers: members.map(()=>marks.map(()=>null)),
    winners: members.map(()=>null),
    revealed: false,
    allConfirmed: false
  };

  renderResultTable();
  document.getElementById('btn-show-result').disabled=false;
  document.getElementById('btn-save-result').disabled=true;
  document.getElementById('result-modal').classList.add('open');
}

function renderResultTable(){
  const {members,marks,markToOrder,answers,winners,revealed}=resultState;
  const memberNames=members.map(g=>vLabel(g.visitKey));
  const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];

  // 列ごとに全員入力済みか（allConfirmed時は強制的に全列true）
  const allConfirmed=resultState.allConfirmed||false;
  const colAllFilled=marks.map((_,mki)=>
    allConfirmed||members.every((_,mi)=>!!answers[mi][mki])
  );
  // 全員の好きが全部入力済みか
  const allWinnerFilled=members.every((_,mi)=>!!winners[mi]);

  // 商品ごとの好き集計（全員入力済み時のみ）
  const winnerCount={};
  if(allWinnerFilled){
    winners.forEach(w=>{if(w)winnerCount[w]=(winnerCount[w]||0)+1;});
  }

  // ── ヘッダー行 ──
  const thMarks=marks.map((m,mi)=>{
    if(revealed&&colAllFilled[mi]){
      const{sym,color}=markSym(blindMarks.find(x=>x.id===m)||{id:m});
      // 数字上・マーク下
      return`<th class="mark-head"><div style="font-size:12px;color:var(--ink3)">${nums[mi]||''}</div><div style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px">${sym}</div></th>`;
    }
    return`<th class="mark-head" style="font-size:13px">${nums[mi]||'?'}</th>`;
  }).join('');
  const thead=`<thead><tr>
    <th style="text-align:left;padding-left:10px">名前</th>
    ${thMarks}
    <th>好</th>
    <th>正解</th>
  </tr></thead>`;

  // ── データ行 ──
  const tbody=members.map((g,mi)=>{
    const cells=marks.map((m,mki)=>{
      const chosen=answers[mi][mki];
      let cellClass='mark-cell';
      let cellContent='';
      if(!revealed){
        cellContent=buildTableMarkPicker(mi,mki,chosen,false);
      } else if(!colAllFilled[mki]){
        if(chosen){
          const{sym,color}=markSym(blindMarks.find(x=>x.id===chosen)||{id:chosen});
          cellContent=`<span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px">${sym}</span>`;
        } else {
          cellContent='<span style="color:var(--ink3)">—</span>';
        }
      } else {
        if(chosen){
          const isCorrect=chosen===marks[mki];
          cellClass+=isCorrect?' correct':' wrong';
          const{sym,color}=markSym(blindMarks.find(x=>x.id===chosen)||{id:chosen});
          cellContent=`<span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px">${sym}</span>`;
        } else {
          cellClass+=' wrong';
          cellContent='<span style="color:var(--ink3)">—</span>';
        }
      }
      return`<td class="${cellClass}">${cellContent}</td>`;
    }).join('');

    // 好きセル
    const w=winners[mi];
    let winnerCell=revealed
      ?(w?(()=>{const{sym,color}=markSym(blindMarks.find(x=>x.id===w)||{id:w});return`<span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px">${sym}</span>`;})():'—')
      :buildTableWinnerPicker(mi,w,false);

    // 正解数（全員入力済みの列のみ集計）
    let scoreCell='—';
    if(revealed){
      const filledMkis=marks.map((_,mki)=>mki).filter(mki=>colAllFilled[mki]);
      const correctCount=filledMkis.filter(mki=>answers[mi][mki]===marks[mki]).length;
      const totalFilled=filledMkis.length;
      if(totalFilled>0){
        const color=correctCount===totalFilled?'var(--teal)':'var(--ink)';
        scoreCell=`<strong style="color:${color}">${correctCount}/${totalFilled}</strong>`;
      }
    }

    return`<tr>
      <td class="name-cell">${esc(memberNames[mi])}</td>
      ${cells}
      <td class="winner-cell">${winnerCell}</td>
      <td class="score-cell">${scoreCell}</td>
    </tr>`;
  }).join('');

  // ── 凡例（好き集計を商品名横に表示） ──
  const legendRows=marks.map((m,mi)=>{
    const o=markToOrder[m];
    const{sym,color}=markSym(blindMarks.find(x=>x.id===m)||{id:m});
    const markSpan=(revealed&&colAllFilled[mi])
      ?`<span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px;margin-right:4px">${sym}</span>`
      :`<span style="font-size:13px;margin-right:4px;color:var(--ink3)">?</span>`;
    // 好き集計（全員入力済み時のみ）
    const wc=winnerCount[m];
    const winnerTag=allWinnerFilled&&wc
      ?`<span style="font-size:10px;color:var(--white);background:var(--gold-d);padding:1px 5px;border-radius:3px;margin-left:6px">好き ${wc}</span>`
      :'';
    return`<div class="mark-legend-row">
      <span class="mark-legend-dot">${nums[mi]||'?'}</span>
      ${markSpan}
      <span class="mark-legend-name">${esc(o?.productName||m)}</span>${winnerTag}
    </div>`;
  }).join('');

  document.getElementById('result-body').innerHTML=`
    <div class="result-info">
      <strong>${members.map(g=>esc(vLabel(g.visitKey))).join('・')}</strong>
      &nbsp;|&nbsp; ${marks.length}種 × ${members.length}名
    </div>
    <div class="blind-table-wrap">
      <table class="blind-table">${thead}<tbody>${tbody}</tbody></table>
    </div>
    <div class="mark-legend">
      <div class="mark-legend-title">マーク対応表</div>
      ${legendRows}
    </div>`;

  // タイトルを状態に応じて更新
  if(resultState.revealed) _updateResultTitle();
}

// テーブル内マークピッカー（fixed位置、overflow対応）
// パネルはbody直下に追加してfixedで位置合わせ
let _tblPanel=null;
function _closeTblPanel(){

}
document.addEventListener('click',_closeTblPanel);

function buildTableMarkPicker(mi,mki,chosenMarkId,isRevealed){
  const pid=`tp-${mi}-${mki}`;

    const{sym,color}=markSym(blindMarks.find(m=>m.id===chosenMarkId)||{id:chosenMarkId});
    btnInner=`<span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px;line-height:1">${sym}</span>`;
  }
  return`<div class="tbl-mark-picker">

      ${btnInner}<span class="tbl-mark-caret">▾</span>
    </div>

function openTblPicker(pid,mi,mki,btnEl){
  _closeTblPanel();
  const{marks,answers}=resultState;
  const chosenMarkId=answers[mi][mki];
  // この人が他の列で選んでいるマークのセット
  const usedByOther=new Set(
    answers[mi].filter((_,i)=>i!==mki&&answers[mi][i]).map((_,i)=>answers[mi][i])
  );
  // 実際は answers[mi] の filter で取得
  const usedMarks=new Set(answers[mi].filter((m,i)=>i!==mki&&m));

  const makeOpt=(m,isUsed)=>{
    const{sym,color}=markSym(blindMarks.find(x=>x.id===m)||{id:m});
    const activeCls=chosenMarkId===m?' active':'';
    const usedStyle=isUsed?'opacity:.55;':'';
    return`<div class="tbl-mark-opt${activeCls}" style="${usedStyle}"
      onclick="event.stopPropagation();setTableAnswer(${mi},${mki},'${esc(m)}')">
      <span style="color:${color};font-weight:700;font-size:12px;letter-spacing:-1px;line-height:1">${sym}</span>
    </div>`;
  };

  const freeMarks=marks.filter(m=>!usedMarks.has(m));
  const usedMarksList=marks.filter(m=>usedMarks.has(m));

  const freeOpts=freeMarks.map(m=>makeOpt(m,false)).join('');
  const usedOpts=usedMarksList.length
    ?`<div style="border-top:1px solid var(--border2);margin:2px 0"></div>`
     +usedMarksList.map(m=>makeOpt(m,true)).join('')
    :'';

  const panel=document.createElement('div');
  panel.className='tbl-mark-panel open';
  panel.id=pid+'-panel';
  panel.innerHTML=`<div class="tbl-mark-none" onclick="event.stopPropagation();setTableAnswer(${mi},${mki},'')">−</div>${freeOpts}${usedOpts}`;
  panel.addEventListener('click',e=>e.stopPropagation());
  panel.style.visibility='hidden';
  document.body.appendChild(panel);
  _tblPanel=panel;
  requestAnimationFrame(()=>{
    const rect=btnEl.getBoundingClientRect();
    const ph=panel.offsetHeight;
    const spaceBelow=window.innerHeight-rect.bottom-8;
    if(spaceBelow<ph&&rect.top>ph){
      panel.style.top=(rect.top-ph-4)+'px';
    }else{
      panel.style.top=(rect.bottom+4)+'px';
    }
    panel.style.left=Math.max(4,Math.min(rect.left,window.innerWidth-panel.offsetWidth-4))+'px';
    panel.style.visibility='visible';
  });
}

function setTableAnswer(mi,mki,markId){
  _closeTblPanel();
  if(!markId){
    resultState.answers[mi][mki]=null;
    renderResultTable();
    return;
  }
  // 同じ人の別の列で既に選ばれていたらswap
  const existIdx=resultState.answers[mi].findIndex((m,i)=>i!==mki&&m===markId);
  if(existIdx>=0){
    // 交換：existIdxに現在のmkiの値を、mkiに新しい値をセット
    resultState.answers[mi][existIdx]=resultState.answers[mi][mki]||null;
    resultState.answers[mi][mki]=markId;
  } else {
    resultState.answers[mi][mki]=markId;
  }
  renderResultTable();
}
function setTableWinner(mi,markId){
  _closeTblPanel();
  resultState.winners[mi]=markId||null;
  renderResultTable();
}

function _updateResultTitle(){
  const{members,marks,answers,winners,revealed,allConfirmed}=resultState;
  const title=document.getElementById('result-modal-title');
  if(!revealed){
    title.textContent='🎭 ブラインド結果入力';
    return;
  }
  // allConfirmed（未入力のまま確定）または全項目入力済みなら最終結果
  const allFilled=allConfirmed||(members.every((_,mi)=>marks.every((_,mki)=>!!answers[mi][mki]))
                 &&members.every((_,mi)=>!!winners[mi]));
  title.textContent=allFilled
    ?'🎭 ブラインド結果表示（最終結果）'
    :'🎭 ブラインド結果表示（途中経過）';
}

function _switchToRevealed(allConfirmed){
  document.getElementById('result-action-input').style.display='none';
  document.getElementById('result-action-revealed').style.display='flex';
  // 未入力があるかチェック
  const{members,marks,answers}=resultState;
  const hasEmpty=members.some((_,mi)=>marks.some((_,mki)=>!answers[mi][mki]));
  const saveBtn=document.getElementById('btn-save-result');
  const partialBtn=document.getElementById('btn-confirm-partial-r');
  if(hasEmpty&&!allConfirmed){
    // 未入力あり・まだ確定していない → 保存disabled・未入力確定ボタン表示
    saveBtn.disabled=true;
    partialBtn.style.display='flex';
  } else {
    // 全入力済み or 未入力確定済み → 保存active・未入力確定ボタン非表示
    saveBtn.disabled=false;
    partialBtn.style.display='none';
  }
  _updateResultTitle();
}

function showBlindResult(){
  const{members,marks,answers}=resultState;

  // 重複チェック
  for(let mi=0;mi<members.length;mi++){
    const name=vLabel(members[mi].visitKey);
    const chosen=answers[mi].filter(Boolean);
    const dup=[...new Set(chosen.filter((m,i)=>chosen.indexOf(m)!==i))];
    if(dup.length>0){
      const dupSyms=dup.map(m=>{const{sym}=markSym(blindMarks.find(x=>x.id===m)||{id:m});return sym;}).join('・');
      alert(`${name}に重複した回答があります（${dupSyms}）\n修正してください。`);
      return;
    }
  }

  resultState.revealed=true;
  resultState.allConfirmed=false;
  renderResultTable();
  _switchToRevealed(false);
}

function confirmPartialResult(){
  // 重複チェックのみ
  const{members,marks,answers}=resultState;
  for(let mi=0;mi<members.length;mi++){
    const name=vLabel(members[mi].visitKey);
    const chosen=answers[mi].filter(Boolean);
    const dup=[...new Set(chosen.filter((m,i)=>chosen.indexOf(m)!==i))];
    if(dup.length>0){
      const dupSyms=dup.map(m=>{const{sym}=markSym(blindMarks.find(x=>x.id===m)||{id:m});return sym;}).join('・');
      alert(`${name}に重複した回答があります（${dupSyms}）\n修正してください。`);
      return;
    }
  }
  // 未入力を全て強制確定（全列を全員入力済みとして扱う）
  resultState.revealed=true;
  resultState.allConfirmed=true;
  renderResultTable();
  _switchToRevealed(true);
}

function backToInput(){
  resultState.revealed=false;
  resultState.allConfirmed=false;
  renderResultTable();
  document.getElementById('result-action-input').style.display='flex';
  document.getElementById('result-action-revealed').style.display='none';
  document.getElementById('result-modal-title').textContent='🎭 ブラインド結果入力';
}

function closeResultModal(){
  document.getElementById('result-modal').classList.remove('open');
  resultTarget=null;
  resultState=null;
}

async function saveResult(){
  if(!resultState||!resultState.revealed)return;
  const{b,members,marks,markToOrder,answers,winners}=resultState;

  // 未選択チェック
  const hasEmpty=members.some((_,mi)=>marks.some((_,mki)=>!answers[mi][mki]));
  if(hasEmpty){
    if(!confirm('未選択の項目がありますが保存しますか？')){
      backToInput();
      return;
    }
  }
  try{
    const fsBatch=db.batch();
    for(let mi=0;mi<members.length;mi++){
      const g=members[mi];
      const visit=allVisits.find(v=>v.id===g.visitKey);
      // answersを変換：マーク番号mki → {blindMarkId, guessMarkId, isCorrect}
      const ans=marks.map((actualMark,mki)=>{
        const guessMark=answers[mi][mki];
        const actualOrder=markToOrder[actualMark];
        const guessOrder=markToOrder[guessMark];
        return{
          blindMarkId:actualMark,
          actualOrderId:actualOrder?.id||'',
          actualProduct:actualOrder?.productName||'',
          guessMarkId:guessMark,
          guessOrderId:guessOrder?.id||'',
          guessProduct:guessOrder?.productName||'',
          isCorrect:guessMark===actualMark
        };
      });
      const correctCount=ans.filter(a=>a.isCorrect).length;
      fsBatch.set(db.collection('blindResults').doc(g.gid),{
        id:g.gid,groupId:g.gid,batchId:b.batchId||null,
        visitKey:g.visitKey,customerId:visit?.memberId||null,
        answeredAt:firebase.firestore.FieldValue.serverTimestamp(),
        answers:ans,winner:winners[mi],
        correctCount,totalCount:marks.length
      });
      for(const o of g.orders)if(o.served!==0)fsBatch.update(db.collection('orders').doc(o.id),{served:3});
    }
    await fsBatch.commit();
    showToast('結果を保存しました','success');
    closeResultModal();await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

function showStep(n){
  ['step0','step1','step2','step3'].forEach((id,i)=>document.getElementById(id).style.display=i===n?'block':'none');
  ['stab0','stab1','stab2','stab3'].forEach((id,i)=>document.getElementById(id).className='step-tab '+(i<n?'done':i===n?'active':''));
  document.getElementById('modal-title').textContent=['来場者を選択','商品を選択','注文を確認','完了'][n];
}

// STEP0
function renderVisitors(){
  const c=document.getElementById('visitor-list-container');
  const active=allVisits.filter(v=>!v.checkoutTime);
  if(!active.length){c.innerHTML='<div class="empty">在店中の来場者がいません</div>';return;}
  c.innerHTML=active.map(v=>{
    const m=v.memberId&&allMembers[v.memberId];
    const name=m?(m.nickname||m.name):`ゲスト（来店ID: ${v.id}）`;
    const sub=v.memberId?`会員ID: ${v.memberId}`:v.id;
    const checked=flow.visits.find(x=>x.id===v.id)?'checked':'';
    return`<div class="visitor-card${checked?' selected':''}" id="vc-${v.id}">
      <input type="checkbox" class="visitor-cb" id="vcb-${v.id}" ${checked} onchange="toggleVisitor('${v.id}',this)">
      <label for="vcb-${v.id}" style="flex:1;cursor:pointer">
        <div class="visitor-name">${esc(name)}</div>
        <div class="visitor-sub">${esc(sub)} | 来店: ${v.visitTime||''}</div>
      </label>
    </div>`;
  }).join('');
}
function toggleVisitor(vid,cb){
  const card=document.getElementById('vc-'+vid);
  if(cb.checked){
    const v=allVisits.find(x=>x.id===vid);
    if(v&&!flow.visits.find(x=>x.id===vid))flow.visits.push(v);
    if(card)card.classList.add('selected');
  }else{
    flow.visits=flow.visits.filter(x=>x.id!==vid);
    if(card)card.classList.remove('selected');
  }
  document.getElementById('btn-to-step1').disabled=flow.visits.length===0;
}
function goStep0(){showStep(0);renderVisitors();}

// STEP1
function goStep1(){
  if(!flow.visits.length)return;
  showStep(1);
  switchPTab('tequila',document.querySelectorAll('.ptab')[0]);
  renderCart();
}
function switchPTab(type,el){
  currentPTab=type;currentNOM='';
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('nom-shortcuts-area').style.display=type==='tequila'?'flex':'none';
  document.getElementById('product-search').style.display=type==='set'?'none':'block';
  if(type==='tequila')renderNOMs();
  document.getElementById('product-search').value='';
  filterProducts();
}
function renderNOMs(){
  document.getElementById('nom-shortcuts-area').innerHTML=
    ['1123','1579','1414','1545','1139','1474'].map(n=>
      `<button class="nom-btn${currentNOM===n?' active':''}" onclick="setNOM('${n}')">${n}</button>`
    ).join('');
}
function setNOM(n){currentNOM=currentNOM===n?'':n;renderNOMs();filterProducts();}
function filterProducts(){
  const q=(document.getElementById('product-search').value||'').toLowerCase();
  const c=document.getElementById('product-list-container');
  if(currentPTab==='set'){
    if(!masterData.set.length){c.innerHTML='<div class="empty">データなし</div>';return;}
    c.innerHTML=masterData.set.map(s=>{
      const b=`<span class="set-type-badge set-type-${s.setType||0}">${['通常','段位','イベント'][s.setType||0]}</span>`;
      return`<div class="set-item" onclick="addSetToCart('${esc(s.id)}')"><span style="font-size:13px">${esc(s.setName||s.id)}${b}</span></div>`;
    }).join('');return;
  }
  let items=[...(masterData[currentPTab]||[])];
  if(currentNOM&&currentPTab==='tequila')items=items.filter(i=>(i.nom||'').startsWith(currentNOM)||(i.brandId||'').startsWith(currentNOM));
  if(q)items=items.filter(i=>(i.bottleJa||i.bottleEs||i.name||'').toLowerCase().includes(q)||(i.brandJa||i.brandEs||'').toLowerCase().includes(q)||(i.nom||'').includes(q)||(i.id||'').toLowerCase().includes(q));
  if(!items.length){c.innerHTML='<div class="empty">該当なし</div>';return;}
  c.innerHTML=items.slice(0,50).map(i=>{
    const name=i.bottleJa||i.bottleEs||i.name||i.id;
    const sub=i.nom?`NOM ${i.nom}`:'';
    const price=i.price?`¥${i.price}/10ml`:i.unitPrice?`¥${i.unitPrice}`:'-';
    return`<div class="product-item" onclick="addToCart('${esc(i.id)}')">
      <div><div class="product-item-name">${esc(name)}</div>${sub?`<div class="product-item-sub">${esc(sub)}</div>`:''}</div>
      <span class="product-item-price">${esc(price)}</span>
    </div>`;
  }).join('');
}

// ── ブラインドマーク自動割り当て ──
function assignBlindMarks(){
  const mlItems=flow.cart.filter(o=>o.productType==='tequila'||o.productType==='other');
  const n=mlItems.length;
  if(!n)return;

  // colorCodeごとにシングル(index0)・ダブル(index1)を取得
  const byColor={R:[],G:[],W:[],Y:[],B:[]};
  blindMarks.forEach(m=>{
    const cc=m.colorCode||(m.id.charAt(0));
    if(byColor[cc])byColor[cc].push(m.id);
    // sortOrderでsingle先・double後になっている前提
  });

  let pool=[];
  if(n<=3){
    // 赤緑白シングルのみ
    pool=[byColor.R[0],byColor.G[0],byColor.W[0]].filter(Boolean);
  } else if(n===4){
    // 赤緑白シングル3＋ランダム1色のダブル
    const singles=[byColor.R[0],byColor.G[0],byColor.W[0]].filter(Boolean);
    const doubles=[byColor.R[1],byColor.G[1],byColor.W[1]].filter(Boolean);
    const dbl=doubles[Math.floor(Math.random()*doubles.length)];
    pool=[...singles,dbl].filter(Boolean);
  } else if(n<=6){
    // 赤緑白シングル＋ダブル
    pool=[byColor.R[0],byColor.R[1],byColor.G[0],byColor.G[1],byColor.W[0],byColor.W[1]].filter(Boolean);
  } else if(n<=8){
    // 赤緑白黄シングル＋ダブル
    pool=[byColor.R[0],byColor.R[1],byColor.G[0],byColor.G[1],
          byColor.W[0],byColor.W[1],byColor.Y[0],byColor.Y[1]].filter(Boolean);
  } else {
    // 赤緑白黄青シングル＋ダブル
    pool=[byColor.R[0],byColor.R[1],byColor.G[0],byColor.G[1],
          byColor.W[0],byColor.W[1],byColor.Y[0],byColor.Y[1],
          byColor.B[0],byColor.B[1]].filter(Boolean);
  }

  // poolからn個をランダムにシャッフルして割り当て
  const shuffled=pool.sort(()=>Math.random()-0.5).slice(0,n);
  mlItems.forEach((o,i)=>{o.blindMarkId=shuffled[i]||null;});
}

// 商品クリック→即カート追加
function addToCart(pid){
  const p=[...masterData.tequila,...masterData.other,...masterData.misc].find(i=>i.id===pid);
  if(!p)return;
  const isMl=p.type==='tequila'||p.type==='other';
  const isBlind=document.getElementById('blind-check').checked;
  flow.cart.push({
    productId:p.id,
    productName:p.bottleJa||p.bottleEs||p.name||p.id,
    productType:p.type,
    qty:isMl?getCartMl():1,
    unit:isMl?'ml':'個',
    unitPrice:p.price||p.unitPrice||0,
    blindMarkId:null
  });
  if(isBlind)assignBlindMarks();
  renderCart();
  document.getElementById('btn-to-step2').disabled=false;
  showToast('カートに追加しました','info');
}

function addSetToCart(setId){
  const s=masterData.set.find(x=>x.id===setId);
  if(!s){showToast('セット商品が見つかりません','error');return;}
  _doAddSet(setId);
}
function _doAddSet(setId){
  const s=masterData.set.find(x=>x.id===setId);if(!s)return;
  const isBlind=document.getElementById('blind-check').checked;
  const currentMl=getCartMl();
  for(let i=1;i<=8;i++){
    const id=s[`item0${i}`];if(!id)continue;
    const t=s[`itemType0${i}`]||'misc';
    const isMl=t==='tequila'||t==='other';
    flow.cart.push({productId:id,productName:s[`itemName0${i}`]||id,productType:t,
      qty:isMl?currentMl:1,unit:isMl?'ml':'個',unitPrice:s[`itemPrice0${i}`]||0,blindMarkId:null});
  }
  if(isBlind)assignBlindMarks();
  renderCart();
  document.getElementById('btn-to-step2').disabled=flow.cart.length===0;
  showToast('セット商品を追加しました','info');
}

// カート内ml商品の共通ml数を返す（なければ10）
function getCartMl(){
  const ml=flow.cart.find(o=>o.productType==='tequila'||o.productType==='other');
  return ml?ml.qty:10;
}

// カート内全ml商品のqtyを一括変更
function setAllMl(val){
  const qty=parseInt(val);
  if(!qty||qty<=0)return;
  flow.cart.forEach(o=>{
    if(o.productType==='tequila'||o.productType==='other')o.qty=qty;
  });
  renderCart();
}

function closeQtyModal(){document.getElementById('qty-modal').classList.remove('open');pendingProduct=null;}
function confirmQty(){} // 未使用（モーダル廃止）

function removeCartItem(idx){
  flow.cart.splice(idx,1);
  if(document.getElementById('blind-check').checked)assignBlindMarks();
  renderCart();
  document.getElementById('btn-to-step2').disabled=flow.cart.length===0;
}
function setCartMark(idx,val){if(flow.cart[idx])flow.cart[idx].blindMarkId=val||null;}
function toggleBlindMode(){
  flow.isBlind=document.getElementById('blind-check').checked;
  if(flow.isBlind)assignBlindMarks();
  else flow.cart.forEach(o=>o.blindMarkId=null);
  renderCart();
}

function cartAmt(o){
  if(o.productType==='tequila'||o.productType==='other')return Math.round((o.unitPrice*o.qty)/10);
  return(o.unitPrice||0)*(o.qty||0);
}

function renderCart(){
  const items=flow.cart;
  const total=items.reduce((s,o)=>s+cartAmt(o),0);
  document.getElementById('cart-count').textContent=items.length+'件';
  document.getElementById('cart-total').textContent='¥'+total.toLocaleString();
  const el=document.getElementById('cart-items');
  if(!items.length){el.innerHTML='';return;}
  const isBlind=document.getElementById('blind-check').checked;
  const hasMl=items.some(o=>o.productType==='tequila'||o.productType==='other');
  const currentMl=getCartMl();

  // ml一括変更バー（ml商品が1つでもあれば表示）
  const presetBtns=['10','20','30','45','60'].map(v=>'<div class="qty-preset" style="padding:3px 7px;font-size:11px" onclick="setAllMl(\''+v+'\')">'+v+'</div>').join('');
  const mlBar=hasMl?'<div style="display:flex;align-items:center;gap:8px;padding:6px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px"><span style="font-size:11px;color:var(--ink3)">テキーラ・他酒 共通容量:</span><input class="cart-qty-input" type="number" min="1" value="'+currentMl+'" onchange="setAllMl(this.value)" style="width:56px"><span style="font-size:11px;color:var(--ink3)">ml</span><div style="display:flex;gap:4px">'+presetBtns+'</div></div>':'';

  el.innerHTML=mlBar+items.map((o,idx)=>{
    const isMl=o.productType==='tequila'||o.productType==='other';
    let markPicker='';
    if(isBlind&&isMl) markPicker=buildMarkPicker(idx,o.blindMarkId);
    return`<div class="cart-item">
      ${markPicker}
      <span class="cart-item-name">${esc(o.productName)}</span>
      <span class="cart-item-qty" style="font-size:12px;color:var(--ink3)">${o.qty}${o.unit}</span>
      <span class="cart-item-price">¥${cartAmt(o).toLocaleString()}</span>
      <button class="cart-item-del" onclick="removeCartItem(${idx})">✕</button>
    </div>`;
  }).join('');
}

// STEP2（バリデーション付き）
function goStep2(){
  if(!flow.cart.length)return;
  const isBlind=document.getElementById('blind-check').checked;
  if(isBlind){
    const mlItems=flow.cart.filter(o=>o.productType==='tequila'||o.productType==='other');
    // 未設定チェック
    const noMark=mlItems.filter(o=>!o.blindMarkId);
    if(noMark.length>0){
      showToast(`マークが未設定の商品があります（${noMark.map(o=>o.productName).join('、')}）`,'error');return;
    }
    // 重複チェック
    const marks=mlItems.map(o=>o.blindMarkId);
    const dup=marks.filter((m,i)=>marks.indexOf(m)!==i);
    if(dup.length>0){
      showToast(`マークが重複しています（${[...new Set(dup)].join('、')}）`,'error');return;
    }
  }
  showStep(2);
  const names=flow.visits.map(v=>{const m=v.memberId&&allMembers[v.memberId];return m?(m.nickname||m.name):`ゲスト（${v.id}）`;});
  document.getElementById('confirm-visitor').textContent=names.join('、');
  const total=flow.cart.reduce((s,o)=>s+cartAmt(o),0);
  document.getElementById('confirm-items').innerHTML=flow.cart.map(o=>{
    // マークは背景なし・記号のみ
    const mark=o.blindMarkId?`<span style="font-size:15px;margin-right:2px">${markDisplay(o.blindMarkId)}</span>`:'';
    return`<div class="confirm-item">${mark}<span style="flex:1;font-size:13px">${esc(o.productName)}</span><span style="font-size:12px;color:var(--ink3)">${o.qty}${o.unit}</span><span style="font-size:13px;color:var(--gold-d);min-width:55px;text-align:right;font-weight:600">¥${cartAmt(o).toLocaleString()}</span></div>`;
  }).join('');
  const suffix=flow.visits.length>1?` <span style="font-size:12px;color:var(--ink3)">（×${flow.visits.length}人分 = ¥${(total*flow.visits.length).toLocaleString()}）</span>`:'';
  document.getElementById('confirm-total').innerHTML=`¥${total.toLocaleString()}${suffix}`;
}

// 確定
async function confirmOrder(){
  if(!flow.visits.length||!flow.cart.length)return;
  const now=new Date();
  const orderTime=String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  const isBlind=document.getElementById('blind-check').checked;
  const todayOrders=allGroups.flatMap(g=>g.orders);
  let maxSeq=todayOrders.reduce((m,o)=>{const s=parseInt(o.id.slice(6))||0;return Math.max(m,s);},0);

  // batchId採番（当日最大+1、3桁）
  const maxBatch=allGroups.reduce((m,g)=>{
    const bid=g.batchId||'';
    if(bid.slice(0,6)!==todayStr)return m;
    const n=parseInt(bid.slice(6))||0;return Math.max(m,n);
  },0);
  const batchId=todayStr+String(maxBatch+1).padStart(3,'0');

  try{
    const batch=db.batch();
    for(const visit of flow.visits){
      const existGs=allGroups.filter(g=>g.visitKey===visit.id);
      const maxGSeq=existGs.reduce((m,g)=>{const s=parseInt(g.gid.slice(8))||0;return Math.max(m,s);},0);
      const orderGroupId=visit.id+String(maxGSeq+1).padStart(2,'0');
      flow.cart.forEach((item,i)=>{
        maxSeq++;
        batch.set(db.collection('orders').doc(todayStr+String(maxSeq).padStart(3,'0')),{
          orderTime,customerId:visit.memberId||null,visitKey:visit.id,orderGroupId,batchId,
          itemSeq:i+1,productCode:item.productId,productName:item.productName,productType:item.productType,
          qty:item.qty,unit:item.unit,unitPrice:item.unitPrice,
          blindId:isBlind?1:0,blindMarkId:isBlind?(item.blindMarkId||null):null,served:1
        });
      });
    }
    await batch.commit();
    showStep(3);
    document.getElementById('complete-sub').textContent=
      `${flow.visits.length}人 × ${flow.cart.length}品 登録完了 (batch: ${batchId})`;
    await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ ユーティリティ ━━━
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ━━━ ブラインドマーク表示ユーティリティ ━━━
const MARK_COLOR_MAP={R:'#c0392b',G:'#1a6e3a',W:null,Y:'#b8860b',B:'#185FA5'};

// ●/○のみ表示（ラベルなし）
function markDisplay(markId){
  if(!markId)return'';
  const cc=markId.charAt(0);
  const isDbl=markId.charAt(1)==='◎';
  const isWhite=cc==='W';
  const color=isWhite?'#18110a':(MARK_COLOR_MAP[cc]||'#666');
  const sym=isWhite?(isDbl?'○○':'○'):(isDbl?'●●':'●');
  return`<span style="color:${color};font-weight:700;font-size:15px;letter-spacing:-2px;line-height:1">${sym}</span>`;
}

// markオブジェクトから同じ記号を返す
function markSym(m){
  const cc=(m.colorCode||m.id.charAt(0));
  const isDbl=(m.mark||m.id.charAt(1))==='◎';
  const isWhite=cc==='W';
  const color=isWhite?'#18110a':(MARK_COLOR_MAP[cc]||'#666');
  const sym=isWhite?(isDbl?'○○':'○'):(isDbl?'●●':'●');
  return{sym,color};
}

// ── カスタムマークピッカー ──
function buildMarkPicker(cartIdx,currentMarkId){
  const panelId=`mppanel-${cartIdx}`;
  const current=blindMarks.find(m=>m.id===currentMarkId);
  const{sym:cSym,color:cColor}=current?markSym(current):{sym:'',color:''};
  const btnHtml=current
    ?`<span style="color:${cColor};font-weight:700;font-size:15px;letter-spacing:-2px">${cSym}</span>`
    :`<span style="font-size:11px;color:var(--ink3)">マーク</span>`;
  const opts=blindMarks.map(m=>{
    const{sym,color}=markSym(m);
    return`<div class="mark-picker-opt${m.id===currentMarkId?' active':''}"
      onclick="event.stopPropagation();setCartMark(${cartIdx},'${esc(m.id)}');document.getElementById('${panelId}').classList.remove('open');renderCart()">
      <span style="color:${color};font-weight:700;font-size:15px;letter-spacing:-2px">${sym}</span>
    </div>`;
  }).join('');
  return`<div class="mark-picker" id="mp-${cartIdx}">
    <div class="mark-picker-btn${currentMarkId?' selected':''}" onclick="event.stopPropagation();togglePicker('${panelId}')">
      ${btnHtml}<span class="mark-picker-caret">▾</span>
    </div>
    <div class="mark-picker-panel" id="${panelId}">
      <div class="mark-picker-none" onclick="event.stopPropagation();setCartMark(${cartIdx},'');document.getElementById('${panelId}').classList.remove('open');renderCart()">−</div>
      ${opts}
    </div>
  </div>`;
}

function togglePicker(panelId){
  const panel=document.getElementById(panelId);
  if(!panel)return;
  const wasOpen=panel.classList.contains('open');
  document.querySelectorAll('.mark-picker-panel.open').forEach(p=>p.classList.remove('open'));
  if(!wasOpen)panel.classList.add('open');
}
document.addEventListener('click',()=>{
  document.querySelectorAll('.mark-picker-panel.open').forEach(p=>p.classList.remove('open'));
});
let toastTimer;
function showToast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='',2800);
}
