<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文管理 | テキーラ道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--teal-l:#e0f0eb;
  --red:#8c2818;--red-l:#fae8e4;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --purple:#6b3fa0;--purple-l:#f0e8fa;
  --orange:#b85c00;--orange-l:#fff0e0;
  --green:#1a6e3a;--green-l:#e0f0e8;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:14px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none}
input,select{font-family:var(--sans)}

/* ── ログイン ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:4px}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:24px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink);outline:none}
.lcard input:focus{border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border-radius:var(--r);font-size:14px;font-weight:500}

/* ── アプリ ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-brand{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.08em}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.top-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:var(--r);font-size:11px;text-decoration:none}
.top-logout{background:none;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);padding:5px 10px;border-radius:var(--r);font-size:11px}

/* ── コンテンツ ── */
.content{padding:16px;max-width:700px;margin:0 auto;width:100%;flex:1}
.page-title{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--gold-d);margin-bottom:16px}

/* ── ボタン ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;border:none;white-space:nowrap;cursor:pointer;transition:all .15s}
.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}.bp:active{transform:scale(.97)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}
.bt{background:var(--teal);color:#fff}.bt:hover{background:#1a8060}
.bpu{background:var(--purple-l);color:var(--purple);border:1px solid rgba(107,63,160,.2)}.bpu:hover{background:#e0d0f5}
.btn-full{width:100%}
.sm{padding:6px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── 新規注文 ── */
#btn-new-order{margin-bottom:20px;font-size:15px;font-weight:700;letter-spacing:.5px}

/* ── セクション ── */
.section{margin-bottom:24px}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--cream3)}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:600}
.sec-count{background:var(--cream2);color:var(--ink3);font-size:11px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
.sec-action{margin-left:auto}
#btn-serve-all{display:none}
#btn-serve-all.visible{display:inline-flex}

/* ── グループカード ── */
.group-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s}
.group-card:hover{box-shadow:var(--shadow)}
.group-card.done{opacity:.4}
.group-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.group-cb{width:17px;height:17px;accent-color:var(--gold-d);cursor:pointer;flex-shrink:0}
.group-info{flex:1;min-width:0}
.group-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.group-id{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.group-customer{font-size:14px;font-weight:700;color:var(--ink)}
.blind-badge{background:var(--purple);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.group-row2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.group-time{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.group-total{font-size:13px;font-weight:700;color:var(--gold-d);white-space:nowrap}
.toggle-btn{background:var(--cream2);border:1px solid var(--border2);color:var(--ink3);font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold-d)}
.card-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}

/* ── 商品リスト ── */
.item-list{border-top:1px solid var(--border);background:var(--cream)}
.item-row{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.item-row:last-child{border-bottom:none}
.item-mark{font-size:10px;background:var(--purple);color:#fff;padding:1px 5px;border-radius:3px;min-width:28px;text-align:center;font-family:var(--mono)}
.item-name{flex:1;color:var(--ink)}
.item-qty{color:var(--ink3);min-width:50px;text-align:right;font-size:12px}
.item-price{color:var(--gold-d);min-width:60px;text-align:right;font-weight:600;font-size:12px}

/* ── ローディング・空 ── */
#loading{text-align:center;padding:48px;color:var(--ink3)}
.spinner{width:32px;height:32px;border:3px solid var(--cream3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--ink3);font-size:13px;padding:12px 0;text-align:center}

/* ━━━ モーダル共通 ━━━ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(24,17,10,.55);z-index:200;overflow-y:auto;padding:20px 16px}
.modal-overlay.open{display:block}
.modal-panel{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);max-width:560px;margin:0 auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:10px}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--gold-d);flex:1}
.modal-body{padding:16px}

/* ── ステップ ── */
.step-indicator{display:flex;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2);margin-bottom:16px}
.step-tab{flex:1;text-align:center;padding:8px 4px;font-size:11px;color:var(--ink3);background:var(--cream2);border-right:1px solid var(--border2);transition:all .2s}
.step-tab:last-child{border-right:none}
.step-tab.active{background:var(--gold-d);color:var(--cream);font-weight:700}
.step-tab.done{background:var(--cream);color:var(--ink2)}

/* ── 来場者カード ── */
.visitor-card{background:var(--cream);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.visitor-card:hover{border-color:var(--gold)}
.visitor-card.selected{border-color:var(--gold-d);background:var(--orange-l)}
.visitor-cb{width:17px;height:17px;accent-color:var(--gold-d);cursor:pointer;flex-shrink:0}
.visitor-name{font-size:14px;font-weight:700;color:var(--ink)}
.visitor-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* ── 商品タブ ── */
.product-tabs{display:flex;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2);margin-bottom:10px}
.ptab{flex:1;text-align:center;padding:7px 4px;font-size:12px;background:var(--cream2);border-right:1px solid var(--border2);cursor:pointer;transition:all .15s;color:var(--ink3)}
.ptab:last-child{border-right:none}
.ptab.active{background:var(--gold-d);color:var(--cream);font-weight:700}

/* NOM */
.nom-shortcuts{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.nom-btn{background:var(--cream2);border:1px solid var(--border2);color:var(--ink3);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.nom-btn:hover{border-color:var(--gold);color:var(--gold-d)}
.nom-btn.active{background:var(--gold-d);color:var(--cream);border-color:var(--gold-d)}

/* 商品検索 */
.fi{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--cream);width:100%;margin-bottom:8px;outline:none}
.fi:focus{border-color:var(--gold)}
.product-list-wrap{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.product-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.product-item:last-child{border-bottom:none}
.product-item:hover{background:var(--cream)}
.product-item-name{font-size:13px;color:var(--ink)}
.product-item-sub{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.product-item-price{font-size:11px;color:var(--gold-d);font-weight:600}

/* ブラインドチェック */
.blind-check-area{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-bottom:8px}
.blind-check-area input[type=checkbox]{width:17px;height:17px;accent-color:var(--purple)}
.blind-check-area label{font-size:13px;color:var(--ink2);cursor:pointer;user-select:none}

/* カート */
.cart-header{font-size:12px;color:var(--ink3);margin:10px 0 6px;display:flex;gap:8px;align-items:center}
.cart-item{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.cart-item:last-child{border-bottom:none}
.cart-mark-sel{background:var(--cream);border:1px solid var(--border2);color:var(--ink);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer;outline:none;max-width:90px}
.cart-mark-sel:focus{border-color:var(--gold)}
.cart-item-name{flex:1;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-qty{font-size:11px;color:var(--ink3);white-space:nowrap}
.cart-item-price{font-size:12px;color:var(--gold-d);font-weight:600;min-width:55px;text-align:right;white-space:nowrap}
.cart-item-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:.6;flex-shrink:0}
.cart-item-del:hover{opacity:1}
.cart-qty-input{width:52px;padding:3px 6px;border:1px solid var(--border2);border-radius:4px;font-size:13px;font-family:var(--mono);text-align:center;background:var(--cream);color:var(--ink);outline:none}
.cart-qty-input:focus{border-color:var(--gold)}

/* セット */
.set-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.set-item:hover{background:var(--cream)}
.set-item:last-child{border-bottom:none}
.set-type-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px}
.set-type-0{background:var(--cream2);color:var(--ink3)}
.set-type-1{background:var(--gold-d);color:var(--cream)}
.set-type-2{background:var(--purple);color:#fff}

/* 確認 */
.confirm-label{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.confirm-value{font-size:14px;color:var(--ink);margin-bottom:12px}
.confirm-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.confirm-item:last-child{border-bottom:none}
.confirm-total{display:flex;justify-content:flex-end;align-items:baseline;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* 完了 */
.complete-wrap{text-align:center;padding:32px 0}
.complete-icon{font-size:48px;margin-bottom:12px}
.complete-msg{font-family:var(--serif);font-size:20px;color:var(--gold-d);margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--ink3)}

/* ナビ */
.nav-buttons{display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.nav-buttons .btn{flex:1}

/* 数量モーダル */
#qty-modal{display:none;position:fixed;inset:0;background:rgba(24,17,10,.6);z-index:300;align-items:center;justify-content:center;padding:20px}
#qty-modal.open{display:flex}
#qty-panel{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;min-width:280px;box-shadow:var(--shadow-lg)}
#qty-panel h3{font-family:var(--serif);font-size:16px;color:var(--gold-d);margin-bottom:12px}
#qty-input{width:100%;padding:10px;border:1px solid var(--border2);border-radius:var(--r);font-size:20px;text-align:center;outline:none;background:var(--cream);color:var(--ink);margin-bottom:4px}
#qty-input:focus{border-color:var(--gold)}
.qty-unit{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:10px}
.qty-presets{display:flex;gap:6px;margin-bottom:14px}
.qty-preset{flex:1;background:var(--cream2);border:1px solid var(--border2);color:var(--ink2);padding:7px;border-radius:var(--r);cursor:pointer;text-align:center;font-size:13px;font-family:var(--mono);transition:all .15s}
.qty-preset:hover{border-color:var(--gold);color:var(--gold-d)}
.qty-buttons{display:flex;gap:8px}
.qty-buttons .btn{flex:1}

/* 結果入力 */
.result-info{padding:12px 16px;background:var(--cream);font-size:13px;color:var(--ink2);border-bottom:1px solid var(--border)}
.result-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.result-mark-label{font-size:13px;font-weight:700;background:var(--purple);color:#fff;padding:4px 10px;border-radius:4px;min-width:44px;text-align:center;font-family:var(--mono);flex-shrink:0}
.result-arrow{color:var(--ink3);font-size:13px;white-space:nowrap;flex-shrink:0}
.result-select{flex:1;background:var(--cream);border:1px solid var(--border2);color:var(--ink);padding:8px 10px;border-radius:var(--r);font-size:13px;outline:none;min-width:0}
.result-select:focus{border-color:var(--gold)}
.winner-row{padding:14px 16px;background:var(--cream2)}
.winner-label{font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.winner-options{display:flex;flex-wrap:wrap;gap:6px}
.winner-opt{background:var(--white);border:1px solid var(--border2);color:var(--ink2);padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:all .15s;font-family:var(--mono)}
.winner-opt:hover{border-color:var(--gold);color:var(--gold-d)}
.winner-opt.selected{background:var(--gold-d);color:var(--cream);border-color:var(--gold-d);font-weight:700}
.result-answer-hint{margin-top:4px;padding:3px 6px;border-radius:4px;background:var(--cream2)}
.result-score-row{padding:12px 16px;background:var(--teal-l);border-top:1px solid var(--border);text-align:center;font-size:14px;color:var(--ink2)}

/* ── カスタムマークドロップダウン ── */
.mark-picker{position:relative;display:inline-block;flex-shrink:0}
.mark-picker-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--cream);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:16px;min-width:44px;justify-content:center;transition:border-color .15s;user-select:none}
.mark-picker-btn:hover{border-color:var(--gold)}
.mark-picker-btn.selected{border-color:var(--gold-d);background:var(--cream2)}
.mark-picker-caret{font-size:9px;color:var(--ink3)}
.mark-picker-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:400;min-width:56px;padding:4px}
.mark-picker-panel.open{display:block}
.mark-picker-opt{display:flex;align-items:center;justify-content:center;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:16px;transition:background .1s}
.mark-picker-opt:hover{background:var(--cream2)}
.mark-picker-opt.active{background:var(--cream3)}
.mark-picker-none{font-size:11px;color:var(--ink3);text-align:center;padding:5px 4px;cursor:pointer;border-radius:4px}
.mark-picker-none:hover{background:var(--cream2)}

/* トースト */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--teal);color:#fff}
#toast.error{background:var(--red);color:#fff}
#toast.info{background:var(--ink);color:var(--cream)}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🥃</div>
    <div class="lbrand">テキーラ道場</div>
    <label>メールアドレス</label>
    <input type="email" id="login-email" placeholder="email@example.com">
    <label>パスワード</label>
    <input type="password" id="login-pass">
    <div class="lerr" id="login-err"></div>
    <button class="lbtn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- アプリ -->
<div id="app">
  <div class="topbar">
    <span class="top-brand">🥃 テキーラ道場</span>
    <div class="top-right">
      <a href="admin.html" class="top-back">⚙ 管理</a>
      <a href="home.html" class="top-back">🏠 ホーム</a>
      <button class="top-logout" onclick="auth.signOut()">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <div class="page-title">注文管理</div>
    <div id="loading"><div class="spinner"></div><div>読み込み中...</div></div>

    <div id="content-area" style="display:none">
      <button class="btn bp btn-full" id="btn-new-order" onclick="openOrderModal()">＋ 新規注文</button>

      <!-- 未提供 -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-title" style="color:var(--orange)">📋 未提供</span>
          <span class="sec-count" id="count-pending">0</span>
          <div class="sec-action" style="display:flex;gap:6px">
            <button class="btn bd sm" id="btn-cancel-pending" style="display:none" onclick="cancelChecked('pending')">✕ キャンセル</button>

<script>
// ━━━ Firebase ━━━
const firebaseConfig = {
  apiKey: "AIzaSyD6a3i-N1RyXyAfXmztPQrYtx4x62YGth0",
  authDomain: "tequiladojo.firebaseapp.com",
  projectId: "tequiladojo",
  appId: "1:56663296233:web:c8cac2fcbeb4faa09e0878"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ━━━ 状態 ━━━
let todayStr='', allGroups=[], allVisits=[], allMembers={};
let blindResultsSet=new Set();
let masterData={tequila:[],other:[],misc:[],set:[]};
let blindMarks=[];
let flow={visits:[],cart:[],isBlind:false};
let resultTarget=null;
let currentPTab='tequila', currentNOM='', pendingProduct=null;

// ━━━ 認証 ━━━
auth.onAuthStateChanged(user=>{
  const ls=document.getElementById('login-screen');
  const app=document.getElementById('app');
  if(!user){ls.style.display='flex';app.style.display='none';}
  else{ls.style.display='none';app.style.display='flex';init();}
});
async function doLogin(){
  try{ await auth.signInWithEmailAndPassword(
    document.getElementById('login-email').value,
    document.getElementById('login-pass').value
  );}catch(e){document.getElementById('login-err').textContent='ログインに失敗しました';}
}

// ━━━ 初期化 ━━━
async function init(){
  const now=new Date();
  todayStr=String(now.getFullYear()).slice(2).padStart(2,'0')
    +String(now.getMonth()+1).padStart(2,'0')
    +String(now.getDate()).padStart(2,'0');
  await Promise.all([loadMasters(),loadTodayData()]);
  document.getElementById('loading').style.display='none';
  document.getElementById('content-area').style.display='block';
  renderOrderList();
}

// ━━━ マスタ ━━━
async function loadMasters(){
  const [membSnap,blindSnap,bottleSnap,miscSnap,setSnap,otherSnap]=await Promise.all([
    db.collection('members').get(),
    db.collection('blindMarks').get(),
    db.collection('bottleData').get(),
    db.collection('miscProducts').get(),
    db.collection('setProducts').get(),
    db.collection('otherBottles').get()
  ]);
  allMembers={};
  membSnap.forEach(d=>{allMembers[d.id]=d.data();});
  blindMarks=[];
  blindSnap.forEach(d=>blindMarks.push({id:d.id,...d.data()}));
  blindMarks.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  masterData.tequila=[];
  bottleSnap.forEach(d=>{const v=d.data();if(v.visibility!==false)masterData.tequila.push({id:d.id,...v,type:'tequila'});});
  masterData.other=[];
  otherSnap.forEach(d=>masterData.other.push({id:d.id,...d.data(),type:'other'}));
  masterData.misc=[];
  miscSnap.forEach(d=>masterData.misc.push({id:d.id,...d.data(),type:'misc'}));
  masterData.set=[];
  setSnap.forEach(d=>masterData.set.push({id:d.id,...d.data(),type:'set'}));
}

// ━━━ 当日データ ━━━
async function loadTodayData(){
  const [visitsSnap,ordersSnap,resultsSnap]=await Promise.all([
    db.collection('visits').get(),
    db.collection('orders').get(),
    db.collection('blindResults').get()
  ]);
  allVisits=[];
  visitsSnap.forEach(d=>{if(d.id.startsWith(todayStr))allVisits.push({id:d.id,...d.data()});});
  allVisits.sort((a,b)=>(a.seq||0)-(b.seq||0));
  blindResultsSet=new Set();
  resultsSnap.forEach(d=>blindResultsSet.add(d.id));
  const gmap={};
  ordersSnap.forEach(d=>{
    if(!d.id.startsWith(todayStr))return;
    const o={id:d.id,...d.data()};
    if(!o.orderGroupId)return;
    if(!gmap[o.orderGroupId])gmap[o.orderGroupId]=[];
    gmap[o.orderGroupId].push(o);
  });
  allGroups=Object.entries(gmap).map(([gid,orders])=>{
    const sample=orders.find(o=>o.served!==undefined)||orders[0];
    // served: 0=キャンセル 1=未提供 2=提供済みブラインド結果未入力 3=完了
    const served=sample.served??1;
    const isBlind=orders.some(o=>o.blindId===1);
    const hasResult=blindResultsSet.has(gid);
    const total=orders.filter(o=>o.served!==0).reduce((s,o)=>s+calcAmt(o),0);
    return{gid,orders,served,isBlind,hasResult,total,visitKey:sample.visitKey,orderTime:sample.orderTime};
  });
  allGroups.sort((a,b)=>{
    const ta=a.orderTime||'9999',tb=b.orderTime||'9999';
    if(ta!==tb)return ta.localeCompare(tb);
    return(a.visitKey||'').localeCompare(b.visitKey||'');
  });
}

function calcAmt(o){
  if(o.productType==='tequila'||o.productType==='other')return Math.round((o.unitPrice*o.qty)/10);
  return(o.unitPrice||0)*(o.qty||0);
}

// ━━━ 一覧描画 ━━━
// served: 1=未提供 2=提供済みブラインド未入力 3=完了 0=キャンセル
function renderOrderList(){
  const pending   =allGroups.filter(g=>g.served===1);
  const blindPend =allGroups.filter(g=>g.served===2);
  const done      =allGroups.filter(g=>g.served===3||g.served===0);
  document.getElementById('count-pending').textContent=pending.length;
  document.getElementById('count-blind-pending').textContent=blindPend.length;
  document.getElementById('count-done').textContent=done.length;
  renderSec('list-pending',pending,'pending');
  renderSec('list-blind-pending',blindPend,'blind-pending');
  renderSec('list-done',done,'done');
  updateActionBtns();
}
function renderSec(id,groups,mode){
  const el=document.getElementById(id);
  if(!groups.length){el.innerHTML='<div class="empty">なし</div>';return;}
  el.innerHTML=groups.map(g=>buildCard(g,mode)).join('');
}
function vLabel(visitKey){
  const v=allVisits.find(x=>x.id===visitKey);
  if(!v)return`来店ID: ${visitKey}`;
  if(v.memberId&&allMembers[v.memberId])return allMembers[v.memberId].name;
  return`ゲスト（来店ID: ${v.id}）`;
}
function buildCard(g,mode){
  const customer=vLabel(g.visitKey);
  const isDone=mode==='done';
  const showCb=mode==='pending'||mode==='blind-pending';
  const showResult=mode==='blind-pending';
  const isCancelled=g.served===0;
  const valid=g.orders.filter(o=>o.served!==0);
  const single=valid.length===1;
  const time=g.orderTime?g.orderTime.slice(0,2)+':'+g.orderTime.slice(2):'';
  const bb=g.isBlind?'<span class="blind-badge">🎭 BLIND</span>':'';
  const list=valid.map(o=>{
    const mk=o.blindId===1&&o.blindMarkId
      ?`<span class="item-mark">${markDisplay(o.blindMarkId)}</span>`:'';
    return`<div class="item-row">${mk}<span class="item-name">${esc(o.productName)}</span><span class="item-qty">${o.qty}${o.unit}</span><span class="item-price">¥${calcAmt(o).toLocaleString()}</span></div>`;
  }).join('');
  const info=single
    ?`<span style="font-size:12px;color:var(--ink3)">${esc(valid[0]?.productName||'')} ${valid[0]?.qty||''}${valid[0]?.unit||''}</span>`
    :`<button class="toggle-btn" onclick="event.stopPropagation();toggleItems('${g.gid}')">▼ ${valid.length}品</button>`;
  const cancelledBadge=isCancelled?'<span style="font-size:10px;background:var(--red-l);color:var(--red);padding:1px 6px;border-radius:3px;font-weight:700">キャンセル</span>':'';
  return`<div class="group-card${isDone?' done':''}" id="card-${g.gid}">
    <div class="group-header" onclick="toggleItems('${g.gid}')">
      ${showCb?`<input type="checkbox" class="group-cb action-cb" data-gid="${g.gid}" data-mode="${mode}" onclick="event.stopPropagation();updateActionBtns()">`:'' }
      <div class="group-info">
        <div class="group-row1"><span class="group-id">${g.gid}</span><span class="group-customer">${esc(customer)}</span>${bb}${cancelledBadge}</div>
        <div class="group-row2"><span class="group-time">${time}</span>${info}</div>
      </div>
      <div class="card-actions">
        <span class="group-total">¥${g.total.toLocaleString()}</span>
        ${showResult?`<button class="btn bpu sm" onclick="event.stopPropagation();openResultModal('${g.gid}')">結果入力</button>`:''}
      </div>
    </div>
    <div class="item-list" id="items-${g.gid}" style="${single?'':'display:none'}">${list}</div>
  </div>`;
}
function toggleItems(gid){
  const el=document.getElementById('items-'+gid);if(!el)return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  const btn=document.querySelector(`#card-${gid} .toggle-btn`);
  if(btn){const n=el.querySelectorAll('.item-row').length;btn.textContent=(open?'▼ ':'▲ ')+n+'品';}
}
function updateActionBtns(){
  const pendingCbs=[...document.querySelectorAll('.action-cb[data-mode="pending"]:checked')];
  const blindCbs=[...document.querySelectorAll('.action-cb[data-mode="blind-pending"]:checked')];
  const serveBtn=document.getElementById('btn-serve-all');
  const cancelPBtn=document.getElementById('btn-cancel-pending');
  const cancelBBtn=document.getElementById('btn-cancel-blind');
  const n=pendingCbs.length;
  if(n>0){
    serveBtn.classList.add('visible');serveBtn.textContent=`✓ ${n}件を提供済みにする`;
    cancelPBtn.style.display='inline-flex';cancelPBtn.textContent=`✕ ${n}件をキャンセル`;
  }else{
    serveBtn.classList.remove('visible');cancelPBtn.style.display='none';
  }
  if(blindCbs.length>0){
    cancelBBtn.style.display='inline-flex';cancelBBtn.textContent=`✕ ${blindCbs.length}件をキャンセル`;
  }else{
    cancelBBtn.style.display='none';
  }
}

// ━━━ 一括提供 ━━━
async function serveChecked(){
  const gids=[...document.querySelectorAll('.action-cb[data-mode="pending"]:checked')].map(c=>c.dataset.gid);
  if(!gids.length)return;
  try{
    const batch=db.batch();
    for(const gid of gids){
      const g=allGroups.find(x=>x.gid===gid);if(!g)continue;
      // ブラインドなら2、それ以外は3
      const newServed=g.isBlind?2:3;
      for(const o of g.orders)if(o.served!==0)batch.update(db.collection('orders').doc(o.id),{served:newServed});
      g.served=newServed;
    }
    await batch.commit();
    showToast(`${gids.length}グループを提供済みにしました`,'success');
    await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ キャンセル ━━━
async function cancelChecked(section){
  const sel=section==='pending'?'.action-cb[data-mode="pending"]:checked':'.action-cb[data-mode="blind-pending"]:checked';
  const gids=[...document.querySelectorAll(sel)].map(c=>c.dataset.gid);
  if(!gids.length)return;
  if(!confirm(`${gids.length}グループをキャンセルしますか？`))return;
  try{
    const batch=db.batch();
    for(const gid of gids){
      const g=allGroups.find(x=>x.gid===gid);if(!g)continue;
      for(const o of g.orders)batch.update(db.collection('orders').doc(o.id),{served:0});
      g.served=0;
    }
    await batch.commit();
    showToast(`${gids.length}グループをキャンセルしました`,'info');
    await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ 結果入力 ━━━
function openResultModal(gid){
  const g=allGroups.find(x=>x.gid===gid);if(!g)return;
  resultTarget=g;
  const blindOrders=g.orders.filter(o=>o.blindId===1&&o.served!==0);
  const marks=[...new Set(blindOrders.map(o=>o.blindMarkId).filter(Boolean))];
  const opts=blindOrders.map(o=>`<option value="${esc(o.id)}">${esc(o.productName)}</option>`).join('');

  const rows=marks.map(m=>{
    const cc=m.charAt(0);
    const color=MARK_COLOR_MAP[cc]||'#555';
    const dot=markDisplay(m);
    const bgColor=cc==='W'?'#888':color;
    return`<div class="result-row" id="rrow-${esc(m)}">
      <span class="result-mark-label" style="background:${bgColor}">${dot}</span>
      <span class="result-arrow">→</span>
      <div style="flex:1;min-width:0">
        <select class="result-select" data-mark="${esc(m)}" onchange="onResultSelect(this)">
          <option value="">選択してください</option>${opts}
        </select>
        <div class="result-answer-hint" id="rhint-${esc(m)}" style="display:none"></div>
      </div>
    </div>`;
  }).join('');

  const winnerOpts=marks.map(m=>{
    const dot=markDisplay(m);
    return`<div class="winner-opt" data-mark="${esc(m)}" onclick="selectWinner(this)">${dot}</div>`;
  }).join('');

  document.getElementById('result-body').innerHTML=`
    <div class="result-info">来場者: <strong>${esc(vLabel(g.visitKey))}</strong> &nbsp;|&nbsp; ${marks.length}種のブラインド</div>
    ${rows}
    <div class="winner-row">
      <div class="winner-label">🏆 一番美味しかったのは？</div>
      <div class="winner-options">${winnerOpts}</div>
    </div>
    <div class="result-score-row" id="result-score" style="display:none"></div>`;

  document.getElementById('result-modal').classList.add('open');
}

function onResultSelect(sel){
  const markId=sel.dataset.mark;
  const g=resultTarget;
  if(!g)return;
  const blindOrders=g.orders.filter(o=>o.blindId===1&&o.served!==0);
  const actual=blindOrders.find(o=>o.blindMarkId===markId);
  const hint=document.getElementById('rhint-'+markId);
  if(!hint)return;
  if(!sel.value){hint.style.display='none';return;}
  const isCorrect=actual?.id===sel.value;
  hint.style.display='block';
  hint.innerHTML=isCorrect
    ?`<span style="color:var(--teal);font-size:12px;font-weight:700">✓ 正解！ ${esc(actual?.productName||'')}</span>`
    :`<span style="color:var(--red);font-size:12px">✗ 実際は: <strong>${esc(actual?.productName||'')}</strong></span>`;
  updateScoreDisplay();
}

function updateScoreDisplay(){
  const g=resultTarget;if(!g)return;
  const blindOrders=g.orders.filter(o=>o.blindId===1&&o.served!==0);
  const marks=[...new Set(blindOrders.map(o=>o.blindMarkId).filter(Boolean))];
  const selects=[...document.querySelectorAll('.result-select')];
  let correct=0,answered=0;
  for(const sel of selects){
    if(!sel.value)continue;
    answered++;
    const actual=blindOrders.find(o=>o.blindMarkId===sel.dataset.mark);
    if(actual?.id===sel.value)correct++;
  }
  const score=document.getElementById('result-score');
  if(!score)return;
  if(answered===marks.length){
    score.style.display='block';
    score.innerHTML=`<span>正解数: <strong style="font-size:16px;color:var(--gold-d)">${correct} / ${marks.length}</strong></span>`;
  } else {
    score.style.display='none';
  }
}
function selectWinner(el){
  document.querySelectorAll('.winner-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function closeResultModal(){
  document.getElementById('result-modal').classList.remove('open');
  resultTarget=null;
}
async function saveResult(){
  if(!resultTarget)return;
  const g=resultTarget;
  const blindOrders=g.orders.filter(o=>o.blindId===1&&o.served!==0);
  const selects=[...document.querySelectorAll('.result-select')];
  const answers=[];
  for(const sel of selects){
    if(!sel.value){showToast('すべてのマークに回答してください','error');return;}
    const actual=blindOrders.find(o=>o.blindMarkId===sel.dataset.mark);
    const guess =blindOrders.find(o=>o.id===sel.value);
    answers.push({blindMarkId:sel.dataset.mark,actualOrderId:actual?.id||'',actualProduct:actual?.productName||'',guessOrderId:sel.value,guessProduct:guess?.productName||'',isCorrect:actual?.id===sel.value});
  }
  const winner=document.querySelector('.winner-opt.selected');
  if(!winner){showToast('一番美味しかったマークを選んでください','error');return;}
  const visit=allVisits.find(v=>v.id===g.visitKey);
  try{
    await db.collection('blindResults').doc(g.gid).set({
      id:g.gid,groupId:g.gid,visitKey:g.visitKey,customerId:visit?.memberId||null,
      answeredAt:firebase.firestore.FieldValue.serverTimestamp(),
      answers,winner:winner.dataset.mark,
      correctCount:answers.filter(a=>a.isCorrect).length,
      totalCount:answers.length
    });
    // グループのservedを3（完了）に更新
    const batch2=db.batch();
    for(const o of g.orders)if(o.served!==0)batch2.update(db.collection('orders').doc(o.id),{served:3});
    await batch2.commit();
    showToast('結果を保存しました','success');
    closeResultModal();await loadTodayData();renderOrderList();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ━━━ 注文作成 ━━━
function openOrderModal(){
  flow={visits:[],cart:[],isBlind:false};
  document.getElementById('blind-check').checked=false;
  document.getElementById('order-modal').classList.add('open');
  showStep(0);renderVisitors();
}
function closeOrderModal(){document.getElementById('order-modal').classList.remove('open');}
function showStep(n){
  ['step0','step1','step2','step3'].forEach((id,i)=>document.getElementById(id).style.display=i===n?'block':'none');
  ['stab0','stab1','stab2','stab3'].forEach((id,i)=>document.getElementById(id).className='step-tab '+(i<n?'done':i===n?'active':''));
  document.getElementById('modal-title').textContent=['来場者を選択','商品を選択','注文を確認','完了'][n];
}

// STEP0
function renderVisitors(){
  const c=document.getElementById('visitor-list-container');
  const active=allVisits.filter(v=>!v.checkoutTime);
  if(!active.length){c.innerHTML='<div class="empty">在店中の来場者がいません</div>';return;}
  c.innerHTML=active.map(v=>{
    const m=v.memberId&&allMembers[v.memberId];
    const name=m?m.name:`ゲスト（来店ID: ${v.id}）`;
    const sub=v.memberId?`会員ID: ${v.memberId}`:v.id;
    const checked=flow.visits.find(x=>x.id===v.id)?'checked':'';
    return`<div class="visitor-card${checked?' selected':''}" id="vc-${v.id}">
      <input type="checkbox" class="visitor-cb" id="vcb-${v.id}" ${checked} onchange="toggleVisitor('${v.id}',this)">
      <label for="vcb-${v.id}" style="flex:1;cursor:pointer">
        <div class="visitor-name">${esc(name)}</div>
        <div class="visitor-sub">${esc(sub)} | 来店: ${v.visitTime||''}</div>
      </label>
    </div>`;
  }).join('');
}
function toggleVisitor(vid,cb){
  const card=document.getElementById('vc-'+vid);
  if(cb.checked){
    const v=allVisits.find(x=>x.id===vid);
    if(v&&!flow.visits.find(x=>x.id===vid))flow.visits.push(v);
    if(card)card.classList.add('selected');
  }else{
    flow.visits=flow.visits.filter(x=>x.id!==vid);
    if(card)card.classList.remove('selected');
  }
  document.getElementById('btn-to-step1').disabled=flow.visits.length===0;
}
function goStep0(){showStep(0);renderVisitors();}

// STEP1
function goStep1(){
  if(!flow.visits.length)return;
  showStep(1);
  switchPTab('tequila',document.querySelectorAll('.ptab')[0]);
  renderCart();
}
function switchPTab(type,el){
  currentPTab=type;currentNOM='';
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('nom-shortcuts-area').style.display=type==='tequila'?'flex':'none';
  document.getElementById('product-search').style.display=type==='set'?'none':'block';
  if(type==='tequila')renderNOMs();
  document.getElementById('product-search').value='';
  filterProducts();
}
function renderNOMs(){
  document.getElementById('nom-shortcuts-area').innerHTML=
    ['1123','1579','1414','1545','1139','1474'].map(n=>
      `<button class="nom-btn${currentNOM===n?' active':''}" onclick="setNOM('${n}')">${n}</button>`
    ).join('');
}
function setNOM(n){currentNOM=currentNOM===n?'':n;renderNOMs();filterProducts();}
function filterProducts(){
  const q=(document.getElementById('product-search').value||'').toLowerCase();
  const c=document.getElementById('product-list-container');
  if(currentPTab==='set'){
    if(!masterData.set.length){c.innerHTML='<div class="empty">データなし</div>';return;}
    c.innerHTML=masterData.set.map(s=>{
      const b=`<span class="set-type-badge set-type-${s.setType||0}">${['通常','段位','イベント'][s.setType||0]}</span>`;
      return`<div class="set-item" onclick="addSetToCart('${esc(s.id)}')"><span style="font-size:13px">${esc(s.setName||s.id)}${b}</span></div>`;
    }).join('');return;
  }
  let items=[...(masterData[currentPTab]||[])];
  if(currentNOM&&currentPTab==='tequila')items=items.filter(i=>(i.nom||'').startsWith(currentNOM)||(i.brandId||'').startsWith(currentNOM));
  if(q)items=items.filter(i=>(i.bottleJa||i.bottleEs||i.name||'').toLowerCase().includes(q)||(i.brandJa||i.brandEs||'').toLowerCase().includes(q)||(i.nom||'').includes(q)||(i.id||'').toLowerCase().includes(q));
  if(!items.length){c.innerHTML='<div class="empty">該当なし</div>';return;}
  c.innerHTML=items.slice(0,50).map(i=>{
    const name=i.bottleJa||i.bottleEs||i.name||i.id;
    const sub=i.nom?`NOM ${i.nom}`:'';
    const price=i.price?`¥${i.price}/10ml`:i.unitPrice?`¥${i.unitPrice}`:'-';
    return`<div class="product-item" onclick="addToCart('${esc(i.id)}')">
      <div><div class="product-item-name">${esc(name)}</div>${sub?`<div class="product-item-sub">${esc(sub)}</div>`:''}</div>
      <span class="product-item-price">${esc(price)}</span>
    </div>`;
  }).join('');
}

// 商品クリック→即カート追加（初期値10ml/1個）
function addToCart(pid){
  const p=[...masterData.tequila,...masterData.other,...masterData.misc].find(i=>i.id===pid);
  if(!p)return;
  const isMl=p.type==='tequila'||p.type==='other';
  flow.cart.push({
    productId:p.id,
    productName:p.bottleJa||p.bottleEs||p.name||p.id,
    productType:p.type,
    qty:isMl?10:1,
    unit:isMl?'ml':'個',
    unitPrice:p.price||p.unitPrice||0,
    blindMarkId:null
  });
  renderCart();
  document.getElementById('btn-to-step2').disabled=false;
  showToast('カートに追加しました','info');
}

function addSetToCart(setId){
  const s=masterData.set.find(x=>x.id===setId);
  if(!s){showToast('セット商品が見つかりません','error');return;}
  let hasMl=false;
  for(let i=1;i<=8;i++){const t=s[`itemType0${i}`]||'';if(t==='tequila'||t==='other'){hasMl=true;break;}}
  if(hasMl){
    pendingProduct={_isSet:true,_setId:setId,_setName:s.setName||setId};
    document.getElementById('qty-product-name').textContent=`${s.setName||setId}（テキーラ・他酒のml数）`;
    document.getElementById('qty-unit-label').textContent='ml';
    document.getElementById('qty-input').value=10;
    document.getElementById('qty-presets').innerHTML=['10','20','30','45','60'].map(v=>
      `<div class="qty-preset" onclick="document.getElementById('qty-input').value='${v}'">${v}</div>`
    ).join('');
    document.getElementById('qty-modal').classList.add('open');
  }else{
    _doAddSet(setId,null);
  }
}
function _doAddSet(setId,mlQty){
  const s=masterData.set.find(x=>x.id===setId);if(!s)return;
  for(let i=1;i<=8;i++){
    const id=s[`item0${i}`];if(!id)continue;
    const t=s[`itemType0${i}`]||'misc';
    const isMl=t==='tequila'||t==='other';
    flow.cart.push({productId:id,productName:s[`itemName0${i}`]||id,productType:t,
      qty:isMl?(mlQty||10):1,unit:isMl?'ml':'個',unitPrice:s[`itemPrice0${i}`]||0,blindMarkId:null});
  }
  renderCart();document.getElementById('btn-to-step2').disabled=flow.cart.length===0;
  showToast('セット商品を追加しました','info');
}
function closeQtyModal(){document.getElementById('qty-modal').classList.remove('open');pendingProduct=null;}
function confirmQty(){
  if(!pendingProduct)return;
  const qty=parseInt(document.getElementById('qty-input').value);
  if(!qty||qty<=0){showToast('数量を入力してください','error');return;}
  if(pendingProduct._isSet){closeQtyModal();_doAddSet(pendingProduct._setId,qty);return;}
}
function removeCartItem(idx){flow.cart.splice(idx,1);renderCart();document.getElementById('btn-to-step2').disabled=flow.cart.length===0;}
function setCartMark(idx,val){if(flow.cart[idx])flow.cart[idx].blindMarkId=val||null;}
function setCartQty(idx,val){
  const qty=parseInt(val);
  if(flow.cart[idx]&&qty>0){flow.cart[idx].qty=qty;renderCart();}
}
function toggleBlindMode(){flow.isBlind=document.getElementById('blind-check').checked;renderCart();}

function cartAmt(o){
  if(o.productType==='tequila'||o.productType==='other')return Math.round((o.unitPrice*o.qty)/10);
  return(o.unitPrice||0)*(o.qty||0);
}
function renderCart(){
  const items=flow.cart;
  const total=items.reduce((s,o)=>s+cartAmt(o),0);
  document.getElementById('cart-count').textContent=items.length+'件';
  document.getElementById('cart-total').textContent='¥'+total.toLocaleString();
  const el=document.getElementById('cart-items');
  if(!items.length){el.innerHTML='';return;}
  const isBlind=document.getElementById('blind-check').checked;
  el.innerHTML=items.map((o,idx)=>{
    const isMl=o.productType==='tequila'||o.productType==='other';
    let markPicker='';
    if(isBlind&&isMl){
      markPicker=buildMarkPicker(idx,o.blindMarkId);
    }
    return`<div class="cart-item">
      ${markPicker}
      <span class="cart-item-name">${esc(o.productName)}</span>
      <input class="cart-qty-input" type="number" min="1" value="${o.qty}" onchange="setCartQty(${idx},this.value)" title="${o.unit}">
      <span style="font-size:11px;color:var(--ink3);flex-shrink:0">${o.unit}</span>
      <span class="cart-item-price">¥${cartAmt(o).toLocaleString()}</span>
      <button class="cart-item-del" onclick="removeCartItem(${idx})">✕</button>
    </div>`;
  }).join('');
}

// STEP2
function goStep2(){
  if(!flow.cart.length)return;
  showStep(2);
  const names=flow.visits.map(v=>{const m=v.memberId&&allMembers[v.memberId];return m?m.name:`ゲスト（${v.id}）`;});
  document.getElementById('confirm-visitor').textContent=names.join('、');
  const total=flow.cart.reduce((s,o)=>s+cartAmt(o),0);
  document.getElementById('confirm-items').innerHTML=flow.cart.map(o=>{
    const mark=o.blindMarkId?`<span class="item-mark" title="${esc(o.blindMarkId)}">${markDisplay(o.blindMarkId)}</span>`:'';
    return`<div class="confirm-item">${mark}<span style="flex:1;font-size:13px">${esc(o.productName)}</span><span style="font-size:12px;color:var(--ink3)">${o.qty}${o.unit}</span><span style="font-size:13px;color:var(--gold-d);min-width:55px;text-align:right;font-weight:600">¥${cartAmt(o).toLocaleString()}</span></div>`;
  }).join('');
  const suffix=flow.visits.length>1?` <span style="font-size:12px;color:var(--ink3)">（×${flow.visits.length}人分 = ¥${(total*flow.visits.length).toLocaleString()}）</span>`:'';
  document.getElementById('confirm-total').innerHTML=`¥${total.toLocaleString()}${suffix}`;
}

// 確定
async function confirmOrder(){
  if(!flow.visits.length||!flow.cart.length)return;
  const now=new Date();
  const orderTime=String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  const isBlind=document.getElementById('blind-check').checked;
  const todayOrders=allGroups.flatMap(g=>g.orders);

      const orderGroupId=visit.id+String(maxGSeq+1).padStart(2,'0');
      flow.cart.forEach((item,i)=>{
        maxSeq++;
        batch.set(db.collection('orders').doc(todayStr+String(maxSeq).padStart(3,'0')),{

}

// ━━━ ユーティリティ ━━━
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ━━━ ブラインドマーク表示ユーティリティ ━━━
const MARK_COLOR_MAP={R:'#c0392b',G:'#1a6e3a',W:null,Y:'#b8860b',B:'#185FA5'};

// ●/○のみ表示（ラベルなし）
function markDisplay(markId){
  if(!markId)return'';
  const cc=markId.charAt(0);
  const isDbl=markId.charAt(1)==='◎';
  const isWhite=cc==='W';
  const color=isWhite?'#18110a':(MARK_COLOR_MAP[cc]||'#666');
  const sym=isWhite?(isDbl?'○○':'○'):(isDbl?'●●':'●');
  return`<span style="color:${color};font-weight:700;font-size:15px;letter-spacing:-2px;line-height:1">${sym}</span>`;
}

// markオブジェクトから同じ記号を返す
function markSym(m){
  const cc=(m.colorCode||m.id.charAt(0));
  const isDbl=(m.mark||m.id.charAt(1))==='◎';
  const isWhite=cc==='W';
  const color=isWhite?'#18110a':(MARK_COLOR_MAP[cc]||'#666');
  const sym=isWhite?(isDbl?'○○':'○'):(isDbl?'●●':'●');
  return{sym,color};
}

// ── カスタムマークピッカー ──
function buildMarkPicker(cartIdx,currentMarkId){
  const panelId=`mppanel-${cartIdx}`;
  const current=blindMarks.find(m=>m.id===currentMarkId);
  const{sym:cSym,color:cColor}=current?markSym(current):{sym:'',color:''};
  const btnHtml=current
    ?`<span style="color:${cColor};font-weight:700;font-size:15px;letter-spacing:-2px">${cSym}</span>`
    :`<span style="font-size:11px;color:var(--ink3)">マーク</span>`;
  const opts=blindMarks.map(m=>{
    const{sym,color}=markSym(m);
    return`<div class="mark-picker-opt${m.id===currentMarkId?' active':''}"
      onclick="event.stopPropagation();setCartMark(${cartIdx},'${esc(m.id)}');document.getElementById('${panelId}').classList.remove('open');renderCart()">
      <span style="color:${color};font-weight:700;font-size:15px;letter-spacing:-2px">${sym}</span>
    </div>`;
  }).join('');
  return`<div class="mark-picker" id="mp-${cartIdx}">
    <div class="mark-picker-btn${currentMarkId?' selected':''}" onclick="event.stopPropagation();togglePicker('${panelId}',event)">
      ${btnHtml}<span class="mark-picker-caret">▾</span>
    </div>
    <div class="mark-picker-panel" id="${panelId}">
      <div class="mark-picker-none" onclick="event.stopPropagation();setCartMark(${cartIdx},'');document.getElementById('${panelId}').classList.remove('open');renderCart()">−</div>
      ${opts}
    </div>
  </div>`;
}

function togglePicker(panelId,e){
  if(e)e.stopPropagation();
  const panel=document.getElementById(panelId);
  if(!panel)return;
  const wasOpen=panel.classList.contains('open');
  document.querySelectorAll('.mark-picker-panel.open').forEach(p=>p.classList.remove('open'));
  if(!wasOpen)panel.classList.add('open');
}
document.addEventListener('click',()=>{
  document.querySelectorAll('.mark-picker-panel.open').forEach(p=>p.classList.remove('open'));
});
let toastTimer;
function showToast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='',2800);
}
</script>
