<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ログイン */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.07),transparent),var(--cream)}
.lcard{width:100%;max-width:360px;background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:40px 28px;box-shadow:var(--shadow-lg)}
.llogo{text-align:center;font-size:40px;margin-bottom:4px}
.lbrand{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;text-align:center;margin-bottom:2px}
.lsub{text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:28px}
.lcard label{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.lcard input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--cream);color:var(--ink)}
.lcard input:focus{outline:none;border-color:var(--gold)}
.lerr{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center}
.lbtn{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:14px;font-weight:500}

/* アプリ */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-brand{font-family:var(--serif);font-size:17px;color:var(--gold-l);letter-spacing:.08em}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* コンテンツ */

.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.page-title{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--gold-d)}

/* カード */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden}

/* ボタン */

.bp{background:var(--gold-d);color:var(--cream)}.bp:hover{background:var(--gold)}.bp:active{transform:scale(.97)}
.bs{background:var(--cream2);color:var(--ink2);border:1px solid var(--border2)}.bs:hover{background:var(--cream3)}
.bd{background:var(--red-l);color:var(--red);border:1px solid rgba(140,40,24,.2)}
.bt{background:var(--teal);color:#fff}.bt:hover{background:#1a8060}
.btn-full{width:100%}
.btn:disabled{opacity:.35;cursor:not-allowed}
.sm{padding:6px 10px;font-size:11px}

.req{color:var(--red);margin-left:2px}
.fi,.fs{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;color:var(--ink);background:var(--cream);width:100%}

.vis-name{font-size:15px;font-weight:500;color:var(--ink);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.vis-meta-inline{display:flex;gap:10px;font-size:11px;color:var(--ink3);flex:1;min-width:0;align-items:center;flex-wrap:nowrap;overflow:hidden}
.vis-meta-inline span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vis-row2{display:flex;align-items:center;gap:8px}
.vis-stat-inline{display:flex;align-items:baseline;gap:4px;background:var(--cream2);border-radius:var(--r);padding:5px 10px;flex-shrink:0}
.vis-stat-label{font-size:10px;color:var(--ink3)}

.vis-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}

.bg-teal{background:var(--teal-l);color:var(--teal);border:1px solid rgba(26,110,88,.3)}

.modal-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--gold-d)}
.modal-x{background:none;border:none;font-size:22px;color:var(--ink3);line-height:1;padding:0 4px}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* 退店モーダル内の注文リスト */
.checkout-order-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.co-group{border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.co-group-label{font-size:10px;color:var(--ink3);padding:2px 8px;background:var(--cream3);border-bottom:1px solid var(--border);letter-spacing:.04em}
.checkout-order-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--cream2);border-radius:var(--r);font-size:12px}
.co-type{padding:2px 6px;border-radius:20px;font-size:9px;font-weight:500;flex-shrink:0}
.co-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink2)}
.co-qty{font-family:var(--mono);color:var(--ink3);font-size:11px;flex-shrink:0}
.co-price{font-family:var(--mono);font-weight:500;color:var(--ink);flex-shrink:0}
.checkout-summary{background:var(--ink);border-radius:var(--r);padding:12px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cs-label{font-size:12px;color:rgba(255,255,255,.6)}
.cs-value{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-l)}

/* トースト */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:calc(100% - 32px);max-width:360px}
.toast{padding:11px 16px;border-radius:var(--r);font-size:13px;font-weight:500;text-align:center;box-shadow:var(--shadow-lg)}
.tok{background:var(--teal);color:#fff}
.terr{background:var(--red);color:#fff}
.tinf{background:var(--gold-d);color:var(--cream)}

.empty{text-align:center;padding:32px 20px;color:var(--ink3);font-size:13px}
.loading{text-align:center;padding:24px;color:var(--ink3);font-size:13px}
.keybox{background:var(--ink);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:13px;color:var(--gold-l);letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.klabel{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-left:auto;white-space:nowrap}
.kp-date{background:rgba(200,146,30,.3);color:var(--gold-l);padding:1px 6px;border-radius:3px;font-size:11px}
.kp-seq{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:1px 6px;border-radius:3px;font-size:11px}
</style>

var auth = firebase.auth();
var db   = firebase.firestore();

// ── ユーティリティ ─────────────────────────────────────────────
function g(id){ return document.getElementById(id); }
function gv(id){ var el=g(id); return el?el.value.trim():''; }
function sv(id,val){ var el=g(id); if(el) el.value=(val==null?'':val); }
function pad(n,l){ return String(n||'').padStart(l,'0'); }
function escHtml(s){ var t=String(s||''); t=t.split('&').join('&amp;'); t=t.split('<').join('&lt;'); t=t.split('>').join('&gt;'); return t; }
function nowHHMM(){ var d=new Date(); return pad(d.getHours(),2)+pad(d.getMinutes(),2); }
function todayStr6(){ var d=new Date(); return String(d.getFullYear()).slice(2)+pad(d.getMonth()+1,2)+pad(d.getDate(),2); }
function fmtHHMM(t){ if(!t||!/[0-9]{4}/.test(t.slice(0,4))) return t||''; return t.slice(0,2)+':'+t.slice(2,4); }
function fmtDate6(d){ if(!d||d.length<6) return d||''; return '20'+d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4,6); }

function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast t'+(type||'ok');
  el.textContent=(type==='err'?'✕ ':type==='inf'?'ℹ ':'✓ ')+msg;
  g('toasts').appendChild(el);
  setTimeout(function(){el.remove();},(type==='err'?10000:3000));
}
function openM(id){ g(id).classList.add('open'); }
function closeM(id){ g(id).classList.remove('open'); }

// 10ml単価計算
function calcAmount(orders){
  return orders.reduce(function(s,o){
    if(o.served===0) return s;
    var qty=parseFloat(o.qty)||0, price=parseFloat(o.unitPrice||o.price||0);
    var t=o.productType||o.type||'';
    return s + (t==='tequila'||t==='spirits'
      ? Math.round(price*qty/10) : Math.round(price*qty));
  },0);
}
function calcTequila(orders){
  return orders.filter(function(o){
    if(o.served===0) return false;
    var t=o.productType||o.type||'';
    return t==='tequila';
  }).reduce(function(s,o){ return s+(parseFloat(o.qty)||0); },0);
}

// ── データ読み込み ──────────────────────────────────────────────
function loadAll(){
  var today=todayStr6();
  Promise.all([
    db.collection('members').get().then(function(s){ cache.members=s.docs.map(function(d){return Object.assign({id:d.id},d.data());}); }),
    db.collection('visits').get().then(function(s){
      cache.visits=s.docs.map(function(d){return Object.assign({id:d.id},d.data());})
        .filter(function(v){ return (v.visitDate||v.id.slice(0,6))===today; });
    }),
    db.collection('orders').get().then(function(s){
      cache.orders=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    })
  ]).then(function(){
    // 当日visitのIDセットで絞り込む
    var todayIds=new Set(cache.visits.map(function(v){return v.id;}));
    cache.orders=cache.orders.filter(function(o){
      if(o.orderDate) return o.orderDate===today;
      return todayIds.has(o.visitKey||o.visitId);
    });
    renderVisitorList();
  }).catch(function(e){ toast('読み込み失敗: '+e.message,'err'); });
}

// ── 更新ボタン ──────────────────────────────────────────────────
g('btn-refresh').addEventListener('click',function(){
  var today=todayStr6();
  g('visitor-list').innerHTML='<div class="loading">更新中...</div>';
  Promise.all([
    db.collection('visits').get().then(function(s){
      cache.visits=s.docs.map(function(d){return Object.assign({id:d.id},d.data());})
        .filter(function(v){ return (v.visitDate||v.id.slice(0,6))===today; });
    }),
    db.collection('orders').get().then(function(s){
      cache.orders=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    })
  ]).then(function(){
    var todayIds2=new Set(cache.visits.map(function(v){return v.id;}));
    cache.orders=cache.orders.filter(function(o){
      if(o.orderDate) return o.orderDate===today;
      return todayIds2.has(o.visitKey||o.visitId);
    });
    // 各来場者の注文集計を更新してFirestoreに書き込む
    var batch=db.batch();
    var updated=0;
    cache.visits.forEach(function(v){
      if(v.checkoutTime || v.checkoutPayTime) return; // 会計済・退場済はスキップ
      var vOrders=cache.orders.filter(function(o){ return o.visitKey===v.id||o.visitId===v.id; });
      var totalAmt=calcAmount(vOrders);
      var totalTq=calcTequila(vOrders);
      // 集計値が変わっていれば更新
      if(totalAmt!==(v.amount||0)||totalTq!==(v.tequilaAmount||0)){
        batch.update(db.collection('visits').doc(v.id),{
          amount: totalAmt,
          tequilaAmount: totalTq
        });
        v.amount=totalAmt;
        v.tequilaAmount=totalTq;
        updated++;
      }
    });
    batch.commit().then(function(){
      renderVisitorList();
      toast(updated?updated+'件の飲酒量・金額を更新しました':'最新の状態です（更新なし）', updated?'ok':'inf');
    });
  }).catch(function(e){ toast('更新失敗: '+e.message,'err'); });
});

// ── 来場者一覧レンダリング ─────────────────────────────────────
function getMemberInfo(memberId){
  if(!memberId) return null;
  return cache.members.find(function(m){ return m.id===memberId||m.memberId===memberId; });
}

function getVisitOrders(visitId){
  return cache.orders.filter(function(o){ return o.visitKey===visitId||o.visitId===visitId; });
}

function renderVisitorList(){
  var el=g('visitor-list');
  // 来場中: 会計時間も退場時間も未セット
  var active=cache.visits.filter(function(v){ return !v.checkoutPayTime && !v.checkoutTime; });
  // 会計済: 会計時間がセット・退場時間は未セット
  var paid=cache.visits.filter(function(v){ return !!v.checkoutPayTime && !v.checkoutTime; });
  // 退場済: 退場時間がセット
  var done=cache.visits.filter(function(v){ return !!v.checkoutTime; });
  active.sort(function(a,b){ return (a.visitTime||a.id).localeCompare(b.visitTime||b.id); });
  paid.sort(function(a,b){ return (a.visitTime||a.id).localeCompare(b.visitTime||b.id); });
  done.sort(function(a,b){ return (b.checkoutTime||'').localeCompare(a.checkoutTime||''); });

  if(!cache.visits.length){
    el.innerHTML='<div class="empty">本日の来場者はいません</div>';
    return;
  }

  var html='';
  if(active.length){
    html+='<div style="font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding-left:4px">来場中（'+active.length+'名）</div>';
    active.forEach(function(v){ html+=renderVisCard(v,'active'); });
  }
  if(paid.length){
    html+='<div style="font-size:11px;font-weight:500;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;padding-left:4px">来場中（会計済）（'+paid.length+'名）</div>';
    paid.forEach(function(v){ html+=renderVisCard(v,'paid'); });
  }
  if(done.length){
    html+='<div style="font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;padding-left:4px">退場済（'+done.length+'名）</div>';
    done.forEach(function(v){ html+=renderVisCard(v,'done'); });
  }
  el.innerHTML=html;

  // イベントバインド
  el.querySelectorAll('[data-checkout]').forEach(function(btn){
    btn.addEventListener('click',function(){ openCheckoutModal(btn.dataset.checkout); });
  });
  el.querySelectorAll('[data-refresh-visit]').forEach(function(btn){
    btn.addEventListener('click',function(){ refreshSingleVisit(btn.dataset.refreshVisit, btn); });
  });
  el.querySelectorAll('[data-orders-visit]').forEach(function(btn){
    btn.addEventListener('click',function(){ openOrdersModal(btn.dataset.ordersVisit, btn.dataset.ordersName); });
  });

}

function renderVisCard(v, status){
  // status: 'active'=来場中, 'paid'=会計済, 'done'=退場済
  var isDone=(status==='done');
  var isPaid=(status==='paid');
  var mem=getMemberInfo(v.memberId);
  var name=mem?(mem.nickname||mem.name||v.memberId):(v.memberId?'ID: '+v.memberId:'非会員');
  var orders=getVisitOrders(v.id);
  var totalAmt=calcAmount(orders);
  var totalTq=calcTequila(orders);
  var orderCount=orders.length;

  var rankBadge=mem&&mem.rank?'<span class="badge bg-gold">'+escHtml(mem.rank)+'</span>':'';
  var statusBadge=isDone
    ?'<span class="badge bg-gray">退場 '+fmtHHMM(v.checkoutTime)+'</span>'
    :isPaid
      ?'<span class="badge" style="background:#e8b84b;color:#5a3800">会計済 '+fmtHHMM(v.checkoutPayTime)+'</span>'
      :'<span class="badge bg-teal">在店中</span>';

  // チェックボックス: 来場中・会計済のみ表示、退場済は非表示
  // data-status を付けてonVisitCheckChangeで種別判定
  var chk=!isDone
    ?'<input type="checkbox" class="vis-select-chk" data-visit-id="'+v.id+'" data-status="'+(isPaid?'paid':'active')+'" style="margin-right:8px;width:16px;height:16px;cursor:pointer" onchange="onVisitCheckChange()">'
    :'';

  // 行1: チェックボックス / 名前 / 来店ID・顧客ID / 来店時間・注文数 / バッジ
  var row1='<div class="vis-row1">'
    +chk
    +'<div class="vis-name">'+escHtml(name)+'</div>'
    +'<div class="vis-meta-inline">'
      +'<span class="vis-key">'+v.id+'</span>'
      +(v.memberId?'<span class="vis-key">'+escHtml(v.memberId)+'</span>':'')
      +'<span>来場: '+fmtHHMM(v.visitTime||'—')+'</span>'
      +'<span>注文 '+orderCount+'品</span>'
    +'</div>'
    +rankBadge
    +statusBadge
    +'</div>';

  // 行2: テキーラ量 / 合計金額 / ボタン群
  var row2='<div class="vis-row2">'
    +'<div class="vis-stat-inline"><span class="vis-stat-label">テキーラ</span><span class="vis-stat-val">'+totalTq+' ml</span></div>'
    +'<div class="vis-stat-inline"><span class="vis-stat-label">合計</span><span class="vis-stat-val">¥'+totalAmt.toLocaleString()+'</span></div>'
    +'<div class="vis-actions">'
      +'<button class="btn bs sm" data-refresh-visit="'+v.id+'">🔄</button>'
      +'<button class="btn bs sm" data-orders-visit="'+v.id+'" data-orders-name="'+escHtml(name)+'">📋 注文</button>'
    +'</div>'
    +'</div>';

  return '<div class="vis-card">'+row1+row2+'</div>';
}

g('m-orders-close').addEventListener('click',function(){ closeM('m-orders'); });
g('m-orders-close2').addEventListener('click',function(){ closeM('m-orders'); });

function openOrdersModal(visitKey, visitorName){
  g('mt-orders').textContent='注文一覧 — '+(visitorName||visitKey);
  g('orders-list').innerHTML='<div class="loading">読み込み中...</div>';
  g('orders-total').textContent='¥0';
  g('orders-tequila').textContent='0 ml';
  openM('m-orders');

  db.collection('orders').get().then(function(snap){
    var orders=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(o){ return o.visitKey===visitKey||o.visitId===visitKey; });

    // キャッシュ更新
    cache.orders=cache.orders.filter(function(o){ return o.visitKey!==visitKey&&o.visitId!==visitKey; }).concat(orders);

    var totalAmt=calcAmount(orders);
    var totalTq=calcTequila(orders);

    var TYPE_LABEL={'tequila':'テキーラ','other':'他酒','misc':'その他'};
    var TYPE_BG={'tequila':'background:#fdf0d0;color:#7a5610','other':'background:#E6F1FB;color:#0C447C','misc':'background:#e0f0eb;color:#1a6e58'};
    var ol=g('orders-list');
    if(!orders.length){
      ol.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:12px;text-align:center;background:var(--cream2);border-radius:var(--r)">注文記録なし</div>';
    } else {
      orders.sort(function(a,b){ return (a.orderTime||'').localeCompare(b.orderTime||''); });
      ol.innerHTML=orders.map(function(o){
        var lbl=TYPE_LABEL[o.productType]||o.productType||'—';
        var bg=TYPE_BG[o.productType]||'background:var(--cream2);color:var(--ink3)';
        var qty=(o.qty||0)+(o.unit||'ml');
        var amt=(o.productType==='tequila'||o.productType==='other')
          ? Math.round((o.unitPrice||0)*(o.qty||0)/10)
          : Math.round((o.unitPrice||0)*(o.qty||0));
        return '<div class="checkout-order-row">'
          +'<span class="co-type" style="'+bg+'">'+escHtml(lbl)+'</span>'
          +'<span class="co-name">'+escHtml(o.productName||'—')+'</span>'
          +'<span class="co-qty">'+escHtml(qty)+'</span>'
          +'<span class="co-price">¥'+amt.toLocaleString()+'</span>'
        +'</div>';
      }).join('');
    }
    g('orders-total').textContent='¥'+totalAmt.toLocaleString();
    g('orders-tequila').textContent=totalTq+' ml';
  }).catch(function(e){ toast('注文読込失敗: '+e.message,'err'); });
}

// ── 個別更新 ───────────────────────────────────────────────────
function refreshSingleVisit(visitKey, btn){
  var orig=btn?btn.textContent:'';
  if(btn){ btn.textContent='…'; btn.disabled=true; }
  var today=todayStr6();
  // 注文データを再取得してこの来場者の集計を更新
  db.collection('orders').get().then(function(snap){
    cache.orders=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
      .filter(function(o){ return o.orderDate===today; });
    var orders=getVisitOrders(visitKey);
    var totalAmt=calcAmount(orders);
    var totalTq=calcTequila(orders);
    return db.collection('visits').doc(visitKey).update({
      amount: totalAmt,
      tequilaAmount: totalTq
    }).then(function(){
      var v=cache.visits.find(function(x){ return x.id===visitKey; });
      if(v){ v.amount=totalAmt; v.tequilaAmount=totalTq; }
      renderVisitorList();
      toast('更新しました（テキーラ'+totalTq+'ml / ¥'+totalAmt.toLocaleString()+'）');
    });
  }).catch(function(e){
    if(btn){ btn.textContent=orig; btn.disabled=false; }
    toast('更新失敗: '+e.message,'err');
  });
}

// ── 来店登録（グループ対応） ────────────────────────────────────
var _nextSeq = 1;
var _checkinGroup = { id: null, total: 1, current: 1 };

function calcNextSeq(today){
  var maxSeq=0;
  cache.visits.forEach(function(v){
    if((v.visitDate||v.id.slice(0,6))===today){
      var s=parseInt(v.id.slice(6,8))||0;
      if(s>maxSeq) maxSeq=s;
    }
  });
  return maxSeq+1;
}

function calcNextGroupId(today){
  // 当日の最大グループ通番+1（3桁）
  var maxG=0;
  cache.visits.forEach(function(v){
    if((v.visitDate||v.id.slice(0,6))===today && v.checkinGroupId){
      var n=parseInt(v.checkinGroupId.slice(6))||0;
      if(n>maxG) maxG=n;
    }
  });
  return today+pad(maxG+1,3);
}

function onCountChange(){
  var count=parseInt(gv('ci-count'))||1;
  var lbl=g('ci-person-label');
  if(lbl) lbl.textContent=count>1?'（1人目）':'';
}

g('btn-checkin').addEventListener('click',function(){
  var today=todayStr6();
  _nextSeq=calcNextSeq(today);
  _checkinGroup={ id: calcNextGroupId(today), total:1, current:1 };
  g('kb-date').textContent=today;
  g('kb-seq').textContent=pad(_nextSeq,2);
  g('kb-group-id').textContent=_checkinGroup.id;
  sv('ci-time',nowHHMM());
  sv('ci-member','');
  sv('ci-count','1');
  sv('ci-payment','0');
  g('ci-member-status').textContent='';
  g('ci-progress').style.display='none';
  var lbl=g('ci-person-label'); if(lbl) lbl.textContent='';
  openM('m-checkin');
});

// 会員IDリアルタイムチェック
g('ci-member').addEventListener('input',function(){
  var val=this.value.trim();
  var status=g('ci-member-status');

  var mem=getMemberInfo(val);

    status.style.color='var(--teal)';
  } else {
    status.textContent='✕ 会員ID「'+val+'」は登録されていません（非会員として登録可）';
    status.style.color='var(--ink3)';
  }
});

g('m-checkin-close').addEventListener('click',function(){ closeM('m-checkin'); });
g('m-checkin-cancel').addEventListener('click',function(){ closeM('m-checkin'); });

g('m-checkin-save').addEventListener('click',function(){
  var today=todayStr6();
  var time=gv('ci-time');
  if(!time||time.length!==4){ toast('来場時間（4桁）は必須です','err'); return; }

  // 初回クリック時にグループ人数を確定
  if(_checkinGroup.current===1){
    _checkinGroup.total=Math.max(1,parseInt(gv('ci-count'))||1);
    _checkinGroup.id=calcNextGroupId(today);
    _nextSeq=calcNextSeq(today);
    g('kb-group-id').textContent=_checkinGroup.id;
  }

  var visitKey=today+pad(_nextSeq,2);
  if(cache.visits.some(function(v){ return v.id===visitKey; })){
    toast('visitKey「'+visitKey+'」は既に存在します','err'); return;
  }
  var memberId=gv('ci-member')||null;

  // 同一会員が既に在店中かチェック（非会員はスキップ）
  if(memberId){
    var alreadyIn=cache.visits.find(function(v){
      return v.memberId===memberId && !v.checkoutTime;
    });
    if(alreadyIn){
      var mem=getMemberInfo(memberId);
      var memName=mem?(mem.nickname||mem.name||memberId):memberId;
      toast('「'+memName+'」は既に在店中です（'+alreadyIn.id+'）','err');
      return;
    }
  }

  var groupId=_checkinGroup.total>1?_checkinGroup.id:null;

  db.collection('visits').doc(visitKey).set({
    visitKey: visitKey,
    visitDate: today,
    visitTime: time,
    seq: _nextSeq,
    memberId: memberId,
    checkinGroupId: groupId,   // グループ来店ID（1人なら null）
    tequilaAmount: 0,
    amount: 0,
    payment: gv('ci-payment')||'0',
    receiptIssued: '0',
    checkoutTime: null
  }).then(function(){
    cache.visits.push({
      id:visitKey, visitKey:visitKey, visitDate:today, visitTime:time,
      seq:_nextSeq, memberId:memberId, checkinGroupId:groupId,
      tequilaAmount:0, amount:0,
      payment:gv('ci-payment')||'0', receiptIssued:'0', checkoutTime:null
    });

    var cur=_checkinGroup.current;
    var total=_checkinGroup.total;

    if(cur>=total){
      // 全員登録完了
      toast(total>1?total+'名のグループ来場を登録しました（グループ: '+groupId+'）':'来場を登録しました（'+visitKey+'）');
      closeM('m-checkin');
      _checkinGroup={ id:null, total:1, current:1 };
      g('ci-progress').style.display='none';
      renderVisitorList();
    } else {
      // 次の人へ
      _checkinGroup.current=cur+1;
      _nextSeq=calcNextSeq(today);
      g('kb-seq').textContent=pad(_nextSeq,2);
      g('kb-group-id').textContent=_checkinGroup.id;
      sv('ci-member','');
      sv('ci-payment','0');
      g('ci-member-status').textContent='';
      // 進捗表示
      var prog=g('ci-progress');
      prog.style.display='block';
      g('ci-progress-text').textContent=(cur+1)+'/'+total+'人目';
      var lbl=g('ci-person-label');
      if(lbl) lbl.textContent='（'+( cur+1)+'/'+total+'人目）';
      // 人数フィールドをロック
      var countEl=g('ci-count'); if(countEl) countEl.disabled=true;
      toast((cur)+'人目を登録しました。続けて'+(cur+1)+'人目を入力してください','inf');
      renderVisitorList();
    }
  }).catch(function(e){ toast('登録失敗: '+e.message,'err'); });
});

// ── 新規注文ボタン ────────────────────────────────────────────
function goOrderPage(){
  var chks=document.querySelectorAll('.vis-select-chk:checked[data-status="active"]');
  if(chks.length===0){
    // チェックなし → STEP0（来場者選択画面）
    window.location.href='home_order.html';
    return;
  }
  // チェックあり → visitKeyをクエリパラメータで渡してSTEP1へ
  var visitKeys=Array.prototype.map.call(chks,function(c){ return c.dataset.visitId; });
  window.location.href='home_order.html?visits='+encodeURIComponent(visitKeys.join(','));
}

// ── お会計（複数対応） ─────────────────────────────────────────
var bulkCheckoutVisitKeys=[];
var warikanAmounts={};  // visitKey → 入力金額

function openBulkCheckout(){
  bulkCheckoutVisitKeys=getSelectedVisitIds();
  if(!bulkCheckoutVisitKeys.length) return;

  // Firestoreから最新注文を取得して表示
  g('checkout-persons-area').innerHTML='<div class="loading">読み込み中...</div>';
  g('warikan-area').innerHTML='';
  g('co-grand-total').textContent='¥0';
  g('warikan-diff').textContent='残金: ¥0';
  g('warikan-diff').style.color='var(--teal)';
  g('m-checkout-save').disabled=true;
  var alsoChk=g('co-also-checkout'); if(alsoChk) alsoChk.checked=false;
  openM('m-checkout');

  db.collection('orders').get().then(function(snap){
    var allOrders=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});

    var personsHtml='';
    var grandTotal=0;
    var TYPE_LABEL={'tequila':'テキーラ','other':'他酒','misc':'その他'};
    var TYPE_BG={'tequila':'background:#fdf0d0;color:#7a5610','other':'background:#E6F1FB;color:#0C447C','misc':'background:#e0f0eb;color:#1a6e58'};

    warikanAmounts={};

    bulkCheckoutVisitKeys.forEach(function(visitKey){
      var v=cache.visits.find(function(x){ return x.id===visitKey; });
      if(!v) return;
      var mem=getMemberInfo(v.memberId);
      var name=mem?(mem.nickname||mem.name||v.memberId):(v.memberId?'ID: '+v.memberId:'非会員');

      var orders=allOrders.filter(function(o){ return o.visitKey===visitKey||o.visitId===visitKey; });
      var totalAmt=calcAmount(orders);
      grandTotal+=totalAmt;
      warikanAmounts[visitKey]=totalAmt;

      // 注文リスト（orderGroupId単位で枠囲み）
      var orderRows='';
      if(orders.length===0){
        orderRows='<div style="font-size:12px;color:var(--ink3);padding:8px">注文なし</div>';
      } else {
        // orderGroupIdでグループ化（時刻順）
        var sortedOrders=orders.slice().sort(function(a,b){
          return(a.orderGroupId||a.orderTime||'').localeCompare(b.orderGroupId||b.orderTime||'');
        });
        var groupMap={}, groupOrder=[];
        sortedOrders.forEach(function(o){
          var gid=o.orderGroupId||'_';
          if(!groupMap[gid]){ groupMap[gid]=[]; groupOrder.push(gid); }
          groupMap[gid].push(o);
        });
        groupOrder.forEach(function(gid){
          var gitems=groupMap[gid];
          var gTime=gitems[0].orderTime||'';
          var gTimeStr=gTime?gTime.slice(0,2)+':'+gTime.slice(2,4):'';
          var itemsHtml=gitems.map(function(o){
            var lbl=TYPE_LABEL[o.productType]||o.productType||'—';
            var bg=TYPE_BG[o.productType]||'background:var(--cream2);color:var(--ink3)';
            var t=o.productType||o.type||'';
            var amt=(t==='tequila'||t==='spirits')?Math.round((o.unitPrice||0)*(o.qty||0)/10):Math.round((o.unitPrice||0)*(o.qty||0));
            return '<div class="checkout-order-row">'
              +'<span class="co-type" style="'+bg+'">'+escHtml(lbl)+'</span>'
              +'<span class="co-name">'+escHtml(o.productName||'—')+'</span>'
              +'<span class="co-qty">'+escHtml((o.qty||0)+(o.unit||'ml'))+'</span>'
              +'<span class="co-price">¥'+amt.toLocaleString()+'</span>'
              +'</div>';
          }).join('');
          orderRows+='<div class="co-group">'
            +'<div class="co-group-label">'+escHtml(gTimeStr)+'</div>'
            +itemsHtml
            +'</div>';
        });
      }

      var subtotalRow=bulkCheckoutVisitKeys.length>1
        ?'<div style="text-align:right;font-size:13px;font-weight:600;color:var(--gold-d);margin-top:6px">小計: ¥'+totalAmt.toLocaleString()+'</div>'
        :'';
      personsHtml+='<div style="background:var(--cream2);border-radius:var(--r);padding:10px 12px;margin-bottom:10px">'
        +'<div style="font-size:14px;font-weight:500;margin-bottom:6px">'+escHtml(name)+'</div>'
        +'<div class="checkout-order-list">'+orderRows+'</div>'
        +subtotalRow
        +'</div>';
    });

    g('checkout-persons-area').innerHTML=personsHtml;
    g('co-grand-total').textContent='¥'+grandTotal.toLocaleString();

    // 1人の場合は割り勘セクション非表示・確定ボタン即有効化
    var ws=g('warikan-section');
    if(bulkCheckoutVisitKeys.length===1){
      if(ws) ws.style.display='none';
      g('m-checkout-save').disabled=false;
    } else {
      if(ws) ws.style.display='block';
      renderWarikan(grandTotal);
    }

    // キャッシュ更新
    cache.orders=allOrders.filter(function(o){
      return bulkCheckoutVisitKeys.some(function(vk){ return o.visitKey===vk||o.visitId===vk; });
    }).concat(cache.orders.filter(function(o){
      return !bulkCheckoutVisitKeys.some(function(vk){ return o.visitKey===vk||o.visitId===vk; });
    }));

  }).catch(function(e){ toast('注文読込失敗: '+e.message,'err'); });
}

function applyWarikan(mode){
  var grandTotalStr=g('co-grand-total').textContent.replace(/[^0-9]/g,'');
  var grandTotal=parseInt(grandTotalStr)||0;
  var n=bulkCheckoutVisitKeys.length;
  if(!n) return;

  if(mode==='split'){
    // 100円未満切り捨て
    var each=Math.floor(grandTotal/n/100)*100;
    var remainder=grandTotal-(each*n);
    bulkCheckoutVisitKeys.forEach(function(vk){
      var el=g('wk-'+vk); if(el) el.value=each;
      warikanAmounts[vk]=each;
    });
    // 残りは残金欄に表示（自動で差分として出る）
  } else {
    // 個別会計: 各人の実際の注文合計を再セット
    bulkCheckoutVisitKeys.forEach(function(vk){
      var orders=cache.orders.filter(function(o){ return o.visitKey===vk||o.visitId===vk; });
      var amt=calcAmount(orders);
      var el=g('wk-'+vk); if(el) el.value=amt;
      warikanAmounts[vk]=amt;
    });
  }
  updateWarikanDiff();
}

function renderWarikan(grandTotal){
  var html='';
  bulkCheckoutVisitKeys.forEach(function(visitKey){
    var v=cache.visits.find(function(x){ return x.id===visitKey; });
    if(!v) return;
    var mem=getMemberInfo(v.memberId);
    var name=mem?(mem.nickname||mem.name||v.memberId):(v.memberId?'ID: '+v.memberId:'非会員');
    var amt=warikanAmounts[visitKey]||0;
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">'
      +'<span style="font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(name)+'</span>'
      +'<button class="btn bs sm" onclick="adjustWarikan(\''+visitKey+'\', -500)">−500</button>'
      +'<button class="btn bs sm" onclick="adjustWarikan(\''+visitKey+'\', -100)">−100</button>'
      +'<input type="number" step="100" value="'+amt+'" id="wk-'+visitKey+'"'
      +' style="width:85px;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;text-align:right"'
      +' oninput="updateWarikanDiff()">'
      +'<button class="btn bs sm" onclick="adjustWarikan(\''+visitKey+'\', 100)">+100</button>'
      +'<button class="btn bs sm" onclick="adjustWarikan(\''+visitKey+'\', 500)">+500</button>'
      +'</div>';
  });
  g('warikan-area').innerHTML=html;
  updateWarikanDiff();
}

function adjustWarikan(visitKey, delta){
  var el=g('wk-'+visitKey);
  if(!el) return;
  el.value=Math.max(0, (parseInt(el.value)||0)+delta);
  updateWarikanDiff();
}

function updateWarikanDiff(){
  var grandTotalStr=g('co-grand-total').textContent.replace(/[^0-9]/g,'');
  var grandTotal=parseInt(grandTotalStr)||0;
  var inputSum=0;
  bulkCheckoutVisitKeys.forEach(function(visitKey){
    var el=g('wk-'+visitKey);
    inputSum+=(el?parseInt(el.value)||0:0);
  });
  var diff=grandTotal-inputSum;
  var diffEl=g('warikan-diff');
  if(diff===0){
    diffEl.textContent='残金: ¥0';
    diffEl.style.color='var(--teal)';
    g('m-checkout-save').disabled=false;
  } else {
    diffEl.textContent='残金: '+(diff>0?'+':'')+'¥'+diff.toLocaleString();
    diffEl.style.color=diff>0?'var(--red)':'var(--ink2)';
    g('m-checkout-save').disabled=true;
  }
}

g('m-checkout-close').addEventListener('click',function(){ closeM('m-checkout'); });
g('m-checkout-cancel').addEventListener('click',function(){ closeM('m-checkout'); });

// お会計確定ボタンはonclickでも対応（disabledによるlistener無効化を回避）
function doCheckoutSave(){
  var btn=g('m-checkout-save');
  if(btn && btn.disabled) return;
  if(!bulkCheckoutVisitKeys.length) return;
  var payment=gv('co-payment')||'0';
  var receipt=gv('co-receipt')||'0';
  var now=nowHHMM();
  var alsoCheckout=g('co-also-checkout')&&g('co-also-checkout').checked;

  var fbBatch=db.batch();
  bulkCheckoutVisitKeys.forEach(function(visitKey){
    var orders=cache.orders.filter(function(o){ return o.visitKey===visitKey||o.visitId===visitKey; });
    var wkEl=g('wk-'+visitKey);
    var totalAmt=wkEl?parseInt(wkEl.value)||0:calcAmount(orders);
    var totalTq=calcTequila(orders);
    var updateData={
      amount: totalAmt,
      tequilaAmount: totalTq,
      payment: payment,
      receiptIssued: receipt,
      checkoutPayTime: now
    };
    if(alsoCheckout) updateData.checkoutTime=now;
    fbBatch.update(db.collection('visits').doc(visitKey), updateData);
    var v=cache.visits.find(function(x){ return x.id===visitKey; });
    if(v){
      v.amount=totalAmt; v.tequilaAmount=totalTq;
      v.payment=payment; v.receiptIssued=receipt;
      v.checkoutPayTime=now;
      if(alsoCheckout) v.checkoutTime=now;
    }
  });

  fbBatch.commit().then(function(){
    closeM('m-checkout');
    var msg=alsoCheckout
      ?'お会計・退場を確定しました（'+bulkCheckoutVisitKeys.length+'名）'
      :'お会計を確定しました（'+bulkCheckoutVisitKeys.length+'名）';
    toast(msg);
    renderVisitorList();
  }).catch(function(e){ toast('お会計処理失敗: '+e.message,'err'); });
}

g('m-checkout-save').addEventListener('click', doCheckoutSave);

function bulkCheckoutTime(){
  var visitIds=getSelectedByStatus('paid');
  if(!visitIds.length){ toast('会計済の方を選択してください','err'); return; }
  if(!confirm(visitIds.length+'名を退場処理しますか？')) return;
  var time=nowHHMM();

  visitIds.forEach(function(visitKey){

    toast(visitIds.length+'名を退場処理しました（'+fmtHHMM(time)+'）');
    renderVisitorList();

}

// ── レシート印刷（ESC/POS Bluetooth） ──────────────────────────
var receiptDevice = null;
var receiptCharacteristic = null;

async function printReceipt(){
  // bottleDataを取得してキャッシュ
  if(!window._bottleCache){
    window._bottleCache={};
    try{
      var snap=await db.collection('bottleData').get();
      snap.forEach(function(doc){ window._bottleCache[doc.id]=doc.data(); });
    }catch(e){ console.warn('bottleData取得失敗:', e); }
  }

  try{
    // Bluetoothデバイス選択
    if(!receiptDevice || !receiptDevice.gatt.connected){
      toast('プリンターを選択してください...','inf');
      receiptDevice = await navigator.bluetooth.requestDevice({
        filters:[{services:['000018f0-0000-1000-8000-00805f9b34fb']}],
        optionalServices:['000018f0-0000-1000-8000-00805f9b34fb']
      });
      var server = await receiptDevice.gatt.connect();
      var service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
      receiptCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
      toast('プリンター接続完了','inf');
    }

    // レシートデータ生成
    var data = buildReceiptData();
    await sendToPrinter(receiptCharacteristic, data);
    toast('印刷しました');
  }catch(e){
    console.error('印刷エラー:', e);
    toast('印刷失敗: '+e.message,'err');
    receiptDevice=null; receiptCharacteristic=null;
  }
}


function makeQR(url){
  var ESC=0x1B, GS=0x1D;
  var parts=[];
  var urlBytes=new TextEncoder().encode(url);
  var len=urlBytes.length;
  // QRコードモデル設定
  parts.push([GS,0x28,0x6B,0x04,0x00,0x31,0x41,0x32,0x00]);
  // QRコードサイズ（8）
  parts.push([GS,0x28,0x6B,0x03,0x00,0x31,0x43,0x08]);
  // エラー訂正レベルM
  parts.push([GS,0x28,0x6B,0x03,0x00,0x31,0x45,0x30]);
  // データ送信
  var pL=(len+3)&0xFF, pH=((len+3)>>8)&0xFF;
  parts.push([GS,0x28,0x6B,pL,pH,0x31,0x50,0x30]);
  urlBytes.forEach(function(b){ parts.push([b]); });
  // 印刷
  parts.push([GS,0x28,0x6B,0x03,0x00,0x31,0x51,0x30]);
  return parts;
}

function buildReceiptData(){
  var ESC=0x1B, GS=0x1D, FS=0x1C;
  var SEP='================================'; // 32文字
  var parts=[];

  // 初期化
  parts.push([ESC,0x40]);
  // GB18030漢字モードON
  parts.push([0x1C,0x26]);

  // 中央揃え
  parts.push([ESC,0x61,0x01]);
  // 店名（大文字）
  parts.push([ESC,0x21,0x30]);
  parts.push(sjisBytes('テキーラ道場\n'));
  parts.push([ESC,0x21,0x00]);
  // 住所（〒行は空行に）
  parts.push(sjisBytes('\n'));
  parts.push(sjisBytes('千葉市中央区長洲1-24-1-215\n'));
  parts.push(sjisBytes(SEP+'\n'));

  // 日時（中央揃えのまま）
  var now=new Date();
  var dateStr=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+
    String(now.getDate()).padStart(2,'0')+' '+
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  parts.push(sjisBytes(dateStr+'\n'));
  parts.push(sjisBytes(SEP+'\n'));

  // 左揃えで明細
  parts.push([ESC,0x61,0x00]);

  // 注文明細（productName・qty・unitPrice使用）
  var grandTotal=parseInt((document.getElementById('co-grand-total').textContent||'0').replace(/[^0-9]/g,''))||0;
  var orderSummary={};
  bulkCheckoutVisitKeys.forEach(function(visitKey){
    var orders=cache.orders.filter(function(o){ return (o.visitKey||o.visitId)===visitKey; });
    orders.forEach(function(o){
      var unitPrice=parseFloat(o.unitPrice)||0;
      var qtyMl=parseFloat(o.qty)||0;
      // bottleDataからEsの名前を取得
      var bd=window._bottleCache&&(window._bottleCache[o.productCode]||window._bottleCache[o.id]);
      var engName=bd?(bd.bottleEs||bd.bottleEn||bd.bottleJa||o.productName):(o.productName||'Unknown');
      engName=engName.replace(/[・]/g,'-');
      // qty=ml数、unitPrice=10ml単価
      var count=Math.round(qtyMl/10)||1; // 杯数
      var price=Math.round(unitPrice); // 10ml単価
      if(!orderSummary[engName]) orderSummary[engName]={count:0,price:price,engName:engName};
      orderSummary[engName].count+=count;
    });
  });
  // Font A（通常サイズ）で明細
  parts.push([ESC,0x4D,0x00]);
  var LINE=32; // 58mm幅で約32文字
  Object.keys(orderSummary).forEach(function(name){
    var item=orderSummary[name];
    var total=Math.round(item.price*item.count);
    // 1行目：商品名（最大32文字で切る）
    parts.push(sjisBytes(item.engName.substring(0,LINE)+'\n'));
    // 2行目：単価(10ml)×杯数 右揃え + 合計
    var right='\\'+item.price+'(10ml)x'+item.count+'=\\'+total.toLocaleString();
    parts.push(sjisBytes(padL(right,LINE)+'\n'));
  });


  // 中央揃えで区切り線
  parts.push([ESC,0x61,0x01]);
  parts.push(sjisBytes(SEP+'\n'));

  // 合計（右揃え・太字）
  parts.push([ESC,0x61,0x02]);
  parts.push([ESC,0x21,0x10]);
  // TOTAL行：￥を0xA3A4で直接送信
  var totalStr='TOTAL: '+grandTotal.toLocaleString()+'\n';
  var totalBytes=sjisBytes(totalStr);
  // ￥の位置を探してA3A4に置換
  parts.push(sjisBytes('TOTAL: '));
  parts.push(new Uint8Array([0xA3,0xA4]));
  parts.push(sjisBytes(grandTotal.toLocaleString()+'\n'));
  parts.push([ESC,0x21,0x00]);

  // フッター（中央揃え）
  parts.push([ESC,0x61,0x01]);
  parts.push(sjisBytes('\nご来場ありがとうございました\n\n'));

  // URL
  parts.push(sjisBytes('https://www.tequiladojo.com\n\n'));

  // QRコード
  var qrParts=makeQR('https://www.tequiladojo.com');
  qrParts.forEach(function(p){ parts.push(p); });
  parts.push(sjisBytes('\n\n\n'));

  // カット
  parts.push([GS,0x56,0x41,0x10]);

  // 結合
  var totalLen=0;
  parts.forEach(function(p){ totalLen+=p.length; });
  var buf=new Uint8Array(totalLen);
  var pos=0;
  parts.forEach(function(p){ buf.set(p instanceof Uint8Array?p:new Uint8Array(p),pos); pos+=p.length; });
  return buf;
}

// GBKエンコードキャッシュ
var _gbkCache={};
function gbkEncode(str){
  var result=[];
  for(var i=0;i<str.length;i++){
    var c=str.charCodeAt(i);
    if(c<0x80){
      result.push(c);
    } else if(c===0x0A){
      result.push(0x0A);
    } else if(c===0xA5||c===0xFFE5){
      // ¥記号 → GBKで0xA3A4（全角￥）
      result.push(0xA3); result.push(0xA4);
    } else {
      // Unicodeコードポイント→GBKの変換テーブル（よく使う日本語文字）
      var gb=unicodeToGbk(c);
      if(gb){
        result.push((gb>>8)&0xFF);
        result.push(gb&0xFF);
      } else {
        result.push(0x3F); // '?'
      }
    }
  }
  return new Uint8Array(result);
}

// Unicode→GBK変換（TextDecoderを逆用）
var _gbkMap=null;
function buildGbkMap(){
  if(_gbkMap) return;
  _gbkMap={};
  var decoder=new TextDecoder('gbk');
  // GBKの2バイト文字範囲を総当たりでデコードしてマップ構築（全範囲）
  for(var b1=0x81;b1<=0xFE;b1++){
    for(var b2=0x40;b2<=0xFE;b2++){
      if(b2===0x7F) continue;
      var bytes=new Uint8Array([b1,b2]);
      try{
        var ch=decoder.decode(bytes);
        if(ch&&ch.length===1&&ch.charCodeAt(0)>0x7F){
          _gbkMap[ch.charCodeAt(0)]=(b1<<8)|b2;
        }
      }catch(e){}
    }
  }
}
function unicodeToGbk(code){
  if(!_gbkMap) buildGbkMap();
  return _gbkMap[code]||0;
}

function sjisBytes(str){
  return gbkEncode(str);
}
function padR(s,n){ while(s.length<n) s+=' '; return s.substring(0,n); }
function padL(s,n){ while(s.length<n) s=' '+s; return s; }

async function sendToPrinter(char, data){
  var chunkSize=20;
  for(var i=0;i<data.length;i+=chunkSize){
    var chunk=data.slice(i,i+chunkSize);
    await char.writeValue(chunk);
    await new Promise(function(r){ setTimeout(r,20); });
  }
}
