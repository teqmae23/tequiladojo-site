<style>
:root{
  --ink:#18110a;--ink2:#4a3820;--ink3:#9a8470;
  --gold:#c8921e;--gold-l:#e8b84a;--gold-d:#7a5610;
  --teal:#1a6e58;--red:#8c2818;--red-l:#fae8e4;
  --cream:#faf7f1;--cream2:#f0ebe0;--cream3:#e4ddd0;--white:#fff;
  --border:rgba(160,130,100,.18);--border2:rgba(160,130,100,.32);
  --shadow:0 1px 12px rgba(24,17,10,.07);--shadow-lg:0 6px 36px rgba(24,17,10,.13);
  --r:8px;--rl:16px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}
button,input,select,textarea{font-family:var(--sans)}

/* ── ログイン画面 ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 30% 60%,rgba(200,146,30,.1),transparent),var(--cream);
  padding:24px;
}
.login-wrap{width:100%;max-width:400px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .logo-icon{font-size:52px;display:block;margin-bottom:6px;}
.login-logo h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--gold-d);letter-spacing:.14em;}
.login-logo p{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-top:4px;}
.login-card{background:var(--white);border:1px solid var(--border2);border-radius:var(--rl);padding:36px 32px;box-shadow:var(--shadow-lg);}
.login-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);}
.ltab{flex:1;padding:10px;background:none;border:none;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
.ltab.active{color:var(--gold-d);border-bottom-color:var(--gold-d);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--cream);color:var(--ink);outline:none;transition:.15s;}
.fi:focus{border-color:var(--gold);}
.fl{display:block;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;margin-top:14px;}
.fl:first-child{margin-top:0;}
.btn-primary{width:100%;margin-top:20px;padding:13px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--gold);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.err-msg{min-height:16px;font-size:12px;color:var(--red);margin-top:8px;text-align:center;}
.info-msg{font-size:12px;color:var(--ink3);margin-top:8px;text-align:center;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink3);font-size:11px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── 登録フォーム ── */
#app{display:none;min-height:100vh;background:var(--cream);}
.page-header{
  background:var(--ink);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.page-header h1{font-family:var(--serif);font-size:18px;color:var(--gold-l);letter-spacing:.1em;}
.header-right{display:flex;align-items:center;gap:10px;}
.user-chip{font-size:11px;color:rgba(255,255,255,.5);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-logout{padding:5px 12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:none;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;}
.btn-logout:hover{border-color:rgba(255,255,255,.5);color:#fff;}

.form-container{max-width:640px;margin:0 auto;padding:24px 16px 80px;}
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.section-title{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.frow{display:flex;gap:12px;flex-wrap:wrap;}
.fg{flex:1;min-width:120px;}
.req{color:var(--red);margin-left:2px;}
.readonly-field{padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--cream2);color:var(--ink2);font-family:var(--mono);}

/* アイコン・顔写真 */
.img-upload-area{
  border:2px dashed var(--border2);border-radius:var(--r);
  padding:16px;text-align:center;cursor:pointer;transition:.15s;
  position:relative;overflow:hidden;
}
.img-upload-area:hover{border-color:var(--gold);background:rgba(200,146,30,.03);}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.img-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);margin:0 auto 8px;display:block;}
.img-preview-rect{width:120px;height:90px;border-radius:var(--r);object-fit:cover;border:2px solid var(--border2);margin:0 auto 8px;display:block;}
.img-placeholder{width:80px;height:80px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px;border:2px solid var(--border);}
.img-placeholder-rect{width:120px;height:90px;border-radius:var(--r);background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px;border:2px solid var(--border);}
.img-label{font-size:11px;color:var(--ink3);}
.img-clear{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;margin-top:4px;text-decoration:underline;}

/* 累積データ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
.stat-card{background:var(--cream2);border-radius:var(--r);padding:12px 16px;text-align:center;}
.stat-label{font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.stat-value{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--gold-d);}
.stat-unit{font-size:10px;color:var(--ink3);margin-left:2px;}

/* 保存バー */
.save-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:0 -4px 16px rgba(24,17,10,.08);z-index:100;
}
.save-bar .status{flex:1;font-size:12px;color:var(--ink3);}
.btn-save{padding:11px 28px;background:var(--gold-d);color:var(--cream);border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;}
.btn-save:hover{background:var(--gold);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

/* トースト */
#toasts{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:360px;}
.toast{padding:10px 16px;border-radius:var(--r);font-size:13px;text-align:center;box-shadow:var(--shadow-lg);animation:fadeIn .2s;}
.tok{background:#1a3a1a;color:#7adf7a;border:1px solid #2d6a2d;}
.terr{background:#3a1a1a;color:#df7a7a;border:1px solid #6a2d2d;}
.tinf{background:#1a2a3a;color:#7ab8df;border:1px solid #2d4a6a;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* 都道府県 */
select.fi{cursor:pointer;}

/* 未認証バナー */
.verify-banner{
  background:#3a2a0a;border:1px solid var(--gold-d);border-radius:var(--r);
  padding:12px 16px;margin:16px 16px 0;font-size:13px;color:#e8b84a;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.verify-banner button{
  padding:6px 14px;border:1px solid var(--gold-d);border-radius:6px;
  background:none;color:#e8b84a;font-size:12px;cursor:pointer;white-space:nowrap;
}
.verify-banner button:hover{background:rgba(200,146,30,.2);}

/* 仮登録バナー */
.temp-banner{
  background:#2a1a2a;border:1px solid #6a3a6a;border-radius:var(--r);
  padding:12px 16px;margin:16px 16px 0;font-size:13px;color:#cc88cc;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
</style>
</head>

<div id="login-screen">

      <span class="logo-icon">🥃</span>

    </div>

    <div class="login-card">

        <div class="err-msg" id="login-err"></div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">ログイン</button>
        <p class="info-msg" style="margin-top:12px">
          <a href="#" onclick="doResetPassword()" style="color:var(--gold-d)">パスワードをお忘れの方</a>
        </p>
      </div>

      <!-- 新規登録タブ -->
      <div class="tab-panel" id="tab-register">

        <input type="hidden" id="reg-memberid">

        <label class="fl">ニックネーム <span class="req">*</span></label>
        <input type="text" class="fi" id="reg-nick" placeholder="タロ" oninput="checkRegReady()">
        <div style="font-size:11px;color:var(--ink3);margin-top:3px">全角8文字／半角16文字以内</div>

            <input type="date" class="fi" id="reg-birth" onchange="checkRegReady()">

          <div style="flex:1">

          </div>
        </div>
        <label class="fl">Facebook ID</label>
        <input type="text" class="fi" id="reg-fb" placeholder="username">

<script>
if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
var auth    = firebase.auth();
var db      = firebase.firestore();
var storage = firebase.storage();

var currentUser = null;
var memberDoc   = null;
var iconFile    = null;
var photoFile   = null;

// ── ユーティリティ ──────────────────────────────────────────────
function g(id){ return document.getElementById(id); }
function gv(id){ var el=g(id); return el?el.value.trim():''; }
function sv(id,val){ var el=g(id); if(el) el.value=(val==null?'':val); }
function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast '+(type==='err'?'terr':type==='inf'?'tinf':'tok');
  el.textContent=msg;
  g('toasts').appendChild(el);
  setTimeout(function(){ el.remove(); },(type==='err'?8000:3000));
}

var GRADE_LABELS=['無料会員','有料会員1','有料会員2','有料会員3'];

// ── 会員番号自動採番 ──────────────────────────────────────────
async function fetchNextMemberId(){
  var year=String(new Date().getFullYear()).slice(2);
  try{
    // トランザクションでcounters/membersのlastIdをインクリメント
    var counterRef=firebase.firestore().collection('counters').doc('members');
    var newId=null;
    await firebase.firestore().runTransaction(async function(tx){
      var doc=await tx.get(counterRef);
      var last=doc.exists?doc.data().lastId||0:0;
      var next=last+1;
      tx.update(counterRef,{lastId:next});
      newId=year+String(next).padStart(4,'0');
    });
    return newId;
  }catch(e){
    console.error('fetchNextMemberId:', e);
    return null;
  }
}

// ── 会員登録ボタンのアクティブ/非アクティブ切替 ────────────────
function checkRegReady(){
  var nick=document.getElementById('reg-nick').value.trim();
  var gender=document.getElementById('reg-gender').value;
  var birth=document.getElementById('reg-birth').value;
  var pass=document.getElementById('reg-pass').value;
  var pass2=document.getElementById('reg-pass2').value;
  var ready=nick&&gender&&birth&&pass&&pass2&&pass===pass2&&pass.length>=8;
  var btn=document.getElementById('btn-register');
  var btn2=document.getElementById('btn-register2');
  if(btn){ btn.disabled=!ready; btn.style.opacity=ready?'1':'.5'; }
  if(btn2){ btn2.disabled=!ready; btn2.style.opacity=ready?'1':'.5'; }
}

// ── タブ切替 ──────────────────────────────────────────────────
function switchLoginTab(tab){
  document.querySelectorAll('.ltab').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  document.querySelectorAll('.tab-panel').forEach(function(p,i){
    p.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register'));
  });

}

// ── ユーティリティ: 仮想メール変換 ────────────────────────────────
var VIRTUAL_DOMAIN = '@tequiladojo.member';

function toAuthEmail(input){
  // @が含まれていればそのままメール、なければ会員IDとして仮想メールに変換
  if(!input) return '';
  return input.indexOf('@') >= 0 ? input : input + VIRTUAL_DOMAIN;
}

// ── Firebase Auth ───────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(user){
    currentUser=user;
    g('login-screen').style.display='none';
    g('app').style.display='block';
    g('header-email').textContent=user.email||'仮登録会員';
    loadProfile();
  } else {
    currentUser=null;
    g('login-screen').style.display='flex';
    g('app').style.display='none';
    var vb=g('verify-banner'); if(vb) vb.style.display='none';
    var tb=g('temp-banner'); if(tb) tb.style.display='none';
    // URLパラメータ?tab=registerで登録タブを直接表示
    var params=new URLSearchParams(window.location.search);
    if(params.get('tab')==='register'){
      switchLoginTab('register');
    }
  }
});

function doLogin(){
  var input=gv('login-email'), pass=gv('login-pass');
  g('login-err').textContent='';
  if(!input||!pass){ g('login-err').textContent='会員IDまたはメールアドレスとパスワードを入力してください'; return; }
  var email=toAuthEmail(input);
  var btn=g('btn-login'); btn.disabled=true; btn.textContent='ログイン中...';
  auth.signInWithEmailAndPassword(email,pass)
    .catch(function(e){
      g('login-err').textContent=
        e.code==='auth/user-not-found'?'登録されていないIDまたはメールアドレスです':
        e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'パスワードが違います':
        'ログイン失敗: '+e.message;
      btn.disabled=false; btn.textContent='ログイン';
    });
}

// ニックネームの文字数チェック（全角1文字=2バイト換算）
function nickByteLen(str){
  var len=0;
  for(var i=0;i<str.length;i++){
    len+=str.charCodeAt(i)>255?2:1;
  }
  return len;
}

async function doRegister(){
  var nick=document.getElementById('reg-nick').value.trim();
  var name=document.getElementById('reg-name').value.trim();
  var kana=document.getElementById('reg-kana').value.trim();
  var gender=document.getElementById('reg-gender').value;
  var birth=document.getElementById('reg-birth').value;
  var pass=document.getElementById('reg-pass').value;
  var pass2=document.getElementById('reg-pass2').value;
  var emailInput=document.getElementById('reg-email').value.trim();
  var errEl=g('reg-err');
  errEl.textContent='';

  if(!nick||!gender||!birth||!pass){ errEl.textContent='必須項目を入力してください'; return; }
  if(nickByteLen(nick)>16){ errEl.textContent='ニックネームは全角8文字（半角16文字）以内にしてください'; return; }
  if(pass.length<8){ errEl.textContent='パスワードは8文字以上にしてください'; return; }
  if(pass!==pass2){ errEl.textContent='パスワードが一致しません'; return; }

  // 会員番号を採番
  var memberId=await fetchNextMemberId();
  if(!memberId){ errEl.textContent='会員番号の採番に失敗しました。もう一度お試しください'; return; }
  document.getElementById('reg-memberid').value=memberId;

  // メールなしの場合は確認ダイアログ
  if(!emailInput){
    if(!confirm('メールアドレスを登録しない場合、仮登録状態となりメンバーポータル機能が利用できませんが、よろしいですか？')){
      return;
    }
  }

  // メールアドレス重複チェック（Firebase Auth経由でセキュアに確認）
  if(emailInput){
    try{
      var methods=await auth.fetchSignInMethodsForEmail(emailInput);
      if(methods.length>0){ errEl.textContent='このメールアドレスは既に登録されています'; return; }
    }catch(e){
      if(e.code==='auth/invalid-email'){ errEl.textContent='メールアドレスの形式が正しくありません'; return; }
      errEl.textContent='メールアドレスの確認に失敗しました: '+e.message; return;
    }
  }

  var authEmail = emailInput ? emailInput : (memberId + VIRTUAL_DOMAIN);
  var realEmail = emailInput || null;
  var isTemp = !emailInput;

  var btn=g('btn-register'), btn2=g('btn-register2');
  if(btn){ btn.disabled=true; btn.textContent='登録中...'; }
  if(btn2){ btn2.disabled=true; btn2.textContent='登録中...'; }

  try{
    var cred=await auth.createUserWithEmailAndPassword(authEmail, pass);
    var uid=cred.user.uid;

    // 本登録の場合は認証メール送信
    if(!isTemp){
      await cred.user.sendEmailVerification().catch(function(){});
    }

    // Firestoreに保存
    await db.collection('members').doc(uid).set({
      authUid: uid,
      memberId: memberId,
      email: realEmail,
      authEmail: authEmail,
      isTemp: isTemp,
      isVerified: false,
      name: name||null,
      nameKana: kana||null,
      nickname: nick,
      gender: gender,
      birthday: birth?birth.replace(/-/g,''):null,
      phone: document.getElementById('reg-tel').value.trim()||null,
      zipCode: document.getElementById('reg-zip').value.trim()||null,
      prefecture: document.getElementById('reg-pref').value||null,
      address: document.getElementById('reg-addr').value.trim()||null,
      address2: document.getElementById('reg-addr2').value.trim()||null,
      twitterId: document.getElementById('reg-tw').value.trim()||null,
      instagramId: document.getElementById('reg-ig').value.trim()||null,
      facebookId: document.getElementById('reg-fb').value.trim()||null,
      grade: 0,
      visibility: 0,
      visitCount: 0,
      totalTequila: 0,
      totalAmount: 0,
      lang: 0,
      registeredAt: new Date().toISOString().slice(0,10).replace(/-/g,''),
    });

    var msg=g('reg-info-msg');
    if(isTemp){
      if(msg) msg.textContent='仮登録完了しました。会員番号: '+memberId;
      toast('仮登録完了しました。会員番号: '+memberId);
    } else {
      if(msg) msg.textContent='認証メールを送信しました。リンクをクリックして本登録を完了してください。';
      toast('認証メールを送信しました。メールをご確認ください。','inf');
    }
  }catch(e){
    errEl.textContent=
      e.code==='auth/email-already-in-use'?'このメールアドレスは既に登録されています':
      '登録失敗: '+e.message;
    if(btn){ btn.disabled=false; btn.textContent='会員登録'; }
    if(btn2){ btn2.disabled=false; btn2.textContent='会員登録'; }
  }
}

function doLogout(){
  auth.signOut();
}

function doResetPassword(){
  var input=gv('login-email');
  if(!input){ g('login-err').textContent='メールアドレスまたは会員IDを入力してください'; return; }
  // 会員ID（@なし）はリセット不可
  if(input.indexOf('@')<0){
    g('login-err').textContent='仮登録会員はパスワードリセットできません。店舗スタッフにお問い合わせください';
    return;
  }
  // 仮想メールドメインはリセット不可
  if(input.indexOf(VIRTUAL_DOMAIN)>=0){
    g('login-err').textContent='仮登録会員はパスワードリセットできません。店舗スタッフにお問い合わせください';
    return;
  }
  auth.sendPasswordResetEmail(input)
    .then(function(){ toast('パスワードリセットメールを送信しました。メールをご確認ください。'); })
    .catch(function(e){
      g('login-err').textContent=
        e.code==='auth/user-not-found'?'このメールアドレスは登録されていません':
        '送信失敗: '+e.message;
    });
}

// ── プロフィール読み込み ─────────────────────────────────────────
async function loadProfile(){
  g('loading-overlay').style.display='block';
  g('form-area').style.display='none';
  try{
    // まずUIDで検索、なければemailで検索
    var snap=await db.collection('members').doc(currentUser.uid).get();
    if(!snap.exists){
      var q=await db.collection('members').where('email','==',currentUser.email).limit(1).get();
      if(!q.empty) snap=q.docs[0];
    }
    memberDoc=snap.exists?snap.data():null;
    fillForm(memberDoc);

    // バナー表示
    var isTemp = memberDoc && memberDoc.isTemp;
    var isVerified = currentUser.emailVerified;
    var hasRealEmail = currentUser.email && currentUser.email.indexOf(VIRTUAL_DOMAIN)<0;

    var tb=g('temp-banner'); if(tb) tb.style.display = isTemp ? 'flex' : 'none';
    var vb=g('verify-banner'); if(vb) vb.style.display = (!isTemp && hasRealEmail && !isVerified) ? 'flex' : 'none';

  }catch(e){
    console.error('loadProfile error:', e);
    // 新規登録直後など初回はドキュメントがない場合があるので空フォームで表示
    fillForm(null);
    var tb=g('temp-banner'); if(tb) tb.style.display='none';
    var vb=g('verify-banner'); if(vb) vb.style.display='none';
  }
  g('loading-overlay').style.display='none';
  g('form-area').style.display='block';
}

function fillForm(d){
  sv('f-name',    d?d.name||'':'');
  sv('f-kana',    d?d.nameKana||'':'');
  sv('f-nick',    d?d.nickname||'':'');
  sv('f-gender',  d?d.gender||'男':'男');
  sv('f-birth',   d&&d.birthday?formatDateInput(d.birthday):'');
  sv('f-zip',     d?d.zipCode||'':'');
  sv('f-pref',    d?d.prefecture||'':'');
  sv('f-addr',    d?d.address||'':'');
  sv('f-addr2',   d?d.address2||'':'');
  sv('f-tel',     d?d.phone||'':'');
  sv('f-tw',      d?d.twitterId||'':'');
  sv('f-ig',      d?d.instagramId||'':'');
  sv('f-fb',      d?d.facebookId||'':'');
  sv('f-main-sns',d?String(d.mainSns||0):'0');
  sv('f-lang',    d?String(d.lang||0):'0');
  sv('f-visibility', d?String(d.visibility||0):'0');
  // 読み取り専用（要素が存在する場合のみ）
  var fmid=g('f-member-id'); if(fmid) fmid.textContent=d&&d.memberId?d.memberId:(d&&d.authUid?d.authUid.slice(0,8)+'...':'—');
  var fgrd=g('f-grade'); if(fgrd) fgrd.textContent=GRADE_LABELS[d&&d.grade?d.grade:0]||'無料会員';
  var sv1=g('stat-visits'); if(sv1) sv1.innerHTML=(d?d.visitCount||0:0)+'<span class="stat-unit">回</span>';
  var sv2=g('stat-tequila'); if(sv2) sv2.innerHTML=(d?d.totalTequila||0:0)+'<span class="stat-unit">ml</span>';
  var sv3=g('stat-rank'); if(sv3) sv3.textContent=d&&d.rank?d.rank:'—';
  var sv4=g('stat-amount'); if(sv4) sv4.textContent='¥'+(d?d.totalAmount||0:0).toLocaleString();
  // 画像（デフォルト画像または登録済み画像）
  g('icon-preview').src = (d&&d.iconUrl) ? d.iconUrl : DEFAULT_ICON_SVG;
  if(d&&d.iconUrl) g('icon-clear').style.display='inline';
  g('photo-preview').src = (d&&d.photoUrl) ? d.photoUrl : DEFAULT_PHOTO_SVG;
  if(d&&d.photoUrl) g('photo-clear').style.display='inline';
}

function formatDateInput(dateStr){
  // YYYYMMDD → YYYY-MM-DD
  if(!dateStr||dateStr.length<8) return '';
  return dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8);
}
function parseDateInput(dateStr){
  // YYYY-MM-DD → YYYYMMDD
  return dateStr?dateStr.replace(/-/g,''):'';
}

// ── 画像プレビュー ──────────────────────────────────────────────
// ── デフォルト画像（SVG） ──────────────────────────────────────
var DEFAULT_ICON_SVG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"><circle cx="40" cy="40" r="40" fill="%23e4ddd0"/><circle cx="40" cy="30" r="14" fill="%239a8470"/><ellipse cx="40" cy="68" rx="22" ry="16" fill="%239a8470"/></svg>';
var DEFAULT_PHOTO_SVG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90"><rect width="120" height="90" fill="%23e4ddd0"/><circle cx="60" cy="34" r="18" fill="%239a8470"/><ellipse cx="60" cy="80" rx="30" ry="18" fill="%239a8470"/></svg>';

// ── 画像圧縮 ────────────────────────────────────────────────────
function compressImage(file, maxW, maxH, quality){
  return new Promise(function(resolve){
    // GIFはそのまま（アニメーション維持のため圧縮しない）
    if(file.type==='image/gif'){
      if(file.size > 2*1024*1024){ alert('GIFは2MB以下にしてください'); resolve(null); return; }
      resolve(file); return;
    }
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      var w=img.width, h=img.height;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      if(h>maxH){ w=Math.round(w*maxH/h); h=maxH; }
      var canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(blob){ resolve(blob); }, 'image/jpeg', quality);
    };
    img.src=url;
  });
}

// ── 画像をセット（圧縮→プレビュー→File保存） ───────────────────
async function setImage(type, file){
  var maxW = type==='icon' ? 200 : 800;
  var maxH = type==='icon' ? 200 : 800;
  var blob = await compressImage(file, maxW, maxH, 0.8);
  if(!blob) return;  // サイズ超過でキャンセル
  var isGif = file.type==='image/gif';
  var compressed = isGif ? file : new File([blob], file.name||'image.jpg', {type:'image/jpeg'});
  if(type==='icon') iconFile=compressed;
  else photoFile=compressed;
  var reader=new FileReader();
  reader.onload=function(e){
    g(type+'-preview').src=e.target.result;
    g(type+'-clear').style.display='inline';
  };
  reader.readAsDataURL(compressed);
}

function previewImg(type){
  var fileEl=g(type+'-file');
  var file=fileEl.files[0];
  if(!file) return;
  setImage(type, file);
}

function clearImg(type){
  if(type==='icon'){
    iconFile=null; g('icon-file').value='';
    g('icon-preview').src=DEFAULT_ICON_SVG;
    g('icon-clear').style.display='none';
  } else {
    photoFile=null; g('photo-file').value='';
    g('photo-preview').src=DEFAULT_PHOTO_SVG;
    g('photo-clear').style.display='none';
  }
}

// ── ペースト対応 ─────────────────────────────────────────────────
document.addEventListener('paste', function(e){
  var items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      var file=items[i].getAsFile();
      // フォーカスされているエリアに応じてtype判定（デフォルトはicon）
      var activeEl=document.activeElement;
      var type='icon';
      if(activeEl && (activeEl.id==='photo-drop' || (activeEl.closest && activeEl.closest('#photo-drop')))) type='photo';
      setImage(type, file);
      break;
    }
  }
});

// ── ドラッグ&ドロップ ─────────────────────────────────────────────
['icon','photo'].forEach(function(type){
  var area=g(type+'-drop');
  if(!area) return;
  area.addEventListener('dragover',function(e){ e.preventDefault(); area.style.borderColor='var(--gold)'; });
  area.addEventListener('dragleave',function(){ area.style.borderColor=''; });
  area.addEventListener('drop',function(e){
    e.preventDefault(); area.style.borderColor='';
    var file=e.dataTransfer.files[0];
    if(file && file.type.indexOf('image')!==-1) setImage(type, file);
  });
});

// ── 画像アップロード ────────────────────────────────────────────
async function uploadImage(file, path){
  var ref=storage.ref(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}

// ── プロフィール保存 ────────────────────────────────────────────
async function saveProfile(){
  var nick=gv('f-nick');
  if(!nick){ toast('ニックネームは必須です','err'); return; }
  var name=gv('f-name');
  var btn=g('btn-save'); btn.disabled=true; btn.textContent='保存中...';
  g('save-status').textContent='保存中...';
  try{
    var uid=currentUser.uid;
    var updateData={
      name:name, nameKana:gv('f-kana')||null, nickname:gv('f-nick')||null,
      gender:gv('f-gender')||'男',
      birthday:parseDateInput(gv('f-birth'))||null,
      zipCode:gv('f-zip')||null, prefecture:gv('f-pref')||null,
      address:gv('f-addr')||null, address2:gv('f-addr2')||null,
      phone:gv('f-tel')||null,
      twitterId:gv('f-tw')||null, instagramId:gv('f-ig')||null, facebookId:gv('f-fb')||null,
      mainSns:parseInt(gv('f-main-sns'))||0,
      lang:parseInt(gv('f-lang'))||0,
      visibility:parseInt(gv('f-visibility'))||0,
      email:currentUser.email,
      authUid:uid,
    };
    // 画像アップロード
    if(iconFile){
      updateData.iconUrl=await uploadImage(iconFile,'member-images/'+uid+'/icon');
      iconFile=null;
    }
    if(photoFile){
      updateData.photoUrl=await uploadImage(photoFile,'member-images/'+uid+'/photo');
      photoFile=null;
    }
    // 既存ドキュメントIDを確認（UIDで保存）
    await db.collection('members').doc(uid).set(updateData,{merge:true});
    memberDoc=Object.assign(memberDoc||{},updateData);
    toast('プロフィールを保存しました');
    g('save-status').textContent='保存済み';
  }catch(e){
    toast('保存失敗: '+e.message,'err');
    g('save-status').textContent='保存に失敗しました';
  }
  btn.disabled=false; btn.textContent='保存する';
}

// ── パスワード変更 ──────────────────────────────────────────────
// ── 認証メール再送 ─────────────────────────────────────────────
async function resendVerifyEmail(){
  try{
    await currentUser.sendEmailVerification();
    toast('認証メールを再送しました。メールをご確認ください。','inf');
  }catch(e){
    toast('送信失敗: '+e.message,'err');
  }
}

async function doChangePassword(){
  var pass=gv('f-new-pass'), pass2=gv('f-new-pass2');
  g('pass-err').textContent='';
  if(!pass){ g('pass-err').textContent='新しいパスワードを入力してください'; return; }
  if(pass.length<8){ g('pass-err').textContent='パスワードは8文字以上にしてください'; return; }
  if(pass!==pass2){ g('pass-err').textContent='パスワードが一致しません'; return; }
  try{
    await currentUser.updatePassword(pass);
    sv('f-new-pass',''); sv('f-new-pass2','');
    toast('パスワードを変更しました');
  }catch(e){
    if(e.code==='auth/requires-recent-login'){
      g('pass-err').textContent='セキュリティのため、一度ログアウトして再ログイン後に変更してください';
    } else {
      g('pass-err').textContent='変更失敗: '+e.message;
    }
  }
}

document.getElementById('reg-pass2').addEventListener('keydown',function(e){ if(e.key==='Enter') doRegister(); });
